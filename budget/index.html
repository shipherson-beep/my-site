document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3690e411-6a95-401c-bdcb-3077ecb62f58\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{margin:0;background:#f5f5f7;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}\n  @keyframes fbIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}\n  @keyframes fbFade{from{opacity:0}to{opacity:1}}\n  @keyframes flashCell{0%{background:rgba(10,132,255,.34)}55%{background:rgba(10,132,255,.18)}100%{background:transparent}}\n  @keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}70%{box-shadow:0 0 0 9px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  .inc-icon-btn{color:#c7c7cc;transition:background .12s,color .12s}\n  .inc-icon-btn:hover{background:#e4e4e7 !important;color:#1d1d1f !important}\n  *{scrollbar-width:none;-ms-overflow-style:none}\n  ::-webkit-scrollbar{width:0;height:0;display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" style=\"--accent:#0a84ff;--row-h:44px;--col:92px;--cat:204px;height:100vh;display:flex;flex-direction:column;padding:14px 18px 16px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif;color:#1d1d1f\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:18px;flex:none;margin-bottom:14px\">\n    <div style=\"min-width:0;display:flex;align-items:center\">\n      <div style=\"font-size:23px;font-weight:700;letter-spacing:-.022em;line-height:1.05\">Сімейний бюджет<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;flex:none\">\n      <sc-if value=\"{{ showToday }}\">\n        <button onclick=\"{{ goToday }}\" style=\"height:36px;padding:0 14px;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:999px;font-size:13.5px;font-weight:560;color:var(--accent,#0a84ff);cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.04)\" style-hover=\"background:#f0f0f2\">Сьогодні<\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"display:flex;align-items:center;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:3px;box-shadow:0 1px 2px rgba(0,0,0,.04)\">\n        <button onclick=\"{{ prevMonth }}\" style=\"width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:50%;font-size:18px;line-height:1;color:#1d1d1f;cursor:pointer;font-family:inherit\" style-hover=\"background:#f0f0f2\">‹<\u002Fbutton>\n        <div style=\"min-width:150px;text-align:center;font-size:15px;font-weight:640;letter-spacing:-.01em;font-variant-numeric:tabular-nums\">{{ monthLabel }}<\u002Fdiv>\n        <button onclick=\"{{ nextMonth }}\" style=\"width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:50%;font-size:18px;line-height:1;color:#1d1d1f;cursor:pointer;font-family:inherit\" style-hover=\"background:#f0f0f2\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <button onclick=\"{{ openSettings }}\" style=\"height:36px;padding:0 15px;display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:999px;font-size:13.5px;font-weight:550;color:#1d1d1f;cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.04)\" style-hover=\"background:#f0f0f2\">\n        <span style=\"font-size:15px\">⚙<\u002Fspan> Ліміти\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;min-height:0;display:flex;gap:14px;align-items:stretch\">\n\n    <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n      <div style=\"flex:1;min-height:0;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 6px 22px rgba(0,0,0,.035);display:flex;flex-direction:column;overflow:hidden\">\n\n        <div data-scroll=\"\" style=\"flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column\">\n\n          <div style=\"display:flex;width:max-content;min-width:100%;flex:none;position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid rgba(0,0,0,.09)\">\n            <div style=\"width:var(--cat);flex:none;position:sticky;left:0;z-index:2;background:#fff;padding:0 16px;height:42px;display:flex;align-items:center;border-right:1px solid rgba(0,0,0,.08);font-size:10.5px;font-weight:680;letter-spacing:.05em;text-transform:uppercase;color:#aeaeb2\">Категорія<\u002Fdiv>\n            <sc-for list=\"{{ days }}\" as=\"d\" hint-placeholder-count=\"30\">\n              <sc-if value=\"{{ d.notToday }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"width:var(--col);flex:none;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-right:1px solid rgba(0,0,0,.035)\">\n                  <span style=\"font-size:9px;color:#c7c7cc;line-height:1\">{{ d.wd }}<\u002Fspan>\n                  <span style=\"font-size:12.5px;font-weight:600;color:#1d1d1f;font-variant-numeric:tabular-nums;line-height:1\">{{ d.day }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ d.isToday }}\">\n                <div style=\"width:var(--col);flex:none;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-right:1px solid rgba(0,0,0,.035)\">\n                  <span style=\"font-size:9px;font-weight:700;color:var(--accent,#0a84ff);line-height:1\">{{ d.wd }}<\u002Fspan>\n                  <span style=\"font-size:12px;font-weight:700;color:#fff;background:var(--accent,#0a84ff);border-radius:7px;min-width:20px;padding:1px 3px;text-align:center;font-variant-numeric:tabular-nums;line-height:1.1\">{{ d.day }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n            <div style=\"width:var(--col);flex:none;position:sticky;right:0;z-index:2;padding:0 12px;height:42px;background:#fafafa;border-left:1px solid rgba(0,0,0,.06);font-size:10.5px;font-weight:680;letter-spacing:.04em;text-transform:uppercase;color:#aeaeb2;display:flex;align-items:center;justify-content:flex-end\">Σ&nbsp;міс<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"11\">\n            <div style=\"display:flex;width:max-content;min-width:100%;flex:1 1 0;min-height:var(--row-h,44px);border-bottom:1px solid rgba(0,0,0,.05)\">\n              <div onmouseenter=\"{{ row.onEnter }}\" onmouseleave=\"{{ row.onLeave }}\" style=\"width:var(--cat);flex:none;position:sticky;left:0;z-index:2;background:#fff;padding:0 16px;border-right:1px solid rgba(0,0,0,.08);display:flex;align-items:center;font-size:12.5px;font-weight:600;color:#1d1d1f;letter-spacing:-.005em;line-height:1.15;overflow:hidden;cursor:default\" style-hover=\"background:#f7f9ff\">\n                <span style=\"display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">{{ row.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"30\">\n                <div onclick=\"{{ cell.onClick }}\" style=\"width:var(--col);flex:none;height:100%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:500;color:#1d1d1f;font-variant-numeric:tabular-nums;cursor:pointer;border-right:1px solid rgba(0,0,0,.035);position:relative;box-shadow:{{ cell.sel }};animation:{{ cell.flash }}\" style-hover=\"background:#f3f7ff\">\n                  <sc-if value=\"{{ cell.editing }}\">\n                    <input value=\"{{ cell.draft }}\" oninput=\"{{ cell.onInput }}\" onkeydown=\"{{ cell.onKeyDown } font-size:13px;font-weight:600;font-family:inherit;cursor:default\">\n          <span style=\"width:13px;height:13px;border:2px solid #c7c7cc;border-top-color:#86868b;border-radius:50%;display:inline-block;animation:spin .7s linear infinite\"><\u002Fspan> Обробляю\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ nlIdleSend }}\">\n        <button onclick=\"{{ submitNL }}\" style=\"flex:none;height:38px;padding:0 15px;display:inline-flex;align-items:center;gap:7px;border:none;background:var(--accent,#0a84ff);color:#fff;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"filter:brightness(1.06)\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"5\"><\u002Fline><polyline points=\"6 11 12 5 18 11\"><\u002Fpolyline><\u002Fsvg>\n          Додати\n        <\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"padding:7px 4px 0\">\n      <span style=\"font-size:11px;color:#aeaeb2;letter-spacing:.01em\">Напр.: «7 червня продукти 120, 500, 800, ресторани 2200» — або натисніть мікрофон і продиктуйте<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hoverActive }}\">\n    <div style=\"position:fixed;top:{{ hoverTop }};left:{{ hoverLeft }};z-index:80;max-width:268px;background:#1d1d1f;color:#fff;padding:9px 12px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.28);pointer-events:none;animation:fbFade .12s ease\">\n      <div style=\"font-size:12.5px;font-weight:680;letter-spacing:-.01em;line-height:1.2\">{{ hoverName }}<\u002Fdiv>\n      <div style=\"font-size:11.5px;color:rgba(255,255,255,.72);margin-top:3px;line-height:1.35\">{{ hoverDesc }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ incPopActive }}\">\n    <div onclick=\"{{ closeIncPopBackdrop }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:70;animation:fbFade .15s ease;padding:20px\">\n      <div style=\"width:340px;max-width:100%;background:#fff;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.28);padding:22px 22px 18px;animation:fbIn .22s cubic-bezier(.2,.8,.2,1)\">\n        <div style=\"font-size:17px;font-weight:700;letter-spacing:-.015em;margin-bottom:16px\">{{ incPopTitle }}<\u002Fdiv>\n        <div style=\"font-size:10.5px;font-weight:680;letter-spacing:.04em;color:#aeaeb2;text-transform:uppercase;margin-bottom:6px\">Джерело<\u002Fdiv>\n        <input value=\"{{ popLabel }}\" oninput=\"{{ onPopLabel }}\" onkeydown=\"{{ onPopKey }}\" ref=\"{{ popLabelRef }}\" placeholder=\"напр. продаж, фріланс\" style=\"width:100%;height:42px;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:0 13px;font-size:15px;font-family:inherit;background:#fff;color:#1d1d1f\" style-focus=\"border-color:var(--accent,#0a84ff);outline:none\">\n        <div style=\"font-size:10.5px;font-weight:680;letter-spacing:.04em;color:#aeaeb2;text-transform:uppercase;margin:14px 0 6px\">Сума, ₴<\u002Fdiv>\n        <input value=\"{{ popAmount }}\" oninput=\"{{ onPopAmount }}\" onkeydown=\"{{ onPopKey }}\" placeholder=\"0\" inputmode=\"numeric\" style=\"width:100%;height:42px;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:0 13px;font-size:15px;font-variant-numeric:tabular-nums;font-family:inherit;background:#fff;color:#1d1d1f\" style-focus=\"border-color:var(--accent,#0a84ff);outline:none\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-top:18px\">\n          <sc-if value=\"{{ incPopCanDelete }}\">\n            <button onclick=\"{{ delIncomePop }}\" style=\"height:44px;padding:0 16px;border:1px solid rgba(255,59,48,.25);background:#fff;border-radius:13px;font-size:14px;font-weight:560;color:#ff3b30;cursor:pointer;font-family:inherit\" style-hover=\"background:#fff5f5\">Видалити<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ closeIncPop }}\" style=\"flex:1;height:44px;border:none;background:var(--accent,#0a84ff);color:#fff;border-radius:13px;font-size:15px;font-weight:620;cursor:pointer;font-family:inherit\" style-hover=\"filter:brightness(1.06)\">Готово<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ settingsOpen }}\">\n    <div onclick=\"{{ closeSettingsBackdrop }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:60;animation:fbFade .15s ease;padding:20px\">\n      <div style=\"width:440px;max-width:100%;max-height:86vh;background:#fff;border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden;animation:fbIn .22s cubic-bezier(.2,.8,.2,1)\">\n        <div style=\"padding:19px 22px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center\">\n          <div style=\"font-size:17.5px;font-weight:700;letter-spacing:-.015em\">Бюджет, ліміти та оренда<\u002Fdiv>\n          <button onclick=\"{{ closeSettings }}\" style=\"width:31px;height:31px;border:none;background:#f0f0f2;border-radius:50%;font-size:17px;line-height:1;color:#6e6e73;cursor:pointer\" style-hover=\"background:#e5e5ea\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:8px 22px 16px;overflow-y:auto\">\n          <sc-for list=\"{{ settingsFields }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.05)\">\n              <div>\n                <div style=\"font-size:14px;font-weight:580\">{{ f.label }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#b0b0b5;margin-top:1px\">{{ f.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:6px;flex:none\">\n                <input value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" inputmode=\"numeric\" style=\"width:110px;height:38px;border:1px solid rgba(0,0,0,.12);border-radius:11px;padding:0 12px;font-size:15px;text-align:right;font-variant-numeric:tabular-nums;font-family:inherit;background:#fff;color:#1d1d1f\" style-focus=\"border-color:var(--accent,#0a84ff);outline:none\">\n                <span style=\"font-size:14px;color:#aeaeb2\">₴<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:14px 22px;border-top:1px solid rgba(0,0,0,.06);display:flex;justify-content:flex-end;background:#fafafa\">\n          <button onclick=\"{{ closeSettings }}\" style=\"height:44px;padding:0 24px;border:none;background:var(--accent,#0a84ff);color:#fff;border-radius:13px;font-size:15px;font-weight:620;cursor:pointer;font-family:inherit\" style-hover=\"filter:brightness(1.06)\">Готово<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:940},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0a84ff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Компактна&quot;,&quot;options&quot;:[&quot;Компактна&quot;,&quot;Комфортна&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { sel: null, edit: null, draft: '', settings: false, hover: null, expand: false, tick: 0,\n            nlText: '', nlBusy: false, nlListening: false, nlError: null, nlResult: null, incPop: null };\n\n  CATS = [\n    { id:'products',  name:'Продукти',            kind:'limit',   limitKey:'products', desc:'Супермаркети, ринки, заморозки' },\n    { id:'eatingOut', name:'Їжа поза домом',       kind:'limit',   limitKey:'eatingOut', desc:'Ресторани, куплені додому роли, піци, десерти' },\n    { id:'home',      name:'Дім',                  kind:'general', desc:'Побутові речі, покращення інтер’єру, ремонт' },\n    { id:'subs',      name:'Підписки / сервіси',   kind:'general', desc:'Розважальні підписки, моб рахунок, оплата застосунків' },\n    { id:'family',    name:'Сім’я',                kind:'general', desc:'Дитина та собака' },\n    { id:'health',    name:'Здоров’я',             kind:'general', desc:'Аптеки, обстеження здоров’я, спорт інвентар, спортзал' },\n    { id:'work',      name:'Робота / Навчання / Податки', kind:'general', desc:'Робочі підписки, 3д моделі, курси, податки' },\n    { id:'transport', name:'Транспорт',            kind:'general', desc:'Машина, таксі, тех обслуговування, мийка' },\n    { id:'leisure',   name:'Дозвілля / Подорожі',  kind:'general', desc:'Подорож на вихідні, відпустки, готелі, виставки, кіно' },\n    { id:'charity',   name:'Благодійність / Подарунки', kind:'limit',  limitKey:'charity', desc:'Подарунки та гостинці іншим, донати' },\n    { id:'personal',  name:'Особисті витрати',     kind:'limit',   limitKey:'personal', desc:'Приємності для себе, будь що на 5000 грн в міс' },\n  ];\n  MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];\n  GEN = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];\n  WD = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];\n  KEY = 'familyBudget_v1';\n\n  defaultData() {\n    const d = new Date();\n    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');\n    return {\n      config: { monthlyBudget:'180000', rent:'55000', limits:{ products:'30000', eatingOut:'10000', charity:'5000', personal:'10000' } },\n      months: {},\n      currentMonth: key,\n    };\n  }\n  ensure() {\n    if (this._init) return;\n    this._init = true;\n    let d = null;\n    try { d = JSON.parse(localStorage.getItem(this.KEY)); } catch (e) {}\n    if (!d || !d.config) d = this.defaultData();\n    if (!d.months) d.months = {};\n    if (!d.config.limits) d.config.limits = this.defaultData().config.limits;\n    if (!d.config.monthlyBudget) d.config.monthlyBudget = '180000';\n    if (d.config.rent == null) d.config.rent = '55000';\n    this.data = d;\n  }\n  save() { try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) {} }\n  bump() { this.setState(s => ({ tick: s.tick + 1 })); }\n  pnum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n  uid() { return Math.random().toString(36).slice(2, 9); }\n  fmt(n) { return new Intl.NumberFormat('uk-UA', { maximumFractionDigits: 0 }).format(Math.round(n)); }\n  money(v) { return this.fmt(this.pnum(v)) + ' ₴'; }\n  num(v) { const n = this.pnum(v); return n ? this.fmt(n) : ''; }\n  abbr(v) {\n    const n = Math.round(this.pnum(v));\n    if (!n) return '';\n    if (Math.abs(n) < 1000) return String(n);\n    const k = n / 1000;\n    const s = (Math.abs(k) < 100) ? (Math.round(k * 10) / 10) : Math.round(k);\n    return String(s).replace('.', ',') + 'к';\n  }\n\n  cm() { return this.data.currentMonth; }\n  month() {\n    const k = this.cm();\n    if (!this.data.months[k]) this.data.months[k] = { days: {}, income: [] };\n    const m = this.data.months[k];\n    if (!m.days) m.days = {};\n    if (!m.income) m.income = [];\n    return m;\n  }\n  daysInMonth() { const [y, mo] = this.cm().split('-').map(Number); return new Date(y, mo, 0).getDate(); }\n  recsOf(day, cat) { const m = this.month(); const dd = m.days[day]; return (dd && dd[cat]) ? dd[cat] : []; }\n\n  shift(delta) {\n    const [y, mo] = this.cm().split('-').map(Number);\n    const d = new Date(y, mo - 1 + delta, 1);\n    this.data.currentMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');\n    this.month();\n    this.setState({ sel: null, edit: null });\n    this.save();\n  }\n  goToday() {\n    const d = new Date();\n    this.data.currentMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');\n    this.setState({ sel: null, edit: null });\n    this.save();\n  }\n\n  selectCell(day, cat) {\n    const ed = this.state.edit;\n    if (ed && ed.day === day && ed.cat === cat) return;\n    if (ed) this.commitEdit();\n    const recs = this.recsOf(day, cat);\n    if (recs.length > 1) {\n      this._focusNext = false;\n      this.setState({ sel: { day, cat }, edit: null });\n    } else {\n      this.startEdit(day, cat);\n    }\n  }\n  startEdit(day, cat) {\n    const recs = this.recsOf(day, cat);\n    const draft = recs.length === 1 ? (recs[0].amount == null ? '' : String(recs[0].amount)) : '';\n    this._focusNext = true;\n    this.setState({ sel: { day, cat }, edit: { day, cat }, draft });\n  }\n  commitEdit() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const { day, cat } = ed;\n    const v = this.state.draft;\n    const amt = this.pnum(v);\n    const mo = this.month();\n    const recs = (mo.days[day] && mo.days[day][cat]) || null;\n    if (amt > 0) {\n      if (recs && recs.length >= 1) {\n        recs[0].amount = String(v);\n      } else {\n        if (!mo.days[day]) mo.days[day] = {};\n        mo.days[day][cat] = [{ id: this.uid(), amount: String(v), comment: '' }];\n      }\n    } else {\n      if (mo.days[day] && mo.days[day][cat]) {\n        delete mo.days[day][cat];\n        if (!Object.keys(mo.days[day]).length) delete mo.days[day];\n      }\n    }\n    this.save();\n  }\n  moveDown() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const ci = this.CATS.findIndex(c => c.id === ed.cat);\n    let ni = ci + 1, nd = ed.day;\n    if (ni >= this.CATS.length) {\n      ni = 0; nd = ed.day + 1;\n      if (nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    }\n    this.startEdit(nd, this.CATS[ni].id);\n  }\n  moveSide(dir) {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const nd = ed.day + dir;\n    if (nd < 1 || nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    this.startEdit(nd, ed.cat);\n  }\n  cellKey(e) {\n    if (e.key === 'Enter') { e.preventDefault(); this.commitEdit(); this.moveDown(); }\n    else if (e.key === 'Tab') { e.preventDefault(); this.commitEdit(); this.moveSide(e.shiftKey ? -1 : 1); }\n    else if (e.key === 'Escape') { e.preventDefault(); this._focusNext = false; this.setState({ edit: null }); }\n  }\n\n  addBarRec() {\n    const s = this.state.sel; if (!s) return;\n    if (this.state.edit) { this.commitEdit(); }\n    const mo = this.month();\n    if (!mo.days[s.day]) mo.days[s.day] = {};\n    if (!mo.days[s.day][s.cat]) mo.days[s.day][s.cat] = [];\n    mo.days[s.day][s.cat].push({ id: this.uid(), amount: '', comment: '' });\n    this.save();\n    this.setState({ edit: null });\n  }\n  delBarRec(idx) {\n    const s = this.state.sel; if (!s) return;\n    const mo = this.month();\n    const arr = mo.days[s.day] && mo.days[s.day][s.cat];\n    if (!arr) return;\n    arr.splice(idx, 1);\n    if (!arr.length) { delete mo.days[s.day][s.cat]; if (!Object.keys(mo.days[s.day]).length) delete mo.days[s.day]; }\n    this.save();\n    this.setState({ edit: null });\n  }\n\n  addIncome(ev) { const id = this.uid(); this.month().income.push({ id, label: '', amount: '' }); this.save(); this.openPop(id, ev, true); }\n  openPop(id, ev, isNew) { this._focusPop = true; this.setState({ incPop: { id, isNew: !!isNew } }); }\n  commitIncome(id) {\n    const m = this.month();\n    const idx = m.income.findIndex(x => x.id === id);\n    if (idx >= 0) {\n      const r = m.income[idx];\n      const emptyL = !(r.label && r.label.trim());\n      const emptyA = !(r.amount && String(r.amount).trim());\n      if (emptyL && emptyA) m.income.splice(idx, 1);\n    }\n    this.save();\n  }\n  closeIncPop() { const p = this.state.incPop; if (p) this.commitIncome(p.id); this.setState({ incPop: null }); }\n  delIncomeById(id) {\n    const m = this.month();\n    const idx = m.income.findIndex(x => x.id === id);\n    if (idx >= 0) m.income.splice(idx, 1);\n    this.save();\n    const p = this.state.incPop;\n    if (p && p.id === id) this.setState({ incPop: null }); else this.bump();\n  }\n\n  plural(n, one, few, many) {\n    n = Math.abs(n) % 100; const n1 = n % 10;\n    if (n > 10 && n < 20) return many;\n    if (n1 > 1 && n1 < 5) return few;\n    if (n1 === 1) return one;\n    return many;\n  }\n\n  // ---- Natural-language / voice entry ----\n  toggleVoice() { if (this.state.nlListening) this.stopVoice(); else this.startVoice(); }\n  startVoice() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ nlError: 'Голосовий ввід не підтримується у цьому браузері. Введіть витрату текстом.' }); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ nlError: 'Не вдалося увімкнути мікрофон.' }); return; }\n    rec.lang = 'uk-UA'; rec.continuous = true; rec.interimResults = true;\n    this._voiceBase = this.state.nlText ? (this.state.nlText.trim() + ' ') : '';\n    rec.onresult = (e) => {\n      let t = '';\n      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;\n      this.setState({ nlText: this._voiceBase + t });\n    };\n    rec.onerror = (e) => {\n      const err = e && e.error;\n      let msg = 'Помилка мікрофона.';\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = 'Доступ до мікрофона заборонено. Дозвольте його у браузері.';\n      else if (err === 'no-speech') msg = null;\n      this._recog = null;\n      this.setState({ nlListening: false, nlError: msg });\n    };\n    rec.onend = () => { this._recog = null; this.setState({ nlListening: false }); };\n    this._recog = rec;\n    try { rec.start(); this.setState({ nlListening: true, nlError: null, nlResult: null }); }\n    catch (e) { this._recog = null; this.setState({ nlListening: false }); }\n  }\n  stopVoice() { if (this._recog) { try { this._recog.stop(); } catch (e) {} } this.setState({ nlListening: false }); }\n\n  async submitNL() {\n    const text = (this.state.nlText || '').trim();\n    if (!text || this.state.nlBusy) return;\n    if (this.state.nlListening) this.stopVoice();\n    this.setState({ nlBusy: true, nlError: null, nlResult: null });\n    try {\n      const entries = await this.parseNL(text);\n      if (!entries.length) {\n        this.setState({ nlBusy: false, nlError: 'Не вдалося розпізнати витрати. Спробуйте формат: «7 червня продукти 120, 500».' });\n        return;\n      }\n      this.applyEntries(entries);\n    } catch (e) {\n      const m = e && e.message;\n      const msg = (m === 'no-claude') ? 'Розпізнавання тексту наразі недоступне.' : 'Не вдалося обробити запит. Спробуйте ще раз.';\n      this.setState({ nlBusy: false, nlError: msg });\n    }\n  }\n\n  // Універсальний виклик моделі.\n  // У прототипі використовується вбудований місток window.claude.complete.\n  // На реальному сайті його немає — тоді запит іде на ваш сервер (/api/parse),\n  // який додає секретний ключ OpenAI і звертається до моделі.\n  async complete(prompt) {\n    if (window.claude && window.claude.complete) {\n      return await window.claude.complete(prompt);\n    }\n    let r;\n    try {\n      r = await fetch('/api/parse', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ prompt }),\n      });\n    } catch (e) { throw new Error('no-claude'); }\n    if (!r.ok) throw new Error('no-claude');\n    const data = await r.json();\n    return (data && data.text) || '';\n  }\n\n  async parseNL(text) {\n    const [y, mo] = this.cm().split('-').map(Number);\n    const dim = this.daysInMonth();\n    const today = new Date();\n    const cats = this.CATS.map(c => `${c.id} = ${c.name}${c.desc ? ' (' + c.desc + ')' : ''}`).join('\\n');\n    const prompt =\n`Ти — парсер витрат для застосунку сімейного бюджету. Перетвори текст/диктовку користувача українською на структурований JSON.\n\nКатегорії (використовуй id зліва):\n${cats}\n\nКонтекст:\n- Таблиця показує місяць: ${this.MONTHS[mo - 1]} ${y} (номер місяця ${mo}, днів у місяці: ${dim}).\n- Сьогодні: ${today.getDate()} число, місяць ${today.getMonth() + 1}, ${today.getFullYear()} рік.\n\nПравила:\n- Кожна сума = окремий запис. Напр. \"продукти 120, 500, 800\" → три записи category=products з amount 120, 500, 800.\n- \"day\" = номер дня в показаному місяці (1..${dim}). Розпізнавай українські дати: \"сьоме червня\"=7, \"за 7 червня\"=7, \"7.06\"=7. \"сьогодні\" = ${today.getDate()}, \"вчора\" = ${today.getDate() - 1}. Якщо дату не вказано — використай число дня \"сьогодні\", якщо воно в межах місяця, інакше 1.\n- amount = додатне число у гривнях. Ігноруй \"грн\", \"₴\", \"гривень\".\n- comment = короткий опис, якщо користувач назвав конкретну річ (напр. \"таксі\"), інакше \"\".\n- Бери лише витрати. Сторонній текст ігноруй.\n\nТекст користувача:\n\"\"\"${text}\"\"\"\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у такій формі:\n{\"entries\":[{\"day\":7,\"categoryId\":\"products\",\"amount\":120,\"comment\":\"\"}]}`;\n    const raw = await this.complete(prompt);\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('parse'); }\n    const ids = this.CATS.map(c => c.id);\n    return (data.entries || []).map(en => ({\n      day: Math.max(1, Math.min(dim, parseInt(en.day, 10) || 0)),\n      categoryId: ids.includes(en.categoryId) ? en.categoryId : null,\n      amount: Math.round(parseFloat(en.amount) || 0),\n      comment: (en.comment || '').toString().slice(0, 60),\n    })).filter(e => e.categoryId && e.amount > 0 && e.day >= 1);\n  }\n\n  applyEntries(entries) {\n    const mo = this.month();\n    this._undoSnap = JSON.stringify(this.data.months[this.cm()]);\n    const flash = {};\n    entries.forEach(en => {\n      if (!mo.days[en.day]) mo.days[en.day] = {};\n      if (!mo.days[en.day][en.categoryId]) mo.days[en.day][en.categoryId] = [];\n      mo.days[en.day][en.categoryId].push({ id: this.uid(), amount: String(en.amount), comment: en.comment || '' });\n      flash[en.day + '|' + en.categoryId] = true;\n    });\n    this.save();\n    this._flash = flash;\n    const total = entries.reduce((a, e) => a + e.amount, 0);\n    this.setState({ nlBusy: false, nlText: '', nlListening: false, nlResult: { count: entries.length, total, entries } });\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._resultTimer);\n    this._resultTimer = setTimeout(() => { if (this.state.nlResult) this.setState({ nlResult: null }); }, 5000);\n  }\n  undoNL() {\n    clearTimeout(this._resultTimer);\n    if (this._undoSnap) { this.data.months[this.cm()] = JSON.parse(this._undoSnap); this._undoSnap = null; this.save(); }\n    this._flash = null;\n    this.setState({ nlResult: null });\n  }\n\n  _rowH() { return (this.props.density === 'Комфортна') ? 52 : 44; }\n  applyVars() {\n    if (!this._root) return;\n    this._root.style.setProperty('--accent', this.props.accentColor || '#0a84ff');\n    this._root.style.setProperty('--row-h', this._rowH() + 'px');\n  }\n  focusEdit() {\n    if (this._focusNext && this._editInput) {\n      this._focusNext = false;\n      try { this._editInput.focus(); this._editInput.select(); } catch (e) {}\n    }\n  }\n  componentDidMount() { this.ensure(); this.applyVars(); this.focusEdit(); }\n  componentDidUpdate() {\n    this.applyVars(); this.focusEdit();\n    if (this._focusPop && this._popInput) { this._focusPop = false; try { this._popInput.focus(); this._popInput.select(); } catch (e) {} }\n    if (this.state.nlError && this.state.nlError !== this._lastErr) {\n      this._lastErr = this.state.nlError;\n      clearTimeout(this._errTimer);\n      this._errTimer = setTimeout(() => { if (this.state.nlError) this.setState({ nlError: null }); }, 5500);\n    }\n    if (!this.state.nlError) this._lastErr = null;\n  }\n\n  colorFor(s, l) { if (l <= 0) return '#34c759'; const p = s / l; if (p > 1) return '#ff3b30'; if (p >= 0.8) return '#ff9f0a'; return '#34c759'; }\n\n  renderVals() {\n    this.ensure();\n    const cm = this.cm();\n    const [y, mo] = cm.split('-').map(Number);\n    const dim = this.daysInMonth();\n    const now = new Date();\n    const isThisMonth = (y === now.getFullYear() && mo === now.getMonth() + 1);\n    const m = this.month();\n    const L = this.data.config.limits;\n    const sel = this.state.sel, edit = this.state.edit;\n\n    const days = [];\n    for (let d = 1; d <= dim; d++) {\n      const wd = new Date(y, mo - 1, d).getDay();\n      const isToday = isThisMonth && d === now.getDate();\n      days.push({ day: d, wd: this.WD[wd], isToday, notToday: !isToday });\n    }\n\n    const sumCell = (day, cat) => {\n      const dd = m.days[day]; if (!dd || !dd[cat]) return 0;\n      let t = 0; for (const r of dd[cat]) t += this.pnum(r.amount); return t;\n    };\n    const catTotals = {};\n    this.CATS.forEach(c => { catTotals[c.id] = 0; });\n    for (const day in m.days) {\n      for (const c of this.CATS) {\n        const arr = m.days[day][c.id];\n        if (arr) for (const r of arr) catTotals[c.id] += this.pnum(r.amount);\n      }\n    }\n\n    const overColor = (s, l) => (l > 0 && s > l) ? '#ff3b30' : '#1d1d1f';\n    const rows = this.CATS.map(c => {\n      const cells = days.map(d => {\n        const isSel = sel && sel.day === d.day && sel.cat === c.id;\n        const isEdit = edit && edit.day === d.day && edit.cat === c.id;\n        const isFlash = !!(this._flash && this._flash[d.day + '|' + c.id]);\n        return {\n          display: this.abbr(sumCell(d.day, c.id)),\n          sel: isSel ? 'inset 0 0 0 2px var(--accent,#0a84ff)' : 'none',\n          flash: isFlash ? 'flashCell 1.6s ease' : 'none',\n          editing: isEdit,\n          notEditing: !isEdit,\n          draft: isEdit ? this.state.draft : '',\n          onClick: () => this.selectCell(d.day, c.id),\n          onInput: e => this.setState({ draft: e.target.value }),\n          onKeyDown: e => this.cellKey(e),\n          onBlur: () => { if (this.state.edit) { this.commitEdit(); this.bump(); } },\n          inputRef: el => { this._editInput = el; },\n        };\n      });\n      const tc = c.kind === 'limit' ? overColor(catTotals[c.id], this.pnum(L[c.limitKey])) : '#1d1d1f';\n      return {\n        id: c.id, name: c.name, cells, totalDisp: this.num(catTotals[c.id]) || '0', totalColor: tc,\n        onEnter: e => {\n          const r = e.currentTarget.getBoundingClientRect();\n          this.setState({ hover: { name: c.name, desc: c.desc, top: r.bottom + 6, left: r.left } });\n        },\n        onLeave: () => { if (this.state.hover) this.setState({ hover: null }); },\n      };\n    });\n\n    const dailyTotals = days.map(d => {\n      let t = 0; for (const c of this.CATS) t += sumCell(d.day, c.id);\n      return { display: this.abbr(t) };\n    });\n    let grand = 0; this.CATS.forEach(c => { grand += catTotals[c.id]; });\n\n    const budget = this.pnum(this.data.config.monthlyBudget);\n    const rent = this.pnum(this.data.config.rent);\n    const spent = grand + rent;\n    const remaining = budget - spent;\n    const fundPos = remaining >= 0;\n    const hero = {\n      spentDisp: this.money(spent),\n      budgetDisp: this.money(budget),\n      barW: Math.min(100, budget > 0 ? spent / budget * 100 : 0) + '%',\n      barColor: this.colorFor(spent, budget),\n      fundLabel: fundPos ? 'Залишок місячного бюджету' : 'Перевитрата понад бюджет',\n      fundDisp: this.money(Math.abs(remaining)),\n      fundColor: fundPos ? '#34c759' : '#ff3b30',\n      expanded: this.state.expand,\n      arrow: this.state.expand ? '▴' : '▾',\n      toggle: () => this.setState(s => ({ expand: !s.expand })),\n    };\n\n    const breakItems = [{ name: 'Оренда житла', total: rent, fixed: true }];\n    this.CATS.forEach(c => { if (catTotals[c.id] > 0) breakItems.push({ name: c.name, total: catTotals[c.id], fixed: false }); });\n    breakItems.sort((a, b) => b.total - a.total);\n    const heroBreak = breakItems.map(it => ({ name: it.name, totalDisp: this.money(it.total), fixed: it.fixed }));\n\n    const mkLimit = (name, spentV, lim) => {\n      const rem = lim - spentV;\n      return {\n        name,\n        spentDisp: this.money(spentV), limitDisp: this.money(lim),\n        barW: Math.min(100, lim > 0 ? spentV / lim * 100 : 0) + '%',\n        barColor: this.colorFor(spentV, lim),\n        remLabel: rem >= 0 ? 'Залишок' : 'Перевитрата',\n        remDisp: this.money(Math.abs(rem)),\n        remColor: rem >= 0 ? '#34c759' : '#ff3b30',\n      };\n    };\n    const limitedCards = [\n      mkLimit('Продукти', catTotals.products, this.pnum(L.products)),\n      mkLimit('Їжа поза домом', catTotals.eatingOut, this.pnum(L.eatingOut)),\n      mkLimit('Благодійність / Подарунки', catTotals.charity, this.pnum(L.charity)),\n      mkLimit('Особисті витрати', catTotals.personal, this.pnum(L.personal)),\n    ];\n\n    const inc = m.income;\n    let incTotal = 0; inc.forEach(r => { incTotal += this.pnum(r.amount); });\n    const popId = this.state.incPop ? this.state.incPop.id : null;\n    const incomeList = inc.map((r) => ({\n      id: r.id,\n      labelDisp: (r.label && r.label.trim()) ? r.label : 'Без назви',\n      amountDisp: (this.num(r.amount) || '0') + ' ₴',\n      onEdit: e => this.openPop(r.id, e, false),\n      onDelete: () => this.delIncomeById(r.id),\n    }));\n    const pop = this.state.incPop;\n    let incPopActive = false, incPopTitle = '', popLabel = '', popAmount = '', incPopCanDelete = false;\n    let onPopLabel = () => {}, onPopAmount = () => {}, onPopKey = () => {};\n    if (pop) {\n      const it = inc.find(x => x.id === pop.id);\n      if (it) {\n        incPopActive = true;\n        incPopTitle = pop.isNew ? 'Новий дохід' : 'Редагувати дохід';\n        incPopCanDelete = !pop.isNew;\n        popLabel = it.label; popAmount = it.amount;\n        onPopLabel = e => { it.label = e.target.value; this.save(); this.bump(); };\n        onPopAmount = e => { it.amount = e.target.value; this.save(); this.bump(); };\n        onPopKey = e => { if (e.key === 'Enter') { e.preventDefault(); this.closeIncPop(); } };\n      }\n    }\n\n    let barEmpty = !sel, barActive = !!sel, barCat = '', barDate = '', barRecords = [], barSum = '';\n    if (sel) {\n      const c = this.CATS.find(x => x.id === sel.cat);\n      barCat = c ? c.name : '';\n      barDate = sel.day + ' ' + this.GEN[mo - 1] + ' ' + y;\n      const arr = this.recsOf(sel.day, sel.cat);\n      barSum = this.money(sumCell(sel.day, sel.cat));\n      barRecords = arr.map((r, i) => ({\n        amount: r.amount, comment: r.comment,\n        onAmount: e => { r.amount = e.target.value; this.save(); this.bump(); },\n        onComment: e => { r.comment = e.target.value; this.save(); this.bump(); },\n        onDelete: () => this.delBarRec(i),\n      }));\n    }\n\n    const cfgField = (label, desc, get, set) => ({\n      label, desc, value: get(),\n      onChange: e => { set(e.target.value); this.save(); this.bump(); },\n    });\n    const settingsFields = [\n      cfgField('Місячний бюджет', 'загальний ліміт витрат на місяць', () => this.data.config.monthlyBudget, v => { this.data.config.monthlyBudget = v; }),\n      cfgField('Оренда житла', 'фіксована сума, входить у витрати', () => this.data.config.rent, v => { this.data.config.rent = v; }),\n      cfgField('Продукти', 'ліміт', () => L.products, v => { L.products = v; }),\n      cfgField('Їжа поза домом', 'ліміт', () => L.eatingOut, v => { L.eatingOut = v; }),\n      cfgField('Благодійність / Подарунки', 'ліміт', () => L.charity, v => { L.charity = v; }),\n      cfgField('Особисті витрати', 'ліміт', () => L.personal, v => { L.personal = v; }),\n    ];\n\n    const hv = this.state.hover;\n\n    let nlHasResult = false, nlResultTitle = '', nlChips = [];\n    if (this.state.nlResult) {\n      const r = this.state.nlResult;\n      nlHasResult = true;\n      nlResultTitle = 'Додано ' + r.count + ' ' + this.plural(r.count, 'запис', 'записи', 'записів') + ' на суму ' + this.money(r.total);\n      nlChips = r.entries.slice(0, 14).map(e => {\n        const c = this.CATS.find(x => x.id === e.categoryId);\n        return { text: e.day + ' ' + this.GEN[mo - 1] + ' · ' + (c ? c.name : e.categoryId) + ' · ' + this.fmt(e.amount) + ' ₴' };\n      });\n      if (r.entries.length > 14) nlChips.push({ text: '+' + (r.entries.length - 14) + '…' });\n    }\n\n    return {\n      rootRef: el => { this._root = el; },\n      monthLabel: this.MONTHS[mo - 1] + ' ' + y,\n      days, rows, dailyTotals, grandDisp: this.num(grand) || '0',\n      prevMonth: () => this.shift(-1), nextMonth: () => this.shift(1), goToday: () => this.goToday(), showToday: !isThisMonth,\n      openSettings: () => this.setState({ settings: true }),\n      hero, heroBreak, limitedCards,\n      incomeList, incomeTotalDisp: this.money(incTotal), addIncome: e => this.addIncome(e),\n      incPopActive, incPopTitle, popLabel, popAmount, incPopCanDelete,\n      onPopLabel, onPopAmount, onPopKey,\n      popLabelRef: el => { this._popInput = el; },\n      closeIncPop: () => this.closeIncPop(),\n      closeIncPopBackdrop: e => { if (e.target === e.currentTarget) this.closeIncPop(); },\n      delIncomePop: () => { if (this.state.incPop) this.delIncomeById(this.state.incPop.id); },\n      barEmpty, barActive, barCat, barDate, barRecords, barSum,\n      addBarRec: () => this.addBarRec(),\n      hoverActive: !!hv, hoverName: hv ? hv.name : '', hoverDesc: hv ? hv.desc : '', hoverTop: hv ? hv.top + 'px' : '0px', hoverLeft: hv ? hv.left + 'px' : '0px',\n      nlText: this.state.nlText,\n      nlInput: e => this.setState({ nlText: e.target.value }),\n      nlKey: e => { if (e.key === 'Enter') { e.preventDefault(); this.submitNL(); } },\n      nlPlaceholder: this.state.nlListening ? 'Слухаю… говоріть' : 'Напишіть або надиктуйте витрату: дата, категорія, сума…',\n      submitNL: () => this.submitNL(),\n      toggleVoice: () => this.toggleVoice(),\n      nlListening: this.state.nlListening, nlNotListening: !this.state.nlListening,\n      nlBusy: this.state.nlBusy, nlIdleSend: !this.state.nlBusy,\n      nlHasResult, nlResultTitle, nlChips,\n      undoNL: () => this.undoNL(), dismissResult: () => this.setState({ nlResult: null }),\n      nlHasError: !!this.state.nlError, nlError: this.state.nlError || '',\n      dismissError: () => this.setState({ nlError: null }),\n      settingsOpen: this.state.settings, settingsFields,\n      closeSettings: () => this.setState({ settings: false }),\n      closeSettingsBackdrop: e => { if (e.target === e.currentTarget) this.setState({ settings: false }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
