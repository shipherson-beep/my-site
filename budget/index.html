document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Сімейний бюджет<\u002Ftitle>\n<style id=\"__boot-css\">\n  x-dc{display:none!important}\n  #__boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f5f7;z-index:99999}\n  #__boot .s{width:40px;height:40px;border-radius:50%;border:3px solid rgba(0,0,0,.1);border-top-color:#0a84ff;animation:bootspin .7s linear infinite}\n  @keyframes bootspin{to{transform:rotate(360deg)}}\n<\u002Fstyle>\n<script src=\"73c47c40-60f4-405d-a325-e868ecdb7b74\"><\u002Fscript>\n<script>\n(function(){\n  function ready(){var r=document.getElementById('dc-root');return r&&r.childElementCount>0;}\n  function done(){var b=document.getElementById('__boot');if(b)b.remove();}\n  function tick(){if(ready())done();else requestAnimationFrame(tick);}\n  requestAnimationFrame(tick);\n})();\n<\u002Fscript>\n<\u002Fhead>\n<body>\n<div id=\"__boot\"><div class=\"s\"><\u002Fdiv><\u002Fdiv>\n\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover\">\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='15'%20fill='%230a84ff'/%3E%3Ctext%20x='32'%20y='34'%20font-family='-apple-system,Helvetica,Arial,sans-serif'%20font-size='46'%20font-weight='700'%20fill='%23fff'%20text-anchor='middle'%20dominant-baseline='central'%3E%E2%82%B4%3C/text%3E%3C/svg%3E\">\n<style>\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{margin:0;background:linear-gradient(105deg,#cdeed3 0%,#deefca 52%,#f1efc2 100%);background-attachment:fixed;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}\n  @keyframes fbIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}\n  @keyframes fbFade{from{opacity:0}to{opacity:1}}\n  @keyframes flashCell{0%{background:rgba(10,132,255,.34)}55%{background:rgba(10,132,255,.18)}100%{background:transparent}}\n  @keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}70%{box-shadow:0 0 0 9px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pinShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-10px)}36%{transform:translateX(9px)}54%{transform:translateX(-7px)}72%{transform:translateX(5px)}88%{transform:translateX(-3px)}}\n  .inc-icon-btn{color:#c7c7cc;transition:background .12s,color .12s}\n  .inc-icon-btn:hover{background:#e4e4e7 !important;color:#1d1d1f !important}\n  *{scrollbar-width:none;-ms-overflow-style:none}\n  ::-webkit-scrollbar{width:0;height:0;display:none}\n<\u002Fstyle>\n<script>\n  // === Вхід через Google ===\n  // Встав сюди Client ID з Google Cloud Console (OAuth 2.0 Client → тип \"Web application\").\n  window.GOOGLE_CLIENT_ID = window.GOOGLE_CLIENT_ID || \"592352033511-lblnkdbi0d03704u7u3da6e4gj01e3vq.apps.googleusercontent.com\";\n  // Акаунти Google, яким дозволено вхід (можна змінити):\n  window.BUDGET_ALLOWED_EMAILS = window.BUDGET_ALLOWED_EMAILS || [\"ship.her.son@gmail.com\", \"shiferson.julia@gmail.com\"];\n<\u002Fscript>\n<script src=\"6b146e7c-e4de-4597-b2cb-9d64c3af9246\"><\u002Fscript>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" style=\"{{ rootStyle }}\">\n\n  <sc-if value=\"{{ locked }}\">\n    <div style=\"position:fixed;inset:0;z-index:200;background:#f5f5f7;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;animation:fbIn .3s cubic-bezier(.2,.8,.2,1)\">\n        <div style=\"width:62px;height:62px;border-radius:18px;background:var(--accent,#0a84ff);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(10,132,255,.32);margin-bottom:22px\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:21px;font-weight:700;letter-spacing:-.02em\">Сімейний бюджет<\u002Fdiv>\n        <div style=\"font-size:14px;color:#86868b;margin-top:6px\">{{ lockHint }}<\u002Fdiv>\n\n        <sc-if value=\"{{ authGoogle }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;margin-top:28px\">\n            <div ref=\"{{ googleBtnRef }}\" style=\"min-height:44px;display:flex;justify-content:center\"><\u002Fdiv>\n            <sc-if value=\"{{ googleNotReady }}\">\n              <div style=\"font-size:13px;color:#86868b;text-align:center;max-width:250px;line-height:1.5;margin-top:4px\">{{ googleNotReadyMsg }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ googleErr }}\">\n              <div style=\"font-size:13.5px;color:#ff3b30;text-align:center;max-width:290px;margin-top:16px;line-height:1.45\">{{ googleErr }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ showPinLink }}\">\n              <button onclick=\"{{ usePin }}\" style=\"margin-top:24px;background:none;border:none;color:#86868b;font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px;padding:6px\" style-hover=\"color:#1d1d1f\">Увійти кодом доступу<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ authPin }}\">\n          <div style=\"display:flex;gap:17px;margin-top:28px;animation:{{ pinShake }}\">\n            <sc-for list=\"{{ pinDots }}\" as=\"dot\" hint-placeholder-count=\"4\">\n              <div style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid {{ dot.border }};background:{{ dot.bg }};transition:background .14s ease,border-color .14s ease\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,76px);gap:16px;margin-top:36px\">\n            <sc-for list=\"{{ keypad }}\" as=\"k\" hint-placeholder-count=\"12\">\n              <sc-if value=\"{{ k.isEmpty }}\"><div><\u002Fdiv><\u002Fsc-if>\n              <sc-if value=\"{{ k.isNum }}\">\n                <button onclick=\"{{ k.onClick }}\" style=\"width:76px;height:76px;border-radius:50%;border:none;background:#fff;font-size:29px;font-weight:500;color:#1d1d1f;cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 1px rgba(0,0,0,.04);font-variant-numeric:tabular-nums\" style-hover=\"background:#f0f0f2\" style-active=\"background:#e2e2e7\">{{ k.label }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ k.isDel }}\">\n                <button onclick=\"{{ k.onClick }}\" style=\"width:76px;height:76px;border-radius:50%;border:none;background:transparent;color:#86868b;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#e6e6e9;color:#1d1d1f\">\n                  <svg width=\"27\" height=\"27\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z\"><\u002Fpath><line x1=\"18\" y1=\"9\" x2=\"12\" y2=\"15\"><\u002Fline><line x1=\"12\" y1=\"9\" x2=\"18\" y2=\"15\"><\u002Fline><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ canUseGoogle }}\">\n            <button onclick=\"{{ useGoogle }}\" style=\"margin-top:26px;background:none;border:none;color:#86868b;font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px;padding:6px\" style-hover=\"c >\n          <button onclick=\"{{ closeAI }}\" style=\"flex:none;width:31px;height:31px;border:none;background:#f0f0f2;border-radius:50%;font-size:17px;line-height:1;color:#6e6e73;cursor:pointer;font-family:inherit\" style-hover=\"background:#e5e5ea\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div data-scroll=\"\" style=\"padding:18px 22px 22px;overflow-y:auto;min-height:140px\">\n          <sc-if value=\"{{ aiBusy }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:38px 0;gap:15px\">\n              <span style=\"width:30px;height:30px;border:3px solid #e9e9ec;border-top-color:var(--accent,#0a84ff);border-radius:50%;display:inline-block;animation:spin .7s linear infinite\"><\u002Fspan>\n              <span style=\"font-size:13.5px;color:#86868b\">Аналізую ваш місяць…<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aiHasError }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:15px;padding:28px 0\">\n              <span style=\"width:36px;height:36px;border-radius:50%;background:rgba(255,59,48,.12);color:#ff3b30;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700\">!<\u002Fspan>\n              <span style=\"font-size:13.5px;color:#6e6e73;text-align:center;max-width:360px;line-height:1.45\">{{ aiError }}<\u002Fspan>\n              <button onclick=\"{{ runAI }}\" style=\"height:40px;padding:0 20px;border:none;background:var(--accent,#0a84ff);color:#fff;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"filter:brightness(1.06)\">Спробувати ще раз<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aiEmpty }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:15px;padding:30px 0\">\n              <span style=\"font-size:13.5px;color:#86868b\">Натисніть, щоб згенерув st SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ nlError: 'Голосовий ввід не підтримується у цьому браузері. Введіть витрату текстом.' }); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ nlError: 'Не вдалося увімкнути мікрофон.' }); return; }\n    rec.lang = 'uk-UA'; rec.continuous = true; rec.interimResults = true;\n    this._voiceBase = this.state.nlText ? (this.state.nlText.trim() + ' ') : '';\n    rec.onresult = (e) => {\n      let t = '';\n      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;\n      this.setState({ nlText: this.normalizeNumbers(this._voiceBase + t) });\n    };\n    rec.onerror = (e) => {\n      const err = e && e.error;\n      let msg = 'Помилка мікрофона.';\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = 'Доступ до мікрофона заборонено. Дозвольте його у браузері.';\n      else if (err === 'no-speech') msg = null;\n      this._recog = null;\n      this.setState({ nlListening: false, nlError: msg });\n    };\n    rec.onend = () => { this._recog = null; this.setState({ nlListening: false }); };\n    this._recog = rec;\n    try { rec.start(); this.setState({ nlListening: true, nlError: null, nlResult: null }); }\n    catch (e) { this._recog = null; this.setState({ nlListening: false }); }\n  }\n  stopVoice() { if (this._recog) { try { this._recog.stop(); } catch (e) {} } this.setState({ nlListening: false }); }\n\n  async submitNL() {\n    const text = (this.state.nlText || '').trim();\n    if (!text || this.state.nlBusy) return;\n    if (this.state.nlListening) this.stopVoice();\n    this.setState({ nlBusy: true, nlError: null, nlResult: null });\n    try {\n      const ops = await this.parseNL(text);\n      this.applyOps(ops);\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Розпізнавання тексту наразі недоступне.'\n        : (m || 'Не вдалося обробити efined' && window.BUDGET_DATA_URL) return window.BUDGET_DATA_URL;\n    return this.apiUrl().replace(/parse(\\/?)$/, 'data$1');\n  }\n  adoptServer(server) {\n    const keepMonth = this.data ? this.data.currentMonth : server.currentMonth;\n    this.data = server;\n    if (!this.data.months) this.data.months = {};\n    if (!this.data.config) this.data.config = this.defaultData().config;\n    if (!this.data.config.limits) this.data.config.limits = this.defaultData().config.limits;\n    this.data.currentMonth = keepMonth || server.currentMonth || this.defaultData().currentMonth;\n    this._init = true;\n    this.maybeSeed();\n    this.reconcileRent();\n    this.saveLocal();\n    this.bump();\n  }\n  // Перший запуск: тягне спільні дані з сервера. Якщо сервер новіший — приймає його,\n  // інакше (сервер порожній/старіший) — піднімає локальні дані вгору.\n  async cloudLoad() {\n    if (this._cloudLoaded) return;\n    this._cloudLoaded = true;\n    this.setState({ sync: 'syncing' });\n    let server = null;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n      const j = await r.json();\n      server = j && j.data;\n    } catch (e) { this.setState({ sync: 'offline' }); return; }\n    const localT = (this.data && this.data._updatedAt) || 0;\n    const serverT = (server && server._updatedAt) || 0;\n    if (server && server.config && serverT >= localT) {\n      this.adoptServer(server);\n      this.setState({ sync: 'synced' });\n    } else {\n      this.setState({ sync: 'synced' });\n      this.cloudSave(true);\n    }\n  }\n  // Періодична перевірка: підхоплює зміни, зроблені на іншому пристрої.\n  async cloudPull() {\n    if (typeof document !== 'undefined' && document.hidden) return;\n    if (!this.state.unlocked) return;\n    if (this.state.edit || this.state.nlBusy || this._cloudTimer || !this._cloudLoaded) return;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json();\n      const server = j && j.data;\n      const serverT = (server && server._updatedAt) || 0;\n      const localT = (this.data && this.data._updatedAt) || 0;\n      if (server && server.config && serverT > localT) {\n        this.adoptServer(server);\n        this.setState({ sync: 'synced' });\n      }\n    } catch (e) {}\n  }\n  // Запис у хмару (з дебаунсом, щоб не смикати сервер на кожну літеру).\n  cloudSave(immediate) {\n    clearTimeout(this._cloudTimer);\n    const doIt = async () => {\n      this._cloudTimer = null;\n      this.setState({ sync: 'syncing' });\n      try {\n        const r = await fetch(this.dataUrl(), {\n          method: 'POST', headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n          body: JSON.stringify({ data: this.data }),\n        });\n        if (r.status === 401 || r.status === 403) { this._on401(); return; }\n        if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n        this.setState({ sync: 'synced' });\n      } catch (e) { this.setState({ sync: 'offline' }); }\n    };\n    if (immediate) doIt(); else this._cloudTimer = setTimeout(doIt, 1000);\n  }\n  forceSync() { this.cloudSave(true); this.cloudPull(); }\n\n  // ---- Присутність: «хто зараз на сайті» (аватарки родини в шапці) ----\n  // Адреса виводиться з dataUrl (.../data → .../presence) або window.BUDGET_PRESENCE_URL.\n  presenceUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_PRESENCE_URL) return window.BUDGET_PRESENCE_URL;\n    return this.dataUrl().replace(/data(\\/?)$/, 'presence$1');\n  }\n  myAuth() {\n    try { return JSON.parse(localStorage.getItem('familyBudget_auth') || 'null') || {}; } catch (e) { return {}; }\n  }\n  // Один пульс: повідомляємо серверу, що ми тут, і отримуємо список активних.\n  async presenceBeat() {\n    if (!this.usesServer() || !this.state.unlocked || !this.sessionToken()) return;\n    if (typeof document !== 'undefined' && document.hidden) return;\n    const me = this.myAuth();\n    try {\n      const r = await fetch(this.presenceUrl(), {\n        method: 'POST',\n        headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n        body: JSON.stringify({ name: me.name || '', picture: me.picture || '' }),\n      });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json().catch(() => null);\n      const users = (j && Array.isArray(j.users) ? j.users : []);\n      this.setState({ presence: users });\n    } catch (e) { /* офлайн — мовчки */ }\n  }\n  startPresence() {\n    if (this._presenceTimer || !this.usesServer()) return;\n    this.presenceBeat();\n    this._presenceTimer = setInterval(() => this.presenceBeat(), 20000);\n  }\n  stopPresence() {\n    clearInterval(this._presenceTimer); this._presenceTimer = null;\n    this.setState({ presence: [] });\n  }\n\n  // Чистка артефактів голосового вводу: STT пише \"девʼять тисяч\" як \"9 1000\",\n  // \"шість тисяч сто\" як \"6 1000 100\", \"пʼять мільйонів\" як \"5 1.000.000\".\n  // Склеюємо детерміновано, ще ДО моделі, щоб не залежати від її примх.\n  normalizeNumbers(text) {\n    let s = String(text || '');\n    // 1.000.000 / 1.000 (крапки як розділювач тисяч) -> чисті цифри\n    s = s.replace(/\\b\\d{1,3}(?:\\.\\d{3})+\\b/g, m => m.replace(/\\./g, ''));\n    // множник цифрою (потрібен пробіл, інакше \"6100\" зламалося б): \"9 1000\" -> 9000\n    s = s.replace(/\\b(\\d{1,4})\\s+(1000000|1000|100)(?!\\d)/g, (m, a, b) => {\n      const A = parseInt(a, 10), B = parseInt(b, 10);\n      return A < B ? String(A * B) : m;\n    });\n    // множник словом (пробіл необовʼязковий): \"5 тисяч\"/\"5тис\"/\"2 млн\" -> 5000/5000/2000000\n    s = s.replace(/\\b(\\d{1,4})\\s*(тисяч[іья]?|тис\\.?|млн\\.?|мільйон(?:а|и|ів|ом)?|сотн[іяь]|сотень|сот\\.?)(?![а-яіїєґ'ʼА-ЯІЇЄҐ\\d])/gi, (m, a, b) => {\n      const A = parseInt(a, 10);\n      const lb = b.toLowerCase();\n      let B;\n      if (lb.startsWith('тис')) B = 1000;\n      else if (lb.startsWith('млн') || lb.startsWith('міль')) B = 1000000;\n      else if (lb.startsWith('сот')) B = 100;\n      else return m;\n      return A < B ? String(A * B) : m;\n    });\n    // хвіст складеного числівника: \"6000 100\" -> 6100, \"500 50\" -> 550 (ітеративно)\n    let prev;\n    do {\n      prev = s;\n      s = s.replace(/\\b(\\d{2,})\\s+(\\d{1,3})\\b/g, (m, a, b) => {\n        const A = parseInt(a, 10), B = parseInt(b, 10);\n        if (B > 0 && A % 1000 === 0 && B < 1000) return String(A + B);\n        if (B > 0 && A % 100 === 0 && B < 100) return String(A + B);\n        return m;\n      });\n    } while (s !== prev);\n    return s;\n  }\n\n  async parseNL(text) {\n    text = this.normalizeNumbers(text);\n    const [y, mo] = this.cm().split('-').map(Number);\n    const dim = this.daysInMonth();\n    const today = new Date();\n    const cats = this.CATS.map(c => `${c.id} = ${c.name}${c.desc ? ' (' + c.desc + ')' : ''}`).join('\\n');\n    // Знімок наявних записів місяця — щоб модель точно знаходила суму/день/категорію\n    // для видалення, заміни чи перенесення.\n    const m = this.month();\n    const snapLines = [];\n    Object.keys(m.days).map(Number).sort((a, b) => a - b).forEach(d => {\n      const parts = [];\n      this.CATS.forEach(c => {\n        const arr = m.days[d] && m.days[d][c.id];\n        if (arr && arr.length) {\n          const amts = arr.map(r => this.pnum(r.amount) + (r.comment ? ' «' + r.comment + '»' : '')).join(', ');\n          parts.push(c.id + ': ' + amts);\n        }\n      });\n      if (parts.length) snapLines.push(`день ${d} → ` + parts.join('; '));\n    });\n    const snapshot = snapLines.length ? snapLines.join('\\n') : '(місяць поки порожній)';\n    const prompt =\n`Ти — асистент-редактор таблиці сімейного бюджету. Перетвори текст/диктовку користувача українською на список ОПЕРАЦІЙ над таблицею у форматі JSON. Користувач може ДОДАВАТИ, ВИДАЛЯТИ, ЗМІНЮВАТИ та ПЕРЕНОСИТИ суми.\n\nКатегорії (використовуй id зліва):\n${cats}\n\nКонтекст:\n- Таблиця показує місяць: ${this.MONTHS[mo - 1]} ${y} (номер місяця ${mo}, днів у місяці: ${dim}).\n- Сьогодні: ${today.getDate()} число, місяць ${today.getMonth() + 1}, ${today.getFullYear()} рік.\n\nНаявні записи цього місяця (для пошуку сум при видаленні/заміні/перенесенні):\n${snapshot}\n\nТипи операцій (поле \"action\"):\n- \"add\" — додати суму. Поля: day, category, amount, comment.\n- \"delete\" — видалити наявну суму. Поля: day, category, amount (та сума, яку треба прибрати), comment (якщо названо). Напр. \"видали з 7 числа 500 у продуктах\" → {\"action\":\"delete\",\"day\":7,\"category\":\"products\",\"amount\":500}.\n- \"edit\" — замінити наявну суму на іншу в тій самій клітинці. Поля: day, category, amount (стара сума), newAmount (нова сума). Напр. \"замість 500 впиши 650 у продуктах за 7\" → {\"action\":\"edit\",\"day\":7,\"category\":\"products\",\"amount\":500,\"newAmount\":650}.\n- \"move\" — перенести суму з однієї категорії в іншу (той самий день). Поля: day, from (категорія-джерело), to (категорія-призначення), amount. Напр. \"перенеси 300 з продуктів у ресторани за 7\" → {\"action\":\"move\",\"day\":7,\"from\":\"products\",\"to\":\"eatingOut\",\"amount\":300}.\n\nПравила:\n- Кожна сума при додаванні = окрема операція \"add\". Напр. \"продукти 120, 500, 800\" → три \"add\" з amount 120, 500, 800.\n- Якщо тип дії не названо явно (просто \"продукти 120\") — це \"add\".\n- \"day\" = номер дня в показаному місяці (1..${dim}). Розпізнавай дати: \"сьоме червня\"=7, \"за 7 червня\"=7, \"7.06\"=7. \"сьогодні\" = ${today.getDate()}, \"вчора\" = ${today.getDate() - 1}. Якщо для add дату не вказано — використай число \"сьогодні\", якщо воно в межах місяця, інакше 1. Якщо для delete/edit/move день не названо, але суму однозначно видно у знімку вище — постав той день, де ця сума є.\n- Для delete/edit/move бери amount/категорію САМЕ так, як у знімку наявних записів (та сама сума, що реально існує). Не вигадуй суми, яких немає.\n- amount = додатне число у гривнях. Ігноруй \"грн\", \"₴\", \"гривень\".\n- Числа вже здебільшого нормалізовані. Якщо бачиш розбитий числівник (\"9 1000\" = 9000, \"5 тисяч\" = 5000, \"5 100\" = 500, \"півтори тисячі\" = 1500) — склади в одне число. Кома/«і»/окремі суми (\"120, 500\") — це РІЗНІ операції.\n- comment = короткий опис, якщо названо конкретну річ (напр. \"таксі\"), інакше \"\".\n- Сторонній текст ігноруй.\n\nТекст користувача:\n\"\"\"${text}\"\"\"\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у такій формі:\n{\"ops\":[{\"action\":\"add\",\"day\":7,\"category\":\"products\",\"amount\":120,\"comment\":\"\"}]}`;\n    const raw = await this.complete(prompt);\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('parse'); }\n    const ids = this.CATS.map(c => c.id);\n    const valid = id => ids.includes(id) ? id : null;\n    // Зворотна сумісність зі старим форматом {\"entries\":[...]}\n    const list = data.ops || (data.entries ? data.entries.map(e => ({ action: 'add', day: e.day, category: e.categoryId, amount: e.amount, comment: e.comment })) : []);\n    return list.map(o => {\n      const action = ['add', 'delete', 'edit', 'move'].includes(o.action) ? o.action : 'add';\n      const day = Math.max(1, Math.min(dim, parseInt(o.day, 10) || 0));\n      const amount = Math.round(parseFloat(o.amount) || 0);\n      const comment = (o.comment || '').toString().slice(0, 60);\n      if (action === 'move') return { action, day, fromCatId: valid(o.from), toCatId: valid(o.to), amount, comment };\n      if (action === 'edit') return { action, day, categoryId: valid(o.category), amount, newAmount: Math.round(parseFloat(o.newAmount) || 0), comment };\n      return { action, day, categoryId: valid(o.category), amount, comment };\n    }).filter(o => {\n      if (o.day < 1 || !o.amount) return false;\n      if (o.action === 'move') return o.fromCatId && o.toCatId && o.fromCatId !== o.toCatId;\n      if (o.action === 'edit') return o.categoryId && o.newAmount > 0;\n      return o.categoryId;\n    });\n  }\n\n  // Знайти наявний запис за днем/категорією/сумою (для delete/edit/move).\n  // Спочатку шукає на вказаному дні+категорії; якщо ні — однозначний збіг по всьому місяцю;\n  // якщо категорію не вказано — однозначний збіг у межах дня.\n  locateRec(day, catId, amount, comment) {\n    const m = this.month();\n    const cmt = (comment || '').toLowerCase();\n    const matchIn = (arr) => {\n      if (!arr || !arr.length) return -1;\n      if (cmt) {\n        const i = arr.findIndex(r => this.pnum(r.amount) === amount && (r.comment || '').toLowerCase().indexOf(cmt) >= 0);\n        if (i >= 0) return i;\n      }\n      return arr.findIndex(r => this.pnum(r.amount) === amount);\n    };\n    if (day && catId && m.days[day]) {\n      const i = matchIn(m.days[day][catId]);\n      if (i >= 0) return { day, catId, idx: i };\n    }\n    if (catId) {\n      const hits = [];\n      for (const d in m.days) { const i = matchIn(m.days[d][catId]); if (i >= 0) hits.push({ day: +d, catId, idx: i }); }\n      if (hits.length === 1) return hits[0];\n      if (hits.length > 1 && day) { const od = hits.find(h => h.day === day); if (od) return od; }\n    }\n    if (day && !catId && m.days[day]) {\n      const hits = [];\n      this.CATS.forEach(c => { const i = matchIn(m.days[day][c.id]); if (i >= 0) hits.push({ day, catId: c.id, idx: i }); });\n      if (hits.length === 1) return hits[0];\n    }\n    return null;\n  }\n\n  applyOps(ops) {\n    const mo = this.month();\n    this._undoSnap = JSON.stringify(this.data.months[this.cm()]);\n    const flash = {};\n    const applied = [], skipped = [];\n    const cleanup = (d, cat) => {\n      if (mo.days[d] && mo.days[d][cat] && !mo.days[d][cat].length) {\n        delete mo.days[d][cat];\n        if (!Object.keys(mo.days[d]).length) delete mo.days[d];\n      }\n    };\n    ops.forEach(op => {\n      if (op.action === 'add') {\n        if (!mo.days[op.day]) mo.days[op.day] = {};\n        if (!mo.days[op.day][op.categoryId]) mo.days[op.day][op.categoryId] = [];\n        mo.days[op.day][op.categoryId].push({ id: this.uid(), amount: String(op.amount), comment: op.comment || '' });\n        flash[op.day + '|' + op.categoryId] = true;\n        applied.push(op);\n        return;\n      }\n      if (op.action === 'delete') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'edit') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId][loc.idx].amount = String(op.newAmount);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'move') {\n        const loc = this.locateRec(op.day, op.fromCatId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        const rec = mo.days[loc.day][loc.catId][loc.idx];\n        const keptComment = rec.comment || op.comment || '';\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        if (!mo.days[loc.day]) mo.days[loc.day] = {};\n        if (!mo.days[loc.day][op.toCatId]) mo.days[loc.day][op.toCatId] = [];\n        mo.days[loc.day][op.toCatId].push({ id: this.uid(), amount: String(op.amount), comment: keptComment });\n        flash[loc.day + '|' + loc.catId] = true;\n        flash[loc.day + '|' + op.toCatId] = true;\n        applied.push({ ...op, day: loc.day, fromCatId: loc.catId });\n        return;\n      }\n    });\n    if (!applied.length) {\n      this._undoSnap = null;\n      const msg = skipped.length\n        ? 'Не знайшов відповідних записів для зміни. Уточніть день, категорію або суму.'\n        : 'Не вдалося розпізнати запит. Спробуйте: «видали з 7 числа 500 у продуктах».';\n      this.setState({ nlBusy: false, nlError: msg });\n      return;\n    }\n    this.save();\n    this._flash = flash;\n    this.setState({ nlBusy: false, nlText: '', nlListening: false, nlResult: { applied, skipped } });\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._resultTimer);\n    this._resultTimer = setTimeout(() => { if (this.state.nlResult) this.setState({ nlResult: null }); }, 5000);\n  }\n  undoNL() {\n    clearTimeout(this._resultTimer);\n    if (this._undoSnap) { this.data.months[this.cm()] = JSON.parse(this._undoSnap); this._undoSnap = null; this.save(); }\n    this._flash = null;\n    this.setState({ nlResult: null });\n  }\n\n  // ---- AI аналіз місяця (та сама модель, що й для текстового вводу) ----\n  catTotalsFor(key) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  openAI() {\n    this.setState({ aiOpen: true });\n    const r = this.state.aiResult;\n    if (!this.state.aiBusy && (!r || r.month !== this.cm())) this.runAI();\n  }\n  async runAI() {\n    if (this.state.aiBusy) return;\n    this.setState({ aiBusy: true, aiError: null });\n    try {\n      const prompt = this.buildAnalysisPrompt();\n      const raw = await this.complete(prompt);\n      const result = this.parseAnalysis(raw);\n      if (!result.insights.length && !result.summary) throw new Error('Порожня відповідь. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiResult: result });\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Аналіз наразі недоступний.'\n        : (m || 'Не вдалося виконати аналіз. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiError: msg });\n    }\n  }\n  buildAnalysisPrompt() {\n    const cm = this.cm();\n    const [y, mo] = cm.split('-').map(Number);\n    const now = new Date();\n    const isThisMonth = (y === now.getFullYear() && mo === now.getMonth() + 1);\n    const dim = this.daysInMonth();\n    const dayNow = isThisMonth ? now.getDate() : dim;\n    const cur = this.catTotalsFor(cm);\n    const pd = new Date(y, mo - 2, 1);\n    const pkey = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');\n    const pm = this.data.months[pkey];\n    const prevExists = !!(pm && pm.days && Object.keys(pm.days).length);\n    const prev = this.catTotalsFor(pkey);\n    const L = this.data.config.limits;\n    const budget = this.pnum(this.data.config.monthlyBudget);\n    const rent = this.pnum(this.monthRent());\n    const m = this.month();\n    let spent = rent; this.CATS.forEach(c => { spent += cur[c.id]; });\n    let incomeTotal = 0; m.income.forEach(r => { incomeTotal += this.pnum(r.amount); });\n    const incLines = m.income.filter(r => this.pnum(r.amount) > 0).map(r => `${(r.label && r.label.trim()) || 'Без назви'}: ${Math.round(this.pnum(r.amount))}`);\n\n    const catLines = this.CATS.map(c => {\n      const lim = c.limitKey ? this.pnum(L[c.limitKey]) : 0;\n      const limTxt = lim ? `, ліміт ${lim}` : '';\n      const prevTxt = prevExists ? `, минулого місяця ${Math.round(prev[c.id])}` : '';\n      return `- ${c.name}: ${Math.round(cur[c.id])} грн${limTxt}${prevTxt}`;\n    }).join('\\n');\n\n    const recs = [];\n    for (const day in m.days) for (const c of this.CATS) {\n      const arr = m.days[day][c.id];\n      if (arr) for (const r of arr) { const a = this.pnum(r.amount); if (a > 0) recs.push({ day: +day, cat: c.name, a, com: r.comment || '' }); }\n    }\n    recs.sort((a, b) => b.a - a.a);\n    const topLines = recs.slice(0, 7).map(r => `- ${r.day} число, ${r.cat}: ${Math.round(r.a)} грн${r.com ? ` (${r.com})` : ''}`).join('\\n');\n\n    return `Ти — фінансовий помічник для подружньої пари, що веде спільний сімейний бюджет. Проаналізуй місяць і дай 3–5 коротких, конкретних і дійсно корисних спостережень українською. Звертайся до пари на «ви».\n\nМісяць: ${this.MONTHS[mo - 1]} ${y}. ${isThisMonth ? `Місяць ще триває, сьогодні ${dayNow} число з ${dim}.` : `Місяць завершений (${dim} днів).`}\n\nЗагальне:\n- Місячний бюджет (ліміт): ${budget} грн\n- Витрачено разом, з орендою: ${Math.round(spent)} грн\n- Оренда житла: ${rent} грн\n- Залишок бюджету: ${Math.round(budget - spent)} грн\n- Додатковий дохід за місяць: ${Math.round(incomeTotal)} грн${incLines.length ? ` (${incLines.join('; ')})` : ''}\n\nВитрати за категоріями:\n${catLines}\n\nНайбільші окремі витрати:\n${topLines || '- немає'}\n\nДай спостереження, що справді корисні парі: де перевитрата над лімітом; помітні зміни проти минулого місяця (зростання/зниження); чи встигають вкластися в бюджет (врахуй, скільки днів минуло, якщо місяць триває); найбільші витрати; де реально можна зекономити; що йде добре. Не вигадуй даних, яких немає. Будь конкретним із сумами в гривнях. Уникай банальних і очевидних порад.\n\nКожне спостереження має поле type: \"positive\" (щось добре), \"warning\" (звернути увагу), \"alert\" (перевитрата або ризик), \"tip\" (конкретна порада), \"info\" (нейтральний факт).\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у формі:\n{\"summary\":\"одне-два речення загального підсумку місяця\",\"insights\":[{\"type\":\"warning\",\"title\":\"короткий заголовок\",\"detail\":\"1-2 речення з конкретикою та сумами\"}]}`;\n  }\n  parseAnalysis(raw) {\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('Не вдалося прочитати відповідь моделі. Спробуйте ще раз.'); }\n    const types = ['positive', 'warning', 'alert', 'tip', 'info'];\n    const insights = (data.insights || []).slice(0, 6).map(i => ({\n      type: types.includes(i.type) ? i.type : 'info',\n      title: (i.title || '').toString().slice(0, 90),\n      detail: (i.detail || '').toString().slice(0, 400),\n    })).filter(i => i.title || i.detail);\n    return { month: this.cm(), summary: (data.summary || '').toString().slice(0, 400), insights };\n  }\n\n  // ---- Статистика за весь період ----\n  STAT_COLORS() {\n    return { products:'#0a84ff', eatingOut:'#ff9f0a', home:'#34c759', subs:'#5ac8fa',\n             family:'#af52de', health:'#ff375f', work:'#64d2ff', transport:'#ffcc00',\n             leisure:'#30d158', charity:'#bf5af2', personal:'#ff6482' };\n  }\n  // Збирає по-місячну агрегацію по всій історії (категорії, оренда, дохід, найбільші витрати, по днях).\n  allStatMonths() {\n    const all = [];\n    const cfgRent = this.pnum(this.data.config.rent);\n    for (const key in this.data.months) {\n      const parts = key.split('-'); const yy = +parts[0], mm = +parts[1];\n      if (!yy || !mm) continue;\n      const M = this.data.months[key];\n      const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n      let catSum = 0, recCount = 0, biggest = null;\n      const dayTotals = {};\n      if (M && M.days) {\n        for (const d in M.days) {\n          for (const c of this.CATS) {\n            const arr = M.days[d][c.id];\n            if (!arr) continue;\n            for (const r of arr) {\n              const v = this.pnum(r.amount);\n              if (v <= 0) continue;\n              byCat[c.id] += v; catSum += v; recCount++;\n              dayTotals[d] = (dayTotals[d] || 0) + v;\n              if (!biggest || v > biggest.a) biggest = { a: v, cat: c.id, day: +d, com: r.comment || '' };\n            }\n          }\n        }\n      }\n      let income = 0; if (M && M.income) M.income.forEach(r => income += this.pnum(r.amount));\n      if (catSum <= 0 && income <= 0) continue;\n      const rent = (M && M.rent != null && M.rent !== '') ? this.pnum(M.rent) : (catSum > 0 ? cfgRent : 0);\n      all.push({ key, y: yy, mo: mm, byCat, catSum, rent, income, spent: catSum + rent, recCount, biggest, dayTotals });\n    }\n    all.sort((a, b) => a.key < b.key ? -1 : (a.key > b.key ? 1 : 0));\n    return all;\n  }\n  filterStatMonths(all, period) {\n    if (period === 'last12') return all.slice(-12);\n    const yr = parseInt(period, 10);\n    if (period !== 'all' && yr) return all.filter(m => m.y === yr);\n    return all;\n  }\n  buildStats(accent) {\n    const COL = this.STAT_COLORS();\n    const RENT_COL = '#8e8e93';\n    const all = this.allStatMonths();\n    const period = this.state.statsPeriod || 'all';\n    const months = this.filterStatMonths(all, period);\n\n    const years = Array.from(new Set(all.map(m => m.y))).sort((a, b) => b - a);\n    const chipDef = [{ key: 'all', label: 'Увесь час' }];\n    if (all.length > 12) chipDef.push({ key: 'last12', label: 'Останні 12 міс' });\n    years.forEach(yy => chipDef.push({ key: String(yy), label: String(yy) }));\n    const chipStyle = act => 'flex:none;height:32px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:560;font-family:inherit;cursor:pointer;transition:background .12s;' +\n      (act ? 'background:var(--accent,#0a84ff);color:#fff;border:1px solid var(--accent,#0a84ff);' : 'background:#fff;color:#1d1d1f;border:1px solid rgba(0,0,0,.1);');\n    const statsChips = chipDef.map(c => ({ key: c.key, label: c.label, style: chipStyle(period === c.key),\n      onClick: () => this.setState({ statsPeriod: c.key, statHover: null }) }));\n\n    if (!months.length) {\n      return { empty: true, statsChips, periodLabel: 'Немає даних', kpis: [], monthBars: [], catBars: [], shareSegs: [], catTrends: [], weekdayBars: [], seasonBars: [], facts: [], avgDisp: '', avgPct: '0%', barGap: '4px' };\n    }\n\n    const first = months[0], last = months[months.length - 1];\n    let total = 0, totalRent = 0, totalIncome = 0, totalRec = 0;\n    const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n    let maxM = months[0], minM = months[0];\n    months.forEach(mm => {\n      total += mm.spent; totalRent += mm.rent; totalIncome += mm.income; totalRec += mm.recCount;\n      this.CATS.forEach(c => byCat[c.id] += mm.byCat[c.id]);\n      if (mm.spent > maxM.spent) maxM = mm;\n      if (mm.spent < minM.spent) minM = mm;\n    });\n    const totalCat = total - totalRent;\n    const n = months.length;\n    const avg = total / n;\n    const monthsWord = this.plural(n, 'місяць', 'місяці', 'місяців');\n    const rangeLabel = this.MONTHS_SHORT[first.mo - 1].toLowerCase() + ' ' + first.y + ' – ' + this.MONTHS_SHORT[last.mo - 1].toLowerCase() + ' ' + last.y;\n    const periodLabel = (n > 1 ? rangeLabel + ' · ' : '') + n + ' ' + monthsWord;\n\n    // KPI\n    const kpis = [\n      { label: 'Всього витрачено', value: this.money(total), sub: 'за ' + n + ' ' + monthsWord, color: '#1d1d1f' },\n      { label: 'В середньому / місяць', value: this.money(avg), sub: 'включно з орендою', color: '#1d1d1f' },\n      { label: 'Найдорожчий місяць', value: this.money(maxM.spent), sub: this.MONTHS[maxM.mo - 1] + ' ' + maxM.y, color: '#ff453a' },\n      { label: 'Найекономніший місяць', value: this.money(minM.spent), sub: this.MONTHS[minM.mo - 1] + ' ' + minM.y, color: '#34c759' },\n    ];\n\n    // Динаміка по місяцях\n    const maxSpent = Math.max.apply(null, months.map(m => m.spent).concat([1]));\n    const multiYear = new Set(months.map(m => m.y)).size > 1;\n    const monthBars = months.map((mm, i) => {\n      let color = accent;\n      if (mm.key === maxM.key) color = '#ff453a';\n      else if (mm.key === minM.key) color = '#34c759';\n      const label = multiYear ? ((i === 0 || mm.mo === 1) ? String(mm.y) : '') : this.MONTHS_SHORT[mm.mo - 1];\n      const lines = ['Витрати: ' + this.money(mm.spent)];\n      if (mm.income > 0) lines.push('Дохід: +' + this.money(mm.income));\n      return {\n        hPct: (mm.spent / maxSpent * 100) + '%', color, label,\n        onEnter: e => { const r = e.currentTarget.getBoundingClientRect(); this.setState({ statHover: { title: this.MONTHS[mm.mo - 1] + ' ' + mm.y, lines, top: r.top - 6, left: r.left + r.width / 2 } }); },\n        onLeave: () => { if (this.state.statHover) this.setState({ statHover: null }); },\n      };\n    });\n    const barGap = n > 36 ? '2px' : (n > 18 ? '3px' : '6px');\n    const avgPct = (avg / maxSpent * 100) + '%';\n\n    // Структура витрат\n    const catItems = this.CATS.map(c => ({ id: c.id, name: c.name, total: byCat[c.id], color: COL[c.id] }));\n    if (totalRent > 0) catItems.push({ id: 'rent', name: 'Оренда житла', total: totalRent, color: RENT_COL });\n    catItems.sort((a, b) => b.total - a.total);\n    const visible = catItems.filter(c => c.total > 0);\n    const maxCat = Math.max.apply(null, visible.map(c => c.total).concat([1]));\n    const catBars = visible.map(c => ({ name: c.name, color: c.color, wPct: (c.total / maxCat * 100) + '%', amountDisp: this.money(c.total), pctDisp: (total > 0 ? Math.round(c.total / total * 100) : 0) + '%' }));\n    const shareSegs = visible.map(c => ({ color: c.color, wPct: (c.total / (total || 1) * 100) + '%' }));\n\n    // Тренди по категоріях (sparkline + напрям)\n    const catTrends = this.CATS.map(c => {\n      const series = months.map(m => m.byCat[c.id]);\n      const tot = series.reduce((a, b) => a + b, 0);
