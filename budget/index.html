  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      }

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ilyVal = totalDays > 0 ? totalSpend / totalDays : 0;\n    this._avgDailyStamp = stamp;\n    return this._avgDailyVal;\n  }\n\n  plural(n, one, few, many) {\n    n = Math.abs(n) % 100; const n1 = n % 10;\n    if (n > 10 && n < 20) return many;\n    if (n1 > 1 && n1 < 5) return few;\n    if (n1 === 1) return one;\n    return many;\n  }\n\n  // ---- Natural-language / voice entry ----\n  toggleVoice() { if (this.state.nlListening) this.stopVoice(); else this.startVoice(); }\n  startVoice() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ nlError: 'Голосовий ввід не підтримується у цьому браузері. Введіть витрату текстом.' }); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ nlError: 'Не вдалося увімкнути мікрофон.' }); return; }\n    rec.lang = 'uk-UA'; rec.continuous = true; rec.interimResults = true;\n    this._voiceBase = this.state.nlText ? (this.state.nlText.trim() + ' ') : '';\n    rec.onresult = (e) => {\n      let t = '';\n      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;\n      this.setState({ nlText: this.normalizeNumbers(this._voiceBase + t) });\n    };\n    rec.onerror = (e) => {\n      const err = e && e.error;\n      let msg = 'Помилка мікрофона.';\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = 'Доступ до мікрофона заборонено. Дозвольте його у браузері.';\n      else if (err === 'no-speech') msg = null;\n      this._recog = null;\n      this.setState({ nlListening: false, nlError: msg });\n    };\n    rec.onend = () => { this._recog = null; this.setState({ nlListening: false }); };\n    this._recog = rec;\n    try { rec.start(); this.setState({ nlListening: true, nlError: null, nlResult: null }); }\n    catch (e) { this._recog = null; this.setState({ nlListening: false }); }\n  }\n  stopVoice() { if (this._recog) { try { this._recog.stop(); } catch (e) {} } this.setState({ nlListening: false }); }\n\n  async submitNL() {\n    const text = (this.state.nlText || '').trim();\n    if (!text || this.state.nlBusy) return;\n    if (this.state.nlListening) this.stopVoice();\n    this.setState({ nlBusy: true, nlError: null, nlResult: null });\n    try {\n      const ops = await this.parseNL(text);\n      this.applyOps(ops);\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Розпізнавання тексту наразі недоступне.'\n        : (m || 'Не вдалося обробити запит. Спробуйте ще раз.');\n      this.setState({ nlBusy: false, nlError: msg });\n    }\n  }\n\n  // Адреса серверної функції. За замовчуванням — відносний шлях \"api/parse\"\n  // (працює і в корені, і в підпапці типу /budget/).\n  // Якщо функція живе на іншому домені (напр. окремий проєкт Vercel),\n  // задайте window.BUDGET_API_URL у самому HTML повною адресою, напр.:\n  //   window.BUDGET_API_URL = \"https://мій-проєкт.vercel.app/api/parse\";\n  apiUrl() {\n    return (typeof window !== 'undefined' && window.BUDGET_API_URL) || 'api/parse';\n  }\n\n  // Універсальний виклик моделі.\n  // У прототипі використовується вбудований місток window.claude.complete.\n  // На реальному сайті його немає — тоді запит іде на ваш сервер,\n  // який додає секретний ключ OpenAI і звертається до моделі.\n  async complete(prompt) {\n    if (window.claude && window.claude.complete) {\n      return await window.claude.complete(prompt);\n    }\n    const url = this.apiUrl();\n    let r;\n    try {\n      r = await fetch(url, {\n        method: 'POST',\n        headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n        body: JSON.stringify({ prompt }),\n      });\n    } catch (e) { throw new Error('Сервер недоступний (' + url + '). Перевірте адресу функції та що вона задеплоєна.'); }\n    if (r.status === 401 || r.status === 403) { this._on401(); throw new Error('Сесія застаріла. Увійдіть знову.'); }\n    let data;\n    try { data = await r.json(); } catch (e) { data = null; }\n    if (!r.ok) {\n      const srv = (data && data.error) ? data.error : ('HTTP ' + r.status);\n      throw new Error('OpenAI: ' + srv);\n    }\n    return (data && data.text) || '';\n  }\n\n  // ---- Хмарна синхронізація (спільні дані на всіх пристроях) ----\n  // Адреса серверної функції зберігання. На реальному сайті задайте\n  //   window.BUDGET_DATA_URL = \"/api/data\";\n  // (у прототипі сервера немає → працює лише локальний localStorage).\n  dataUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_DATA_URL) return window.BUDGET_DATA_URL;\n    return this.apiUrl().replace(/parse(\\/?)$/, 'data$1');\n  }\n  adoptServer(server) {\n    const keepMonth = this.data ? this.data.currentMonth : server.currentMonth;\n    this.data = server;\n    if (!this.data.months) this.data.months = {};\n    if (!this.data.config) this.data.config = this.defaultData().config;\n    if (!this.data.config.limits) this.data.config.limits = this.defaultData().config.limits;\n    this.normalizeLimits(this.data.config.limits);\n    if (!this.data.config.wishlist) this.data.config.wishlist = [];\n    if (this.data.config.bigPurchaseFund == null) this.data.config.bigPurchaseFund = '0';\n    this.data.currentMonth = keepMonth || server.currentMonth || this.defaultData().currentMonth;\n    this._init = true;\n    this.maybeSeed();\n    this.reconcileRent();\n    this.saveLocal();\n    this.bump();\n  }\n  // Перший запуск: тягне спільні дані з сервера. Якщо сервер новіший — приймає його,\n  // інакше (сервер порожній/старіший) — піднімає локальні дані вгору.\n  async cloudLoad() {\n    if (this.isDemo()) { this._cloudLoaded = true; this.setState({ sync: 'idle' }); return; }\n    if (this._cloudLoaded) return;\n    this._cloudLoaded = true;\n    this.setState({ sync: 'syncing' });\n    let server = null;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n      const j = await r.json();\n      server = j && j.data;\n    } catch (e) { this.setState({ sync: 'offline' }); return; }\n    const localT = (this.data && this.data._updatedAt) || 0;\n    const serverT = (server && server._updatedAt) || 0;\n    if (server && server.config && serverT >= localT) {\n      this.adoptServer(server);\n      this.setState({ sync: 'synced' });\n    } else {\n      this.setState({ sync: 'synced' });\n      this.cloudSave(true);\n    }\n  }\n  // Періодична перевірка: підхоплює зміни, зроблені на іншому пристрої.\n  async cloudPull() {\n    if (typeof document !== 'undefined' && document.hidden) return;\n    if (!this.state.unlocked) return;\n    if (this.state.edit || this.state.nlBusy || this._cloudTimer || !this._cloudLoaded) return;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json();\n      const server = j && j.data;\n      const serverT = (server && server._updatedAt) || 0;\n      const localT = (this.data && this.data._updatedAt) || 0;\n      if (server && server.config && serverT > localT) {\n        this.adoptServer(server);\n        this.setState({ sync: 'synced' });\n      }\n    } catch (e) {}\n  }\n  // Запис у хмару (з дебаунсом, щоб не смикати сервер на кожну літеру).\n  cloudSave(immediate) {\n    clearTimeout(this._cloudTimer);\n    const doIt = async () => {\n      this._cloudTimer = null;\n      this.setState({ sync: 'syncing' });\n      try {\n        const r = await fetch(this.dataUrl(), {\n          method: 'POST', headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n          body: JSON.stringify({ data: this.data }),\n        });\n        if (r.status === 401 || r.status === 403) { this._on401(); return; }\n        if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n        this.setState({ sync: 'synced' });\n      } catch (e) { this.setState({ sync: 'offline' }); }\n    };\n    if (immediate) doIt(); else this._cloudTimer = setTimeout(doIt, 1000);\n  }\n  forceSync() { this.cloudSave(true); this.cloudPull(); }\n\n  // ---- Присутність: «хто зараз на сайті» (аватарки родини в шапці) ----\n  // Адреса виводиться з dataUrl (.../data → .../presence) або window.BUDGET_PRESENCE_URL.\n  presenceUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_PRESENCE_URL) return window.BUDGET_PRESENCE_URL;\n    return this.dataUrl().replace(/data(\\/?)$/, 'presence$1');\n  }\n  myAuth() {\n    try { return JSON.parse(localStorage.getItem('familyBudget_auth') || 'null') || {}; } catch (e) { return {}; }\n  }\n  // Один пульс: повідомляємо серверу, що ми тут, і отримуємо список активних.\n  async presenceBeat() {\n    if (!this.usesServer() || !this.state.unlocked || !this.sessionToken()) return;\n    if (typeof document !== 'undefined' && document.hidden) return;\n    const me = this.myAuth();\n    try {\n      const r = await fetch(this.presenceUrl(), {\n        method: 'POST',\n        headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n        body: JSON.stringify({ name: me.name || '', picture: me.picture || '' }),\n      });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json().catch(() => null);\n      const users = (j && Array.isArray(j.users) ? j.users : []);\n      this.preloadPics(users);\n      this.setState({ presence: users });\n    } catch (e) { /* офлайн — мовчки */ }\n  }\n  // Перевіряємо аватарки detached-Image: до успішного завантаження не вставляємо <img>\n  // у DOM, щоб збій (Google іноді 403) не спливав як resource-error в bundle-оверлеї.\n  preloadPics(users) {\n    if (!this._okPics) this._okPics = new Set();\n    (users || []).forEach(u => {\n      const src = u && u.picture;\n      if (!src || this._okPics.has(src) || (this._triedPics && this._triedPics.has(src))) return;\n      if (!this._triedPics) this._triedPics = new Set();\n      this._triedPics.add(src);\n      const im = new Image();\n      im.referrerPolicy = 'no-referrer';\n      im.onload = () => { this._okPics.add(src); if (this._mounted) this.forceUpdate(); };\n      im.onerror = () => { /* мовчки — лишається ініціал */ };\n      im.src = src;\n    });\n  }\n  startPresence() {\n    if (this._presenceTimer || !this.usesServer()) return;\n    this.presenceBeat();\n    this._presenceTimer = setInterval(() => this.presenceBeat(), 20000);\n  }\n  stopPresence() {\n    clearInterval(this._presenceTimer); this._presenceTimer = null;\n    this.setState({ presence: [] });\n  }\n\n  // Чистка артефактів голосового вводу: STT пише \"девʼять тисяч\" як \"9 1000\",\n  // \"шість тисяч сто\" як \"6 1000 100\", \"пʼять мільйонів\" як \"5 1.000.000\".\n  // Склеюємо детерміновано, ще ДО моделі, щоб не залежати від її примх.\n  normalizeNumbers(text) {\n    let s = String(text || '');\n    // 1.000.000 / 1.000 (крапки як розділювач тисяч) -> чисті цифри\n    s = s.replace(/\\b\\d{1,3}(?:\\.\\d{3})+\\b/g, m => m.replace(/\\./g, ''));\n    // множник цифрою (потрібен пробіл, інакше \"6100\" зламалося б): \"9 1000\" -> 9000\n    s = s.replace(/\\b(\\d{1,4})\\s+(1000000|1000|100)(?!\\d)/g, (m, a, b) => {\n      const A = parseInt(a, 10), B = parseInt(b, 10);\n      return A < B ? String(A * B) : m;\n    });\n    // множник словом (пробіл необовʼязковий): \"5 тисяч\"/\"5тис\"/\"2 млн\" -> 5000/5000/2000000\n    s = s.replace(/\\b(\\d{1,4})\\s*(тисяч[іья]?|тис\\.?|млн\\.?|мільйон(?:а|и|ів|ом)?|сотн[іяь]|сотень|сот\\.?)(?![а-яіїєґ'ʼА-ЯІЇЄҐ\\d])/gi, (m, a, b) => {\n      const A = parseInt(a, 10);\n      const lb = b.toLowerCase();\n      let B;\n      if (lb.startsWith('тис')) B = 1000;\n      else if (lb.startsWith('млн') || lb.startsWith('міль')) B = 1000000;\n      else if (lb.startsWith('сот')) B = 100;\n      else return m;\n      return A < B ? String(A * B) : m;\n    });\n    // хвіст складеного числівника: \"6000 100\" -> 6100, \"500 50\" -> 550 (ітеративно)\n    let prev;\n    do {\n      prev = s;\n      s = s.replace(/\\b(\\d{2,})\\s+(\\d{1,3})\\b/g, (m, a, b) => {\n        const A = parseInt(a, 10), B = parseInt(b, 10);\n        if (B > 0 && A % 1000 === 0 && B < 1000) return String(A + B);\n        if (B > 0 && A % 100 === 0 && B < 100) return String(A + B);\n        return m;\n      });\n    } while (s !== prev);\n    return s;\n  }\n\n  async parseNL(text) {\n    text = this.normalizeNumbers(text);\n    const [y, mo] = this.cm().split('-').map(Number);\n    const dim = this.daysInMonth();\n    const today = new Date();\n    const cats = this.CATS.map(c => `${c.id} = ${c.name}${c.desc ? ' (' + c.desc + ')' : ''}`).join('\\n');\n    // Знімок наявних записів місяця — щоб модель точно знаходила суму/день/категорію\n    // для видалення, заміни чи перенесення.\n    const m = this.month();\n    const snapLines = [];\n    Object.keys(m.days).map(Number).sort((a, b) => a - b).forEach(d => {\n      const parts = [];\n      this.CATS.forEach(c => {\n        const arr = m.days[d] && m.days[d][c.id];\n        if (arr && arr.length) {\n          const amts = arr.map(r => this.pnum(r.amount) + (r.comment ? ' «' + r.comment + '»' : '')).join(', ');\n          parts.push(c.id + ': ' + amts);\n        }\n      });\n      if (parts.length) snapLines.push(`день ${d} → ` + parts.join('; '));\n    });\n    const snapshot = snapLines.length ? snapLines.join('\\n') : '(місяць поки порожній)';\n    const prompt =\n`Ти — асистент-редактор таблиці сімейного бюджету. Перетвори текст/диктовку користувача українською на список ОПЕРАЦІЙ над таблицею у форматі JSON. Користувач може ДОДАВАТИ, ВИДАЛЯТИ, ЗМІНЮВАТИ та ПЕРЕНОСИТИ суми.\n\nКатегорії (використовуй id зліва):\n${cats}\n\nКонтекст:\n- Таблиця показує місяць: ${this.MONTHS[mo - 1]} ${y} (номер місяця ${mo}, днів у місяці: ${dim}).\n- Сьогодні: ${today.getDate()} число, місяць ${today.getMonth() + 1}, ${today.getFullYear()} рік.\n\nНаявні записи цього місяця (для пошуку сум при видаленні/заміні/перенесенні):\n${snapshot}\n\nТипи операцій (поле \"action\"):\n- \"add\" — додати суму. Поля: day, category, amount, comment.\n- \"delete\" — видалити наявну суму. Поля: day, category, amount (та сума, яку треба прибрати), comment (якщо названо). Напр. \"видали з 7 числа 500 у продуктах\" → {\"action\":\"delete\",\"day\":7,\"category\":\"products\",\"amount\":500}.\n- \"edit\" — замінити наявну суму на іншу в тій самій клітинці. Поля: day, category, amount (стара сума), newAmount (нова сума). Напр. \"замість 500 впиши 650 у продуктах за 7\" → {\"action\":\"edit\",\"day\":7,\"category\":\"products\",\"amount\":500,\"newAmount\":650}.\n- \"move\" — перенести суму з однієї категорії в іншу (той самий день). Поля: day, from (категорія-джерело), to (категорія-призначення), amount. Напр. \"перенеси 300 з продуктів у ресторани за 7\" → {\"action\":\"move\",\"day\":7,\"from\":\"products\",\"to\":\"eatingOut\",\"amount\":300}.\n\nПравила:\n- Кожна сума при додаванні = окрема операція \"add\". Напр. \"продукти 120, 500, 800\" → три \"add\" з amount 120, 500, 800.\n- Якщо тип дії не названо явно (просто \"продукти 120\") — це \"add\".\n- \"day\" = номер дня в показаному місяці (1..${dim}). Розпізнавай дати: \"сьоме червня\"=7, \"за 7 червня\"=7, \"7.06\"=7. \"сьогодні\" = ${today.getDate()}, \"вчора\" = ${today.getDate() - 1}. Якщо для add дату не вказано — використай число \"сьогодні\", якщо воно в межах місяця, інакше 1. Якщо для delete/edit/move день не названо, але суму однозначно видно у знімку вище — постав той день, де ця сума є.\n- Для delete/edit/move бери amount/категорію САМЕ так, як у знімку наявних записів (та сама сума, що реально існує). Не вигадуй суми, яких немає.\n- amount = додатне число у гривнях. Ігноруй \"грн\", \"₴\", \"гривень\".\n- Числа вже здебільшого нормалізовані. Якщо бачиш розбитий числівник (\"9 1000\" = 9000, \"5 тисяч\" = 5000, \"5 100\" = 500, \"півтори тисячі\" = 1500) — склади в одне число. Кома/«і»/окремі суми (\"120, 500\") — це РІЗНІ операції.\n- comment = короткий опис, якщо названо конкретну річ (напр. \"таксі\"), інакше \"\".\n- Сторонній текст ігноруй.\n\nТекст користувача:\n\"\"\"${text}\"\"\"\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у такій формі:\n{\"ops\":[{\"action\":\"add\",\"day\":7,\"category\":\"products\",\"amount\":120,\"comment\":\"\"}]}`;\n    const raw = await this.complete(prompt);\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('parse'); }\n    const ids = this.CATS.map(c => c.id);\n    const valid = id => ids.includes(id) ? id : null;\n    // Зворотна сумісність зі старим форматом {\"entries\":[...]}\n    const list = data.ops || (data.entries ? data.entries.map(e => ({ action: 'add', day: e.day, category: e.categoryId, amount: e.amount, comment: e.comment })) : []);\n    return list.map(o => {\n      const action = ['add', 'delete', 'edit', 'move'].includes(o.action) ? o.action : 'add';\n      const day = Math.max(1, Math.min(dim, parseInt(o.day, 10) || 0));\n      const amount = Math.round(parseFloat(o.amount) || 0);\n      const comment = (o.comment || '').toString().slice(0, 60);\n      if (action === 'move') return { action, day, fromCatId: valid(o.from), toCatId: valid(o.to), amount, comment };\n      if (action === 'edit') return { action, day, categoryId: valid(o.category), amount, newAmount: Math.round(parseFloat(o.newAmount) || 0), comment };\n      return { action, day, categoryId: valid(o.category), amount, comment };\n    }).filter(o => {\n      if (o.day < 1 || !o.amount) return false;\n      if (o.action === 'move') return o.fromCatId && o.toCatId && o.fromCatId !== o.toCatId;\n      if (o.action === 'edit') return o.categoryId && o.newAmount > 0;\n      return o.categoryId;\n    });\n  }\n\n  // Знайти наявний запис за днем/категорією/сумою (для delete/edit/move).\n  // Спочатку шукає на вказаному дні+категорії; якщо ні — однозначний збіг по всьому місяцю;\n  // якщо категорію не вказано — однозначний збіг у межах дня.\n  locateRec(day, catId, amount, comment) {\n    const m = this.month();\n    const cmt = (comment || '').toLowerCase();\n    const matchIn = (arr) => {\n      if (!arr || !arr.length) return -1;\n      if (cmt) {\n        const i = arr.findIndex(r => this.pnum(r.amount) === amount && (r.comment || '').toLowerCase().indexOf(cmt) >= 0);\n        if (i >= 0) return i;\n      }\n      return arr.findIndex(r => this.pnum(r.amount) === amount);\n    };\n    if (day && catId && m.days[day]) {\n      const i = matchIn(m.days[day][catId]);\n      if (i >= 0) return { day, catId, idx: i };\n    }\n    if (catId) {\n      const hits = [];\n      for (const d in m.days) { const i = matchIn(m.days[d][catId]); if (i >= 0) hits.push({ day: +d, catId, idx: i }); }\n      if (hits.length === 1) return hits[0];\n      if (hits.length > 1 && day) { const od = hits.find(h => h.day === day); if (od) return od; }\n    }\n    if (day && !catId && m.days[day]) {\n      const hits = [];\n      this.CATS.forEach(c => { const i = matchIn(m.days[day][c.id]); if (i >= 0) hits.push({ day, catId: c.id, idx: i }); });\n      if (hits.length === 1) return hits[0];\n    }\n    return null;\n  }\n\n  applyOps(ops) {\n    const mo = this.month();\n    this._undoSnap = JSON.stringify(this.data.months[this.cm()]);\n    const flash = {};\n    const applied = [], skipped = [];\n    const cleanup = (d, cat) => {\n      if (mo.days[d] && mo.days[d][cat] && !mo.days[d][cat].length) {\n        delete mo.days[d][cat];\n        if (!Object.keys(mo.days[d]).length) delete mo.days[d];\n      }\n    };\n    ops.forEach(op => {\n      if (op.action === 'add') {\n        if (!mo.days[op.day]) mo.days[op.day] = {};\n        if (!mo.days[op.day][op.categoryId]) mo.days[op.day][op.categoryId] = [];\n        mo.days[op.day][op.categoryId].push({ id: this.uid(), amount: String(op.amount), comment: op.comment || '' });\n        flash[op.day + '|' + op.categoryId] = true;\n        applied.push(op);\n        return;\n      }\n      if (op.action === 'delete') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'edit') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId][loc.idx].amount = String(op.newAmount);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'move') {\n        const loc = this.locateRec(op.day, op.fromCatId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        const rec = mo.days[loc.day][loc.catId][loc.idx];\n        const keptComment = rec.comment || op.comment || '';\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        if (!mo.days[loc.day]) mo.days[loc.day] = {};\n        if (!mo.days[loc.day][op.toCatId]) mo.days[loc.day][op.toCatId] = [];\n        mo.days[loc.day][op.toCatId].push({ id: this.uid(), amount: String(op.amount), comment: keptComment });\n        flash[loc.day + '|' + loc.catId] = true;\n        flash[loc.day + '|' + op.toCatId] = true;\n        applied.push({ ...op, day: loc.day, fromCatId: loc.catId });\n        return;\n      }\n    });\n    if (!applied.length) {\n      this._undoSnap = null;\n      const msg = skipped.length\n        ? 'Не знайшов відповідних записів для зміни. Уточніть день, категорію або суму.'\n        : 'Не вдалося розпізнати запит. Спробуйте: «видали з 7 числа 500 у продуктах».';\n      this.setState({ nlBusy: false, nlError: msg });\n      return;\n    }\n    this.save();\n    this._flash = flash;\n    this.setState({ nlBusy: false, nlText: '', nlListening: false, nlResult: { applied, skipped } });\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._resultTimer);\n    this._resultTimer = setTimeout(() => { if (this.state.nlResult) this.setState({ nlResult: null }); }, 5000);\n  }\n  undoNL() {\n    clearTimeout(this._resultTimer);\n    if (this._undoSnap) { this.data.months[this.cm()] = JSON.parse(this._undoSnap); this._undoSnap = null; this.save(); }\n    this._flash = null;\n    this.setState({ nlResult: null });\n  }\n\n  // ---- AI аналіз місяця (та сама модель, що й для текстового вводу) ----\n  catTotalsFor(key) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  // Сума по категоріях лише за дні 1..dayMax (для зіставного порівняння неповного місяця).\n  catTotalsUpTo(key, dayMax) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        if (+day > dayMax) continue;\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  // Сигнатура даних аналізу: міняється при зміні лімітів (база/місяць) чи витрат —\n  // щоб кешований AI-результат одразу переоцінювався, а не показував стару картинку.\n  aiSig() {\n    const m = this.month();\n    const L = (m.limits && typeof m.limits === 'object') ? m.limits : this.data.config.limits;\n    const cur = this.catTotalsFor(this.cm());\n    const tot = this.CATS.map(c => Math.round(cur[c.id] || 0)).join(',');\n    const lims = this.CATS.map(c => this.pnum(L[c.id] || 0)).join(',');\n    return this.cm() + '|' + lims + '|' + tot;\n  }\n  openAI() {\n    this.setState({ aiOpen: true });\n    const r = this.state.aiResult;\n    if (!this.state.aiBusy && (!r || r.month !== this.cm() || r.sig !== this.aiSig())) this.runAI();\n  }\n  async runAI() {\n    if (this.state.aiBusy) return;\n    this.setState({ aiBusy: true, aiError: null });\n    try {\n      const sig = this.aiSig();\n      const prompt = this.buildAnalysisPrompt();\n      const raw = await this.complete(prompt);\n      const result = this.parseAnalysis(raw);\n      if (!result.cards.length && !result.headline) throw new Error('Порожня відповідь. Спробуйте ще раз.');\n      result.sig = sig;\n      this.setState({ aiBusy: false, aiResult: result });\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Аналіз наразі недоступний.'\n        : (m || 'Не вдалося виконати аналіз. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiError: msg });\n    }\n  }\n  // ---- AI-аналіз витрат: ШАР 1 — детерміновані обчислення (computed_facts) ----\n  // Уся математика тут, у коді; AI (ШАР 2) лише формулює і нічого не рахує сам.\n  // Фокус — тільки витрати. Усе рахується через темп, тож неповний місяць не ламає логіку.\n  buildAnalysisData() {\n    const cm = this.cm();\n    const [y, mo] = cm.split('-').map(Number);\n    const now = new Date();\n    const monKey = y * 12 + (mo - 1);\n    const nowKey = now.getFullYear() * 12 + now.getMonth();\n    const isThisMonth = monKey === nowKey;\n    const future = monKey > nowKey;\n    const finished = monKey < nowKey;\n    const mode = finished ? 'completed' : 'in_progress';\n    const dim = this.daysInMonth();\n    const daysElapsed = isThisMonth ? Math.min(now.getDate(), dim) : dim;\n    const remainingDays = Math.max(0, dim - daysElapsed);\n    const m = this.month();\n    // Ефективні ліміти місяця: помісячний override (m.limits) має пріоритет над базовими.\n    // Тож зміна ліміту — базового чи на цей місяць — одразу відображається в аналізі.\n    const limitsOverridden = !!(m.limits && typeof m.limits === 'object');\n    const L = limitsOverridden ? m.limits : this.data.config.limits;\n    const SMALL_TXN = 1000; // поріг «дрібної» транзакції для діагностики дифузних трат\n    const median = a => {\n      if (!a.length) return 0;\n      const z = [...a].sort((p, q) => p - q), k = z.length >> 1;\n      return z.length % 2 ? z[k] : (z[k - 1] + z[k]) / 2;\n    };\n\n    // Транзакції по категоріях + денні підсумки + плаский список (для нових фактів)\n    const txnsByCat = {}; this.CATS.forEach(c => txnsByCat[c.id] = []);\n    const dayTotals = {}, dayCat = {};\n    const allTxns = []; // { day, catId, name, amount }\n    for (const day in m.days) for (const c of this.CATS) {\n      const arr = m.days[day][c.id];\n      if (!arr) continue;\n      for (const r of arr) {\n        const a = this.pnum(r.amount);\n        if (a <= 0) continue;\n        const d = +day;\n        txnsByCat[c.id].push(a);\n        allTxns.push({ day: d, catId: c.id, name: c.name, amount: a });\n        dayTotals[d] = (dayTotals[d] || 0) + a;\n        dayCat[d] = dayCat[d] || {};\n        dayCat[d][c.name] = (dayCat[d][c.name] || 0) + a;\n      }\n    }\n\n    // Класифікація STEADY/LUMPY + проєкція + стан конверта по кожній категорії\n    const categories = this.CATS.map(c => {\n      const amounts = txnsByCat[c.id];\n      const total = Math.round(amounts.reduce((s, a) => s + a, 0));\n      const lim = c.limitKey ? this.pnum(L[c.limitKey]) : 0;\n      const limit = lim > 0 ? lim : null;\n      if (!amounts.length) return { id: c.id, name: c.name, total: 0, limit, state: 'on_pace' };\n      const n = amounts.length;\n      const sorted = [...amounts].sort((a, b) => b - a);\n      const top2share = total > 0 ? (sorted[0] + (sorted[1] || 0)) / total : 1;\n      // LUMPY: мало витрат або дві найбільші — більшість суми. Лінійна проєкція таким бреше.\n      const lumpy = n <= 4 || top2share >= 0.55;\n      const dailyRate = total / daysElapsed;\n      let projected, confidence, conservative;\n      if (!lumpy) {\n        projected = Math.round(dailyRate * dim);\n        confidence = 'high';\n        conservative = projected;\n      } else {\n        // Частотна проєкція: скільки ще «забігів» буде, а не скільки на день\n        const runSize = median(amounts);\n        const interval = n > 0 ? daysElapsed / n : daysElapsed;\n        const runsRemaining = interval > 0 ? remainingDays / interval : 0;\n        projected = Math.round(total + Math.round(runsRemaining) * runSize);\n        conservative = total + Math.floor(runsRemaining) * runSize;\n        confidence = 'low';\n      }\n      let state = 'on_pace', envelope = null, ratio = null, nature = null;\n      if (limit != null) {\n        envelope = Math.round(limit - total);\n        if (mode === 'completed') {\n          // Завершений місяць (3.7): без проєкцій. Перевищення = звичка (STEADY) чи разова подія (LUMPY).\n          if (total >= limit) {\n            state = 'over_terminal';\n            ratio = Math.round((total / limit) * 10) / 10;\n            nature = lumpy ? 'event' : 'habit';\n          }\n        } else {\n          if (total >= limit) state = 'over_terminal';\n          else if (!lumpy && projected > limit * 1.05) state = 'over_pace';\n          else if (lumpy && conservative > limit) state = 'over_pace_est';\n        }\n      }\n      return { id: c.id, name: c.name, total, n, lumpy, dailyRate: Math.round(dailyRate),\n        projected, confidence, limit, envelope, state, ratio, nature };\n    }).filter(c => c.total > 0);\n\n    const flagged = categories.filter(c => c.state !== 'on_pace');\n    // На завершеному місяці структурні факти рахуються ЗАВЖДИ (3.7) — на поточному лише коли чисто.\n    const structural_fact = (mode === 'completed' || !flagged.length)\n      ? this.findStructuralFact({ dayTotals, dayCat, daysElapsed, mo, y, finished })\n      : null;\n\n    // ── НОВІ ОБЧИСЛЮВАНІ ФАКТИ (усе рахує код; модель лише інтерпретує) ──\n    const considered = daysElapsed; // днів, що враховуємо (для completed = весь місяць)\n    const spendTxns = allTxns.filter(t => t.day <= considered);\n    const total_spend = Math.round(spendTxns.reduce((s, t) => s + t.amount, 0));\n    const allAmts = spendTxns.map(t => t.amount);\n    const smalls = spendTxns.filter(t => t.amount < SMALL_TXN);\n    const smallSum = smalls.reduce((s, t) => s + t.amount, 0);\n    const catTotsDesc = categories.map(c => c.total).sort((a, b) => b - a);\n    const top1 = catTotsDesc[0] || 0;\n    const top3 = (catTotsDesc[0] || 0) + (catTotsDesc[1] || 0) + (catTotsDesc[2] || 0);\n    // Фоновий денний рівень: медіана денних сум без днів-викидів (> середнє+2σ)\n    const spendDays = Object.keys(dayTotals).map(Number).filter(d => d <= considered);\n    const dayVals = spendDays.map(d => dayTotals[d]);\n    let bgVals = dayVals;\n    if (dayVals.length >= 5) {\n      const mn = dayVals.reduce((s, v) => s + v, 0) / dayVals.length;\n      const sd = Math.sqrt(dayVals.reduce((s, v) => s + (v - mn) * (v - mn), 0) / dayVals.length);\n      const filtered = dayVals.filter(v => v <= mn + 2 * sd);\n      if (filtered.length) bgVals = filtered;\n    }\n    // 3.1 flow_profile — діагностика «рівномірного витікання» (головне)\n    const flow_profile = {\n      total_spend,\n      txn_count: spendTxns.length,\n      median_txn: Math.round(median(allAmts)),\n      small_txn_threshold: SMALL_TXN,\n      small_txn_count: smalls.length,\n      small_txn_share: total_spend > 0 ? Math.round(smallSum / total_spend * 100) : 0,\n      diffuse_score: total_spend > 0 ? Math.round((1 - top1 / total_spend) * 100) / 100 : 0,\n      concentration_top3_share: total_spend > 0 ? Math.round(top3 / total_spend * 100) : 0,\n      categories_touched: categories.length,\n      steady_categories: categories.filter(c => c.n && !c.lumpy).map(c => c.name),\n      background_daily_rate: Math.round(median(bgVals)),\n    };\n    // 3.2 fill_pattern — «постфактум чи свідомо» (спосіб ведення обліку)\n    const actDays = spendDays.slice().sort((a, b) => a - b);\n    let longest_gap = actDays.length ? actDays[0] - 1 : 0;\n    for (let i = 1; i < actDays.length; i++) longest_gap = Math.max(longest_gap, actDays[i] - actDays[i - 1] - 1);\n    const lastThirdCut = considered * 2 / 3;\n    const lateSum = spendTxns.filter(t => t.day > lastThirdCut).reduce((s, t) => s + t.amount, 0);\n    const lateShare = total_spend > 0 ? lateSum / total_spend : 0;\n    let entry_chronology = 'even';\n    if (actDays.length && actDays.length <= Math.max(3, Math.round(considered / 8))) entry_chronology = 'sparse';\n    else if (lateShare > 0.6) entry_chronology = 'batched_late';\n    const fill_pattern = {\n      entry_chronology,\n      late_third_share: Math.round(lateShare * 100),\n      active_days: actDays.length,\n      days_in_month: dim,\n      longest_gap,\n      last_entry_day: actDays.length ? actDays[actDays.length - 1] : 0,\n    };\n    // 3.3 category_breakdown — ритм найбільшої категорії (без вгадування складу)\n    let category_breakdown = null;\n    const topCat = [...categories].sort((a, b) => b.total - a.total)[0];\n    if (topCat && topCat.total > 0 && topCat.id) {\n      const byDay = {};\n      spendTxns.filter(t => t.catId === topCat.id).forEach(t => { byDay[t.day] = (byDay[t.day] || 0) + t.amount; });\n      const sessions = Object.keys(byDay).map(d => ({ day: +d, amount: Math.round(byDay[d]) })).sort((a, b) => a.day - b.day);\n      const largest = sessions.slice().sort((a, b) => b.amount - a.amount)[0] || null;\n      const weeks = considered / 7;\n      category_breakdown = {\n        name: topCat.name,\n        total: topCat.total,\n        share_of_spend: total_spend > 0 ? Math.round(topCat.total / total_spend * 100) : 0,\n        session_count: sessions.length,\n        avg_session: sessions.length ? Math.round(topCat.total / sessions.length) : 0,\n        largest_session: largest ? { day: largest.day, amount: largest.amount } : null,\n        weekly_cadence: weeks > 0 ? Math.round(sessions.length / weeks * 10) / 10 : 0,\n        txns: sessions,\n      };\n    }\n    // 3.4 month_comparison — тренд проти попередніх місяців (лише completed)\n    let month_comparison = null;\n    if (finished) {\n      const prevKeyOf = nn => { const d = new Date(y, mo - 1 - nn, 1); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); };\n      const totFor = key => { const mm = this.data.months[key]; if (!mm || !mm.days || !Object.keys(mm.days).length) return null; const t = this.catTotalsFor(key); return { t, sum: this.CATS.reduce((s, c) => s + (t[c.id] || 0), 0) }; };\n      const p1 = totFor(prevKeyOf(1));\n      const prevSums = [];\n      for (let i = 1; i <= 3; i++) { const pf = totFor(prevKeyOf(i)); if (pf && pf.sum > 0) prevSums.push(pf.sum); }\n      const avg3 = prevSums.length ? prevSums.reduce((s, v) => s + v, 0) / prevSums.length : 0;\n      const cur = this.catTotalsFor(cm);\n      const k1 = totFor(prevKeyOf(1)), k2 = totFor(prevKeyOf(2));\n      const per_category_drift = [];\n      this.CATS.forEach(c => {\n        if (!k1 || !k2) return;\n        const s0 = Math.round(cur[c.id] || 0), s1 = Math.round(k1.t[c.id] || 0), s2 = Math.round(k2.t[c.id] || 0);\n        if (s0 >= 1500 && s0 > s1 * 1.1 && s1 > s2 * 1.1) per_category_drift.push({ name: c.name, chain: [s2, s1, s0] });\n      });\n      month_comparison = {\n        vs_prev_month: p1 && p1.sum > 0 ? Math.round((total_spend / p1.sum - 1) * 100) : null,\n        vs_3mo_avg: avg3 > 0 ? Math.round((total_spend / avg3 - 1) * 100) : null,\n        per_category_drift,\n      };\n    }\n\n    const data = {\n      month: this.MONTHS[mo - 1] + ' ' + y,\n      mode,\n      month_finished: finished,\n      month_future: future,\n      daysElapsed, daysInMonth: dim, remainingDays,\n      month_progress: (isThisMonth\n        ? ('минуло ' + daysElapsed + ' з ' + dim + ' днів, попереду ще ' + remainingDays)\n        : (finished ? 'місяць завершено' : 'місяць ще не почався')),\n      categories,\n      flagged_count: flagged.length,\n      limits_overridden: limitsOverridden,\n      flow_profile,\n      fill_pattern,\n      category_breakdown,\n      month_comparison,\n      structural_fact,\n    };\n    const note = (m.note || '').trim();\n    if (note) data.special_note = note;\n    return data;\n  }\n  // Один структурний факт для місяців без off-pace (3.6). Лише порівняння/поріг, без тавтологій.\n  findStructuralFact(ctx) {\n    const { dayTotals, dayCat, daysElapsed, mo, y, finished } = ctx;\n    // 1) День-викид: денний підсумок > середнє + 2σ\n    const days = Object.keys(dayTotals).map(Number).filter(d => d <= daysElapsed);\n    if (days.length >= 5) {\n      const vals = days.map(d => dayTotals[d]);\n      const mean = vals.reduce((s, v) => s + v, 0) / vals.length;\n      const sd = Math.sqrt(vals.reduce((s, v) => s + (v - mean) * (v - mean), 0) / vals.length);\n      if (sd > 0) {\n        let outDay = null, outVal = -1;\n        days.forEach(d => { if (dayTotals[d] > mean + 2 * sd && dayTotals[d] > outVal) { outVal = dayTotals[d]; outDay = d; } });\n        if (outDay) {\n          const top = Object.keys(dayCat[outDay])\n            .map(k => ({ cat: k, amount: Math.round(dayCat[outDay][k]) }))\n            .sort((a, b) => b.amount - a.amount)[0];\n          return { type: 'day_outlier', date: outDay + ' ' + this.GEN[mo - 1],\n            total: Math.round(outVal), mean_day: Math.round(mean),\n            driver: top ? top.cat : null, driver_amount: top ? top.amount : null };\n        }\n      }\n    }\n    // 2) Зсув проти минулого місяця — лише для ЗАВЕРШЕНОГО місяця (повний проти повного)\n    if (finished) {\n      const pd = new Date(y, mo - 2, 1);\n      const pkey = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');\n      const pm = this.data.months[pkey];\n      if (pm && pm.days && Object.keys(pm.days).length) {\n        const prev = this.catTotalsFor(pkey);\n        const cur = this.catTotalsFor(this.cm());\n        let best = null;\n        this.CATS.forEach(c => {\n          const t = Math.round(cur[c.id] || 0), p = Math.round(prev[c.id] || 0);\n          if (t < 1500 && p < 1500) return;\n          if (p > 0 && t >= p * 1.5) { const r = t / p; if (!best || r > best.ratio) best = { type: 'shift', name: c.name, dir: 'up', ratio: Math.round(r * 10) / 10, this_total: t, prev_total: p }; }\n          else if (t > 0 && p >= t * 2) { const r = p / t; if (!best || r > best.ratio) best = { type: 'shift', name: c.name, dir: 'down', ratio: Math.round(r * 10) / 10, this_total: t, prev_total: p }; }\n        });\n        if (best) return best;\n      }\n    }\n    return null;\n  }\n  buildAnalysisPrompt() {\n    const data = this.buildAnalysisData();\n    const dataJson = JSON.stringify(data, null, 2);\n    return `Ти — фінансовий консультант сім'ї всередині застосунку обліку бюджету. Тобі передають JSON computed_facts з УЖЕ ПОРАХОВАНИМИ цифрами. Ти НЕ рахуєш нічого сам і не вигадуєш чисел — береш ТІЛЬКИ передане. Твоя задача — поставити діагноз місяцю так, як це зробив би уважний консультант, і дати важелі для рішення.\n\nФОКУС: тільки витрати. Дохід, фріланс, «чисті витрати», заощадження — поза фокусом, не згадуй їх.\n\nЛІМІТИ: limit у кожній категорії — це ЕФЕКТИВНИЙ ліміт цього місяця (якщо для місяця заданий окремий ліміт — у даних уже він; прапор limits_overridden каже, чи це так). Усі стани (on_pace / over_*) пораховані вже від цих лімітів. Якщо користувач змінив ліміт — це вже враховано в переданих цифрах; просто інтерпретуй їх як є.\n\nГОЛОВНА ФІЛОСОФІЯ (найважливіше):\nКористувач НЕ страждає від окремих дорогих покупок. Його біль — «рівномірне витікання»: гроші течуть дрібними сумами по всіх категоріях, як вода через дренаж, і незрозуміло, де чіпати. Тому твоя цінність — НЕ показати «найбільшу категорію» (це і так видно), а:\n  1. Назвати ПРИРОДУ потоку: концентрований (1-2 категорії) чи дифузний (розмазаний)? Спирайся на flow_profile (diffuse_score, concentration_top3_share, small_txn_share, small_txn_count, steady_categories).\n  2. Якщо потік дифузний — це і є діагноз. Скажи прямо: «тут немає одного винного; це N дрібних трат по K категоріях». Дай фоновий денний рівень (background_daily_rate) як орієнтир.\n  3. Відповісти на «бачили по ходу чи дізнались постфактум» через fill_pattern.entry_chronology. Якщо batched_late — сигнал не про суми, а про СПОСІБ ведення.\n  4. Для найбільшої категорії дати ритм (category_breakdown): частота (weekly_cadence), середній чек (avg_session). Якщо це продукти — запропонувати відділити побутову хімію окремою категорією, щоб наступні місяці були прозорі (НЕ вгадувати склад зараз).\n\nРЕЖИМ (поле mode):\n- \"in_progress\" — місяць триває: працюють проєкції, forward-стан, конверт на решту. Питання: «куди йде темп і чи встигнемо збити».\n- \"completed\" — місяць завершено: проєкцій немає. Питання: «що це був за місяць структурно». Тут найцінніше — month_comparison.per_category_drift (системний ріст 3 міс поспіль) і structural_fact.\n\nТИПИ КАРТОК:\n- \"flow\" (ГОЛОВНА, майже завжди): діагноз потоку. Дифузний/концентрований, фоновий рівень, де саме розмазано. diffuse_score ближче до 1 = дифузно; concentration_top3_share високий = концентровано.\n- \"cadence\": ритм найбільшої категорії — частота закупок, середній чек, гіпотеза «рідше = менше імпульсних дрібниць». ТІЛЬКИ якщо category_breakdown.weekly_cadence > 1. Якщо найбільша категорія — продукти, додай у advice пропозицію завести окрему категорію для побуту/хімії (це actionable по ОБЛІКУ, не вгадування складу).\n- \"fill\": ТІЛЬКИ якщо fill_pattern.entry_chronology = \"batched_late\" — м'яко вказати, що бюджет вівся навздогін, і що облік по ходу дав би контроль ДО перевищення.\n- \"drift\" (тільки completed): категорія з month_comparison.per_category_drift — системний ріст 3 міс поспіль. Це і є «потік, що набирає». Найцінніший сигнал — давай по одній картці на кожен дрейф (макс 1-2).\n- \"envelope\": для over_terminal — конверт уже порожній, кожна наступна витрата понад бюджет. Forward-стан, а НЕ «перевитрата N грн». Тільки якщо ліміт реально під загрозою.\n- \"pace\": для over_pace / over_pace_est — по темпу закриє місяць близько projected при ліміті limit, попереду ще remainingDays днів. Для over_pace_est додай, що це оцінка (категорія лумпі).\n- \"fact\": structural_fact (день-викид / зсув проти минулого) як спостереження, без поради.\n- \"all_clear\": ТІЛЬКИ якщо і потік концентрований-у-нормі, і лімітів не пробито, і дрейфу нема. Один спокійний рядок. НЕ кидайся all_clear лише тому, що ліміти цілі — спершу перевір потік.\n\nТРИ ТЕСТИ — кожна порада мусить пройти всі три:\n1. Не припускай ПРИЧИНУ трат, якої нема в даних (заборонено «їжте менше», «готуйте вдома» — застосунок знає суми, знає ЩО продукти, не знає що ВСЕРЕДИНІ).\n2. Не пропонуй дій, яких застосунок не вміє (накопичувальні банки, автоплатежі). Можна — дії з ОБЛІКОМ (завести категорію, тег) і зі ЗВИЧКОЮ (планувати перед покупкою, рідше їздити).\n3. Не радь міняти ліміт — він виставлений свідомо.\n\nЗАБОРОНЕНО: повторювати числа з дашборду без нового зрізу; тавтології («X — найбільша категорія», «кілька великих витрат = більшість категорії»); менторський тон; непрохані поради по життю; вигадувати склад категорії.\n\nТОН: фінансовий консультант, що ставить діагноз і дає важіль — «ось структура, ось де тисне, рішення твоє». На «ти», коротко, по-людськи, без осуду. Гіпотези подавай як гіпотези («схоже на…», «якщо це так, варто…»), не як вирок. advice для fact / all_clear = null.\n\nОБМЕЖЕННЯ:\n- in_progress: 1 headline + 1 картка flow + 0-2 off-pace (envelope/pace) + опційно cadence/fill/fact. Максимум 4 картки.\n- completed: 1 headline + 1 flow + опційно drift + опційно cadence/fact. Максимум 4 картки.\n- Якщо все справді чисто (рідко): headline + all_clear.\n\nФОРМАТ: поверни ТІЛЬКИ валідний JSON без тексту до/після й без markdown:\n{\"headline\":\"string\",\"cards\":[{\"type\":\"flow|cadence|fill|drift|envelope|pace|fact|all_clear\",\"title\":\"string (3-6 слів)\",\"body\":\"string (діагноз/факт, 1-2 речення)\",\"advice\":\"string|null\",\"action\":null}]}\nПоле action — null, або {\"label\":\"string\",\"type\":\"note\"} лише для картки-факту про день-викид. Усі тексти українською.\n\n---\nПРИКЛАД (in_progress, дифузний потік, лімітів не пробито). Вивід:\n{\n  \"headline\": \"Місяць без жодного провалу по лімітах, але гроші розійшлися дифузно: 14 дрібних трат по 6 категоріях дали половину витрат. Чіпати треба не суму, а звичку дрібних закупок.\",\n  \"cards\": [\n    { \"type\": \"flow\", \"title\": \"Гроші течуть, а не лежать у купі\", \"body\": \"Жодна категорія не домінує (diffuse_score 0.78), топ-3 — лише 54% витрат. Половина суми зібралась з дрібних трат до 1000 грн. Фоновий темп — близько 900/день, і саме він з'їдає бюджет, а не окремі покупки.\", \"advice\": \"Тут немає одного винного, щоб його прибрати. Важіль — не різати категорію, а зменшити кількість дрібних заходів: плануй покупки наперед списком, щоб дрібниці не набігали по одній.\", \"action\": null },\n    { \"type\": \"cadence\", \"title\": \"Продукти — 9 закупок, по 2+ на тиждень\", \"body\": \"Середній чек 2 400, найбільший — 5 100 на 12-те. Ритм 2.3 закупки/тиждень: схоже на часті дозакупки, а не на один плановий заїзд.\", \"advice\": \"Спробуй гіпотезу «рідше = менше імпульсного»: один-два планові заїзди замість щотижневих. І щоб бачити, скільки тут їжа, а скільки побут — варто завести окрему категорію для хімії/витратників, тоді наступні місяці будуть прозорі.\", \"action\": null }\n  ]\n}\n---\nПРИКЛАД (completed, дрейф 3 міс). Вивід:\n{\n  \"headline\": \"Місяць закрився в лімітах, але одна лінія тихо росте третій місяць поспіль — це і є потік, що набирає.\",\n  \"cards\": [\n    { \"type\": \"flow\", \"title\": \"Потік рівний, без різких сплесків\", \"body\": \"Витрати розмазані (diffuse_score 0.71), фоновий рівень стабільний. Окремої дорогої події немає — гроші пішли рівномірно.\", \"advice\": null, \"action\": null },\n    { \"type\": \"drift\", \"title\": \"Підписки ростуть третій місяць\", \"body\": \"1 200 → 1 900 → 2 800: системний ріст, а не шум. Сам по собі місяць не лякає, але напрям стійкий.\", \"advice\": \"Якщо тренд свідомий — ок. Якщо ні — це найкраща точка, щоб переглянути, що там накопичилось, доки сума ще невелика.\", \"action\": null }\n  ]\n}\n---\n\nТЕПЕР СФОРМУЛЮЙ ДЛЯ ЦИХ ДАНИХ. computed_facts:\n${dataJson}`;\n  }\n  parseAnalysis(raw) {\n    let js = (raw || '').replace(/```json/gi, '').replace(/```/g, '');\n    const a = js.indexOf('{'), b = js.lastIndexOf('}');\n    if (a >= 0 && b > a) js = js.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('Не вдалося прочитати відповідь моделі. Спробуйте ще раз.'); }\n    const types = ['flow', 'cadence', 'fill', 'drift', 'envelope', 'pace', 'fact', 'all_clear', 'signal', 'noise'];\n    const cards = (data.cards || []).slice(0, 4).map(c => {\n      let action = null;\n      if (c.action && typeof c.action === 'object' && c.action.label) {\n        action = { label: ('' + c.action.label).slice(0, 60), type: 'note' };\n      }\n      const advice = (c.advice == null ? '' : ('' + c.advice)).trim();\n      return {\n        type: types.includes(c.type) ? c.type : 'fact',\n        title: (c.title || '').toString().slice(0, 80),\n        body: (c.body || '').toString().slice(0, 400),\n        advice: advice.slice(0, 400),\n        action,\n      };\n    }).filter(c => c.title || c.body);\n    return { month: this.cm(), headline: (data.headline || '').toString().slice(0, 240), cards };\n  }\n  aiNoteAction() {\n    this.setState({ aiOpen: false });\n    setTimeout(() => {\n      const el = document.getElementById('month-note-field');\n      if (el) { try { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } catch (e) {} }\n    }, 260);\n  }\n\n  // ---- Статистика за весь період ----\n  STAT_COLORS() {\n    return { products:'#6994cf', eatingOut:'#db9b5d', home:'#69aa77', subs:'#51aebd',\n             family:'#a082c3', health:'#ce6f73', work:'#4696c0', transport:'#c2ad61',\n             leisure:'#53b397', charity:'#ba78b0', personal:'#cf78a3' };\n  }\n  // Збирає по-місячну агрегацію по всій історії (категорії, оренда, дохід, найбільші витрати, по днях).\n  allStatMonths() {\n    const all = [];\n    const cfgRent = this.pnum(this.data.config.rent);\n    for (const key in this.data.months) {\n      const parts = key.split('-'); const yy = +parts[0], mm = +parts[1];\n      if (!yy || !mm) continue;\n      const M = this.data.months[key];\n      const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n      let catSum = 0, recCount = 0, biggest = null;\n      const dayTotals = {};\n      if (M && M.days) {\n        for (const d in M.days) {\n          for (const c of this.CATS) {\n            const arr = M.days[d][c.id];\n            if (!arr) continue;\n            for (const r of arr) {\n              const v = this.pnum(r.amount);\n              if (v <= 0) continue;\n              byCat[c.id] += v; catSum += v; recCount++;\n              dayTotals[d] = (dayTotals[d] || 0) + v;\n              if (!biggest || v > biggest.a) biggest = { a: v, cat: c.id, day: +d, com: r.comment || '' };\n            }\n          }\n        }\n      }\n      let income = 0; if (M && M.income) M.income.forEach(r => income += this.pnum(r.amount));\n      if (catSum <= 0 && income <= 0) continue;\n      const rent = (M && M.rent != null && M.rent !== '') ? this.pnum(M.rent) : (catSum > 0 ? cfgRent : 0);\n      all.push({ key, y: yy, mo: mm, byCat, catSum, rent, income, spent: catSum + rent, recCount, biggest, dayTotals });\n    }\n    all.sort((a, b) => a.key < b.key ? -1 : (a.key > b.key ? 1 : 0));\n    return all;\n  }\n  filterStatMonths(all, period) {\n    if (period === 'last12') return all.slice(-12);\n    const yr = parseInt(period, 10);\n    if (period !== 'all' && yr) return all.filter(m => m.y === yr);\n    return all;\n  }\n  buildStats(accent) {\n    const COL = this.STAT_COLORS();\n    const RENT_COL = '#8e8e93';\n    const all = this.allStatMonths();\n    const period = this.state.statsPeriod || 'all';\n    const months = this.filterStatMonths(all, period);\n\n    const years = Array.from(new Set(all.map(m => m.y))).sort((a, b) => b - a);\n    const chipDef = [{ key: 'all', label: 'Увесь час' }];\n    if (all.length > 12) chipDef.push({ key: 'last12', label: 'Останні 12 міс' });\n    years.forEach(yy => chipDef.push({ key: String(yy), label: String(yy) }));\n    const chipStyle = act => 'flex:none;height:32px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:560;font-family:inherit;cursor:pointer;transition:background .12s;' +\n      (act ? 'background:var(--accent,#4f7396);color:#fff;border:1px solid var(--accent,#4f7396);' : 'background:var(--dk0);color:var(--dk22);border:1px solid var(--dk40);');\n    const statsChips = chipDef.map(c => ({ key: c.key, label: c.label, style: chipStyle(period === c.key),\n      onClick: () => this.setState({ statsPeriod: c.key, statHover: null }) }));\n\n    if (!months.length) {\n      return { empty: true, statsChips, periodLabel: 'Немає даних', kpis: [], monthBars: [], catBars: [], shareSegs: [], catTrends: [], weekdayBars: [], seasonBars: [], facts: [], avgDisp: '', avgPct: '0%', barGap: '4px' };\n    }\n\n    const first = months[0], last = months[months.length - 1];\n    let total = 0, totalRent = 0, totalIncome = 0, totalRec = 0;\n    const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n    let maxM = months[0], minM = months[0];\n    months.forEach(mm => {\n      total += mm.spent; totalRent += mm.rent; totalIncome += mm.income; totalRec += mm.recCount;\n      this.CATS.forEach(c => byCat[c.id] += mm.byCat[c.id]);\n      if (mm.spent > maxM.spent) maxM = mm;\n      if (mm.spent < minM.spent) minM = mm;\n    });\n    const totalCat = total - totalRent;\n    const n = months.length;\n    const avg = total / n;\n    const monthsWord = this.plural(n, 'місяць', 'місяці', 'місяців');\n    const rangeLabel = this.MONTHS_SHORT[first.mo - 1].toLowerCase() + ' ' + first.y + ' – ' + this.MONTHS_SHORT[last.mo - 1].toLowerCase() + ' ' + last.y;\n    const periodLabel = (n > 1 ? rangeLabel + ' · ' : '') + n + ' ' + monthsWord;\n\n    // KPI\n    const kpis = [\n      { label: 'Всього витрачено', value: this.money(total), sub: 'за ' + n + ' ' + monthsWord, color: 'var(--dk22)' },\n      { label: 'В середньому / місяць', value: this.money(avg), sub: 'включно з орендою', color: 'var(--dk22)' },\n      { label: 'Найдорожчий місяць', value: this.money(maxM.spent), sub: this.MONTHS[maxM.mo - 1] + ' ' + maxM.y, color: '#c25d52' },\n      { label: 'Найекономніший місяць', value: this.money(minM.spent), sub: this.MONTHS[minM.mo - 1] + ' ' + minM.y, color: '#5f9168' },\n    ];\n\n    // Динаміка по місяцях\n    const maxSpent = Math.max.apply(null, months.map(m => m.spent).concat([1]));\n    const multiYear = new Set(months.map(m => m.y)).size > 1;\n    const monthBars = months.map((mm, i) => {\n      let color = accent;\n      if (mm.key === maxM.key) color = '#c25d52';\n      else if (mm.key === minM.key) color = '#5f9168';\n      const label = multiYear ? ((i === 0 || mm.mo === 1) ? String(mm.y) : '') : this.MONTHS_SHORT[mm.mo - 1];\n      const lines = ['Витрати: ' + this.money(mm.spent)];\n      if (mm.income > 0) lines.push('Дохід: +' + this.money(mm.income));\n      return {\n        hPct: (mm.spent / maxSpent * 100) + '%', color, label,\n        onEnter: e => { const r = e.currentTarget.getBoundingClientRect(); this.setState({ statHover: { title: this.MONTHS[mm.mo - 1] + ' ' + mm.y, lines, top: r.top - 6, left: r.left + r.width / 2 } }); },\n        onLeave: () => { if (this.state.statHover) this.setState({ statHover: null }); },\n      };\n    });\n    const barGap = n > 36 ? '2px' : (n > 18 ? '3px' : '6px');\n    const avgPct = (avg / maxSpent * 100) + '%';\n\n    // Структура витрат\n    const catItems = this.CATS.map(c => ({ id: c.id, name: c.name, total: byCat[c.id], color: COL[c.id] }));\n    if (totalRent > 0) catItems.push({ id: 'rent', name: 'Оренда житла', total: totalRent, color: RENT_COL });\n    catItems.sort((a, b) => b.total - a.total);\n    const visible = catItems.filter(c => c.total > 0);\n    const maxCat = Math.max.apply(null, visible.map(c => c.total).concat([1]));\n    const catBars = visible.map(c => ({ name: c.name, color: c.color, wPct: (c.total / maxCat * 100) + '%', amountDisp: this.money(c.total), pctDisp: (total > 0 ? Math.round(c.total / total * 100) : 0) + '%' }));\n    const shareSegs = visible.map(c => ({ color: c.color, wPct: (c.total / (total || 1) * 100) + '%' }));\n\n    // Тренди по категоріях (sparkline + напрям)\n    const catTrends = this.CATS.map(c => {\n      const series = months.map(m => m.byCat[c.id]);\n      const tot = series.reduce((a, b) => a + b, 0);\n      const mx = Math.max.apply(null, series.concat([1]));\n      const spark = series.map(v => ({ hPct: (tot > 0 ? Math.max(2, v / mx * 100) : 0) + '%', color: COL[c.id] }));\n      let arrow = '≈', tcolor = '#86868b', tpct = 'стабільно';\n      if (series.length >= 4 && tot > 0) {\n        const half = Math.floor(series.length / 2);\n        const f = series.slice(0, half), s = series.slice(half);\n        const fa = f.reduce((a, b) => a + b, 0) / f.length, sa = s.reduce((a, b) => a + b, 0) / s.length;\n        if (fa > 0) {\n          const ch = (sa - fa) / fa * 100;\n          if (ch > 8) { arrow = '↑'; tcolor = '#c25d52'; tpct = '+' + Math.round(ch) + '%'; }\n          else if (ch < -8) { arrow = '↓'; tcolor = '#5f9168'; tpct = Math.round(ch) + '%'; }\n        } else if (sa > 0) { arrow = '↑'; tcolor = '#c25d52'; tpct = 'новий'; }\n      }\n      return { id: c.id, name: c.name, color: COL[c.id], tot, totalDisp: this.money(tot), avgDisp: this.money(tot / n), spark, arrow, tcolor, tpct };\n    }).filter(c => c.tot > 0).sort((a, b) => b.tot - a.tot);\n\n    // Витрати за днями тижня (без оренди)\n    const wdTot = [0, 0, 0, 0, 0, 0, 0];\n    months.forEach(mm => { for (const d in mm.dayTotals) { const wd = new Date(mm.y, mm.mo - 1, +d).getDay(); wdTot[wd] += mm.dayTotals[d]; } });\n    const wdOrder = [1, 2, 3, 4, 5, 6, 0], wdNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];\n    const wdMax = Math.max.apply(null, wdTot.concat([1]));\n    const weekdayBars = wdOrder.map((idx, i) => {\n      const we = (idx === 0 || idx === 6);\n      return { name: wdNames[i], hPct: (wdTot[idx] / wdMax * 100) + '%', amountDisp: this.abbr(wdTot[idx]),\n               color: we ? '#ff9f0a' : accent, nameColor: we ? '#ff9f0a' : '#6e6e73' };\n    });\n\n    // Сезонність — середні витрати (без оренди) по календарних місяцях\n    const sea = Array.from({ length: 12 }, () => ({ sum: 0, cnt: 0 }));\n    months.forEach(mm => { sea[mm.mo - 1].sum += mm.catSum; sea[mm.mo - 1].cnt++; });\n    const seaAvg = sea.map(s => s.cnt ? s.sum / s.cnt : 0);\n    const seaMax = Math.max.apply(null, seaAvg.concat([1]));\n    let peakMo = 0; seaAvg.forEach((v, i) => { if (v > seaAvg[peakMo]) peakMo = i; });\n    const seasonBars = this.MONTHS_SHORT.map((nm, i) => ({\n      name: nm, hPct: (seaAvg[i] / seaMax * 100) + '%', amountDisp: sea[i].cnt ? this.abbr(seaAvg[i]) : '',\n      color: i === peakMo ? '#ff9f0a' : accent, nameColor: i === peakMo ? '#ff9f0a' : '#6e
