  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"06b0ee90-326e-4ba5-b222-f973c8ef9926\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover\">\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='15'%20fill='%230a84ff'/%3E%3Ctext%20x='32'%20y='34'%20font-family='-apple-system,Helvetica,Arial,sans-serif'%20font-size='46'%20font-weight='700'%20fill='%23fff'%20text-anchor='middle'%20dominant-baseline='central'%3E%E2%82%B4%3C/text%3E%3C/svg%3E\">\n<style>\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{margin:0;background:#f5f5f7;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}\n  @keyframes fbIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}\n  @keyframes fbFade{from{opacity:0}to{opacity:1}}\n  @keyframes flashCell{0%{background:rgba(10,132,255,.34)}55%{background:rgba(10,132,255,.18)}100%{background:transparent}}\n  @keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}70%{box-shadow:0 0 0 9px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pinShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-10px)}36%{transform:translateX(9px)}54%{transform:translateX(-7px)}72%{transform:translateX(5px)}88%{transform:translateX(-3px)}}\n  .inc-icon-btn{color:#c7c7cc;transition:background .12s,color .12s}\n  .inc-icon-btn:hover{background:#e4e4e7 !important;color:#1d1d1f !important}\n  *{scrollbar-width:none;-ms-overflow-style:none}\n  ::-webkit-scrollbar{width:0;height:0;display:none}\n<\u002Fstyle>\n<script src=\"976613c8-bca7-4f7a-a953-0b0c11f3b842\"><\u002Fscript>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" style=\"{{ rootStyle }}\">\n\n  <sc-if value=\"{{ locked }}\">\n    <div style=\"position:fixed;inset:0;z-index:200;background:#f5f5f7;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;animation:fbIn .3s cubic-bezier(.2,.8,.2,1)\">\n        <div style=\"width:62px;height:62px;border-radius:18px;background:var(--accent,#0a84ff);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(10,132,255,.32);margin-bottom:22px\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:21px;font-weight:700;letter-spacing:-.02em\">Сімейний бюджет<\u002Fdiv>\n        <div style=\"font-size:14px;color:#86868b;margin-top:6px\">{{ pinHint }}<\u002Fdiv>\n        <div style=\"display:flex;gap:17px;margin-top:28px;animation:{{ pinShake }}\">\n          <sc-for list=\"{{ pinDots }}\" as=\"dot\" hint-placeholder-count=\"4\">\n            <div style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid {{ dot.border }};background:{{ dot.bg }};transition:background .14s ease,border-color .14s ease\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,76px);gap:16px;margin-top:36px\">\n          <sc-for list=\"{{ keypad }}\" as=\"k\" hint-placeholder-count=\"12\">\n            <sc-if value=\"{{ k.isEmpty }}\"><div><\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ k.isNum }}\">\n              <button onclick=\"{{ k.onClick }}\" style=\"width:76px;height:76px;border-radius:50%;border:none;background:#fff;font-size:29px;font-weight:500;color:#1d1d1f;cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 1px rgba(0,0,0,.04);font-variant-numeric:tabular-nums\" style-hover=\"background:#f0f0f2\" style-active=\"background:#e2e2e7\">{{ k.label }}<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ k.isDel }}\">\n              <button onclick=\"{{ k.onClick }}\" style=\"width:76px;height:76px;border-radius:50%;border:none;background:transparent;color:#86868b;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#e6e6e9;color:#1d1d1f\">\n                <svg width=\"27\" height=\"27\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z\"><\u002Fpath><line x1=\"18\" y1=\"9\" x2=\"12\" y2=\"15\"><\u002Fline><line x1=\"12\" y1=\"9\" x2=\"18\" y2=\"15\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:18px;flex:none;margin-bottom:14px\">\n    <div style=\"min-width:0;display:flex;align-items:center;gap:14px\">\n      <sc-if value=\"{{ showTitle }}\"><div style=\"font-size:23px;font-weight:700;letter-spacing:-.022em;line-height:1.05;flex:none\">Сімейний бюджет<\u002Fdiv><\u002Fsc-if>\n      <div style=\"position:relative;flex:none\">\n        <div style=\"display:flex;align-items:center;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:3px;box-shadow:0 1px 2px rgba(0,0,0,.04)\">\n          <button onclick=\"{{ prevMonth }}\" style=\"{{ prevMonthStyle }}\" style-hover=\"background:#f0f0f2\">‹<\u002Fbutton>\n          <button onclick=\"{{ toggleMonthPicker }}\" style=\"{{ monthBtnStyle }}\" style-hover=\"background:#f0f0f2\">{{ monthLabel }}<\u002Fbutton>\n          <button onclick=\"{{ nextMonth }}\" style=\"width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:50%;font-size:18px;line-height:1;color:#1d1d1f;cursor:pointer;font-family:inherit\" style-hover=\"background:#f0f0f2\">›<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ monthPickerOpen }}\">\n          <div onclick=\"{{ closeMonthPicker }}\" style=\"position:fixed;inset:0;z-index:40\"><\u002Fdiv>\n          <div style=\"position:absolute;top:46px;left:50%;transform:translateX(-50%);z-index:41;width:288px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;box-shadow:0 12px 36px rgba(0,0,0,.18),0 2px 6px rgba(0,0,0,.06);padding:14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n              <button onclick=\"{{ pickerPrevYear }}\" style=\"{{ pickerPrevYearStyle }}\" style-hover=\"background:#f0f0f2\">‹<\u002Fbutton>\n              <div style=\"font-size:16px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums\">{{ pickerYearLabel }}<\u002Fdiv>\n              <button onclick=\"{{ pickerNextYear }}\" style=\"{{ pickerNextYearStyle }}\" style-hover=\"background:#f0f0f2\">›<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:7px\">\n              <sc-for list=\"{{ pickerMonths }}\" as=\"pm\" hint-placeholder-count=\"12\">\n                <button onclick=\"{{ pm.pick }}\" style=\"{{ pm.style }}\">{{ pm.name }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showToday }}\">\n        <button onclick=\"{{ goToday }}\" style=\"height:36px;padding:0 14px;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:999px;font-size:13.5px;font-weight:560;color:var(-- _pinChecking = true;\n      this.setState({ pin: p, pinErr: false });\n      try { sessionStorage.setItem(this.UNLOCK_KEY, '1'); } catch (e) {}\n      setTimeout(() => { this._pinChecking = false; this.setState({ unlocked: true, pin: '' }); }, 200);\n    } else {\n      this._pinChecking = true;\n      this.setState({ pin: p, pinErr: true });\n      setTimeout(() => { this._pinChecking = false; this.setState({ pin: '', pinErr: false }); }, 480);\n    }\n  }\n  delKey() { if (this.state.unlocked || this._pinChecking) return; this.setState(s => ({ pin: s.pin.slice(0, -1), pinErr: false })); }\n\n  CATS = [\n    { id:'products',  name:'Продукти',            kind:'limit',   limitKey:'products', desc:'Супермаркети, ринки, заморозки' },\n    { id:'eatingOut', name:'Їжа поза домом',       kind:'limit',   limitKey:'eatingOut', desc:'Ресторани, куплені додому роли, піци, десерти' },\n    { id:'home',      name:'Дім',                  kind:'general', desc:'Побутові речі, покращення інтер’єру, ремонт' },\n    { id:'subs',      name:'Підписки / сервіси',   kind:'general', desc:'Розважальні підписки, моб рахунок, оплата застосунків' },\n    { id:'family',    name:'Сім’я',                kind:'general', desc:'Дитина та собака' },\n    { id:'health',    name:'Здоров’я',             kind:'general', desc:'Аптеки, обстеження здоров’я, спорт інвентар, спортзал' },\n    { id:'work',      name:'Робота / Навчання / Податки', kind:'general', desc:'Робочі підписки, 3д моделі, курси, податки' },\n    { id:'transport', name:'Транспорт',            kind:'general', desc:'Машина, таксі, тех обслуговування, мийка' },\n    { id:'leisure',   name:'Дозвілля / Подорожі',  kind:'general', desc:'Подорож на вихідні, відпустки, готелі, виставки, кіно' },\n    { id:'charity',   name:'Благодійність / Подарунки', kind:'limit',  limitKey:'charity', desc:'Подарунки та гостинці іншим, донати' },\n    { id:'personal',  name:'Особисті витрати',     kind:'limit',   limitKey:'personal', desc:'Приємності для себе,  === '' || cur === '0') && S[key].rent) m.rent = String(S[key].rent);\n      }\n    }\n    this.data._rentFixV = this.RENT_FIX_VERSION;\n    this.saveLocal();\n  }\n  // Одноразово підмішує історію з Excel (window.__BUDGET_SEED), не чіпаючи місяці,\n  // де користувач уже має дані. e:[[день,катІндекс,сума]], com — комуналка (дім).\n  maybeSeed() {\n    const S = (typeof window !== 'undefined') ? window.__BUDGET_SEED : null;\n    if (!S || !this.data) return;\n    if (this.data._seedV === this.SEED_VERSION) return;\n    for (const key in S) {\n      const ex = this.data.months[key];\n      const hasData = ex && ex.days && Object.keys(ex.days).length;\n      if (hasData) continue;\n      const rec = S[key];\n      const md = { days: {}, income: (ex && ex.income) ? ex.income : [], rent: String(rec.rent || 0) };\n      for (const t of rec.e) {\n        const cat = this.CATS[t[1]] && this.CATS[t[1]].id;\n        if (!cat) continue;\n        if (!md.days[t[0]]) md.days[t[0]] = {};\n        if (!md.days[t[0]][cat]) md.days[t[0]][cat] = [];\n        md.days[t[0]][cat].push({ id: this.uid(), amount: String(t[2]), comment: '' });\n      }\n      if (rec.com) {\n        if (!md.days[1]) md.days[1] = {};\n        if (!md.days[1].home) md.days[1].home = [];\n        md.days[1].home.push({ id: this.uid(), amount: String(rec.com), comment: 'Комуналка' });\n      }\n      this.data.months[key] = md;\n    }\n    this.data._seedV = this.SEED_VERSION;\n    this.saveLocal();\n  }\n  monthRent() {\n    const m = this.month();\n    return (m && m.rent != null && m.rent !== '') ? m.rent : this.data.config.rent;\n  }\n  // Зберігання користувацької зміни: оновити мітку часу, записати локально та підняти в хмару.\n  save() { this.data._updatedAt = Date.now(); this.saveLocal(); this.cloudSave(); }\n  // Лише локальний запис (для сіду, реконсиляції, зміни перегляду місяця) — без хмари й без мітки часу.\n  saveLocal() { try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) {} }\n  bump() { this.setState(s => ({ tick: s.tick + 1 })); }\n  pnum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n  uid() { return Math.random().toString(36).slice(2, 9); }\n  fmt(n) { return new Intl.NumberFormat('uk-UA', { maximumFractionDigits: 0 }).format(Math.round(n)); }\n  money(v) { return this.fmt(this.pnum(v)) + ' ₴'; }\n  num(v) { const n = this.pnum(v); return n ? this.fmt(n) : ''; }\n  abbr(v) {\n    const n = Math.round(this.pnum(v));\n    if (!n) return '';\n    if (Math.abs(n) < 1000) return String(n);\n    const k = n / 1000;\n    const s = (Math.abs(k) < 100) ? (Math.round(k * 10) / 10) : Math.round(k);\n    return String(s).replace('.', ',') + 'к';\n  }\n\n  cm() { return this.data.currentMonth; }\n  month() {\n    const k = this.cm();\n    if (!this.data.months[k]) this.data.months[k] = { days: {}, income: [] };\n    const m = this.data.months[k];\n    if (!m.days) m.days = {};\n    if (!m.income) m.income = [];\n    return m;\n  }\n  daysInMonth() { const [y, mo] = this.cm().split('-').map(Number); return new Date(y, mo, 0).getDate(); }\n  recsOf(day, cat) { const m = this.month(); const dd = m.days[day]; return (dd && dd[cat]) ? dd[cat] : []; }\n\n  beforeStart(y, mo) { return y < this.START_Y || (y === this.START_Y && mo < this.START_MO); }\n  shift(delta) {\n    const [y, mo] = this.cm().split('-').map(Number);\n    const d = new Date(y, mo - 1 + delta, 1);\n    let ny = d.getFullYear(), nm = d.getMonth() + 1;\n    if (this.beforeStart(ny, nm)) { ny = this.START_Y; nm = this.START_MO; }\n    const nk = ny + '-' + String(nm).padStart(2, '0');\n    if (nk === this.cm()) { this.setState({ monthPicker: false }); return; }\n    this.data.currentMonth = nk;\n    this.month();\n    this.setState({ sel: null, edit: null, monthPicker: false });\n    this.saveLocal();\n  }\n  openMonthPicker() {\n    const [y] = this.cm().split('-').map(Number);\n    this.setState({ monthPicker: !this.state.monthPicker, pickerYear: y, sel: null, edit: null });\n  }\n  pickerShiftYear(delta) {\n    const ny = (this.state.pickerYear || this.START_Y) + delta;\n    const maxY = new Date().getFullYear() + 1;\n    if (ny < this.START_Y || ny > maxY) return;\n    this.setState({ pickerYear: ny });\n  }\n  pickMonth(mo) {\n    const y = this.state.pickerYear || this.START_Y;\n    if (this.beforeStart(y, mo)) return;\n    this.data.currentMonth = y + '-' + String(mo).padStart(2, '0');\n    this.month();\n    this.setState({ sel: null, edit: null, monthPicker: false });\n    this.saveLocal();\n  }\n  goToday() {\n    const d = new Date();\n    this.data.currentMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');\n    this.setState({ sel: null, edit: null });\n    this.saveLocal();\n    this.requestCenterToday();\n  }\n\n  clearSelection() {\n    if (!this.state.sel && !this.state.edit) return;\n    if (this.state.edit) this.commitEdit();\n    this._focusNext = false;\n    this.setState({ sel: null, edit: null });\n  }\n  selectCell(day, cat) {\n    const ed = this.state.edit;\n    if (ed && ed.day === day && ed.cat === cat) return;\n    if (ed) this.commitEdit();\n    const recs = this.recsOf(day, cat);\n    if (recs.length > 1) {\n      this._focusNext = false;\n      this.setState({ sel: { day, cat }, edit: null });\n    } else {\n      this.startEdit(day, cat);\n    }\n  }\n  startEdit(day, cat) {\n    const recs = this.recsOf(day, cat);\n    const draft = recs.length === 1 ? (recs[0].amount == null ? '' : String(recs[0].amount)) : '';\n    this._focusNext = true;\n    this.setState({ sel: { day, cat }, edit: { day, cat }, draft });\n  }\n  commitEdit() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const { day, cat } = ed;\n    const v = this.state.draft;\n    const amt = this.pnum(v);\n    const mo = this.month();\n    const recs = (mo.days[day] && mo.days[day][cat]) || null;\n    if (amt > 0) {\n      if (recs && recs.length >= 1) {\n        recs[0].amount = String(v);\n      } else {\n        if (!mo.days[day]) mo.days[day] = {};\n        mo.days[day][cat] = [{ id: this.uid(), amount: String(v), comment: '' }];\n      }\n    } else {\n      if (mo.days[day] && mo.days[day][cat]) {\n        delete mo.days[day][cat];\n        if (!Object.keys(mo.days[day]).length) delete mo.days[day];\n      }\n    }\n    this.save();\n  }\n  moveDown() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const ci = this.CATS.findIndex(c => c.id === ed.cat);\n    let ni = ci + 1, nd = ed.day;\n    if (ni >= this.CATS.length) {\n      ni = 0; nd = ed.day + 1;\n      if (nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    }\n    this.startEdit(nd, this.CATS[ni].id);\n  }\n  moveSide(dir) {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const nd = ed.day + dir;\n    if (nd < 1 || nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    this.startEdit(nd, ed.cat);\n  }\n  cellKey(e) {\n    if (e.key === 'Enter') { e.preventDefault(); this.commitEdit(); this.moveDown(); }\n    else if (e.key === 'Tab') { e.preventDefault(); this.commitEdit(); this.moveSide(e.shiftKey ? -1 : 1); }\n    else if (e.key === 'Escape') { e.preventDefault(); this._focusNext = false; this.setState({ edit: null }); }\n  }\n\n  addBarRec() {\n    const s = this.state.sel; if (!s) return;\n    if (this.state.edit) { this.commitEdit(); }\n    const mo = this.month();\n    if (!mo.days[s.day]) mo.days[s.day] = {};\n    if (!mo.days[s.day][s.cat]) mo.days[s.day][s.cat] = [];\n    mo.days[s.day][s.cat].push({ id: this.uid(), amount: '', comment: '' });\n    this.save();\n    this.setState({ edit: null });\n  }\n  delBarRec(idx) {\n    const s = this.state.sel; if (!s) return;\n    const mo = this.month();\n    const arr = mo.days[s.day] && mo.days[s.day][s.cat];\n    if (!arr) return;\n    arr.splice(idx, 1);\n    if (!arr.length) { delete mo.days[s.day][s.cat]; if (!Object.keys(mo.days[s.day]).length) delete mo.days[s.day]; }\n    this.save();\n    this.setState({ edit: null });\n  }\n\n  addIncome(ev) { const id = this.uid(); this.month().income.push({ id, label: '', amount: '' }); this.save(); this.openPop(id, ev, true); }\n  openPop(id, ev, isNew) { this._focusPop = true; this.setState({ incPop: { id, isNew: !!isNew } }); }\n  commitIncome(id) {\n    const m = this.month();\n    const idx = m.income.findIndex(x => x.id === id);\n    if (idx >= 0) {\n      const r = m.income[idx];\n      const emptyL = !(r.label && r.label.trim());\n      const emptyA = !(r.amount && String(r.amount).trim());\n      if (emptyL && emptyA) m.income.splice(idx, 1);\n    }\n    this.save();\n  }\n  closeIncPop() { const p = this.state.incPop; if (p) this.commitIncome(p.id); this.setState({ incPop: null }); }\n  delIncomeById(id) {\n    const m = this.month();\n    const idx = m.income.findIndex(x => x.id === id);\n    if (idx >= 0) m.income.splice(idx, 1);\n    this.save();\n    const p = this.state.incPop;\n    if (p && p.id === id) this.setState({ incPop: null }); else this.bump();\n  }\n\n  plural(n, one, few, many) {\n    n = Math.abs(n) % 100; const n1 = n % 10;\n    if (n > 10 && n < 20) return many;\n    if (n1 > 1 && n1 < 5) return few;\n    if (n1 === 1) return one;\n    return many;\n  }\n\n  // ---- Natural-language / voice entry ----\n  toggleVoice() { if (this.state.nlListening) this.stopVoice(); else this.startVoice(); }\n  startVoice() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ nlError: 'Голосовий ввід не підтримується у цьому браузері. Введіть витрату текстом.' }); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ nlError: 'Не вдалося увімкнути мікрофон.' }); return; }\n    rec.lang = 'uk-UA'; rec.continuous = true; rec.interimResults = true;\n    this._voiceBase = this.state.nlText ? (this.state.nlText.trim() + ' ') : '';\n    rec.onresult = (e) => {\n      let t = '';\n      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;\n      this.setState({ nlText: this._voiceBase + t });\n    };\n    rec.onerror = (e) => {\n      const err = e && e.error;\n      let msg = 'Помилка мікрофона.';\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = 'Доступ до мікрофона заборонено. Дозвольте його у браузері.';\n      else if (err === 'no-speech') msg = null;\n      this._recog = null;\n      this.setState({ nlListening: false, nlError: msg });\n    };\n    rec.onend = () => { this._recog = null; this.setState({ nlListening: false }); };\n    this._recog = rec;\n    try { rec.start(); this.setState({ nlListening: true, nlError: null, nlResult: null }); }\n    catch (e) { this._recog = null; this.setState({ nlListening: false }); }\n  }\n  stopVoice() { if (this._recog) { try { this._recog.stop(); } catch (e) {} } this.setState({ nlListening: false }); }\n\n  async submitNL() {\n    const text = (this.state.nlText || '').trim();\n    if (!text || this.state.nlBusy) return;\n    if (this.state.nlListening) this.stopVoice();\n    this.setState({ nlBusy: true, nlError: null, nlResult: null });\n    try {\n      const entries = await this.parseNL(text);\n      if (!entries.length) {\n        this.setState({ nlBusy: false, nlError: 'Не вдалося розпізнати витрати. Спробуйте формат: «7 червня продукти 120, 500».' });\n        return;\n      }\n      this.applyEntries(entries);\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Розпізнавання тексту наразі недоступне.'\n        : (m || 'Не вдалося обробити запит. Спробуйте ще раз.');\n      this.setState({ nlBusy: false, nlError: msg });\n    }\n  }\n\n  // Адреса серверної функції. За замовчуванням — відносний шлях \"api/parse\"\n  // (працює і в корені, і в підпапці типу /budget/).\n  // Якщо функція живе на іншому домені (напр. окремий проєкт Vercel),\n  // задайте window.BUDGET_API_URL у самому HTML повною адресою, напр.:\n  //   window.BUDGET_API_URL = \"https://мій-проєкт.vercel.app/api/parse\";\n  apiUrl() {\n    return (typeof window !== 'undefined' && window.BUDGET_API_URL) || 'api/parse';\n  }\n\n  // Універсальний виклик моделі.\n  // У прототипі використовується вбудований місток window.claude.complete.\n  // На реальному сайті його немає — тоді запит іде на ваш сервер,\n  // який додає секретний ключ OpenAI і звертається до моделі.\n  async complete(prompt) {\n    if (window.claude && window.claude.complete) {\n      return await window.claude.complete(prompt);\n    }\n    const url = this.apiUrl();\n    let r;\n    try {\n      r = await fetch(url, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ prompt }),\n      });\n    } catch (e) { throw new Error('Сервер недоступний (' + url + '). Перевірте адресу функції та що вона задеплоєна.'); }\n    let data;\n    try { data = await r.json(); } catch (e) { data = null; }\n    if (!r.ok) {\n      const srv = (data && data.error) ? data.error : ('HTTP ' + r.status);\n      throw new Error('OpenAI: ' + srv);\n    }\n    return (data && data.text) || '';\n  }\n\n  // ---- Хмарна синхронізація (спільні дані на всіх пристроях) ----\n  // Адреса серверної функції зберігання. На реальному сайті задайте\n  //   window.BUDGET_DATA_URL = \"/api/data\";\n  // (у прототипі сервера немає → працює лише локальний localStorage).\n  dataUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_DATA_URL) return window.BUDGET_DATA_URL;\n    return this.apiUrl().replace(/parse(\\/?)$/, 'data$1');\n  }\n  adoptServer(server) {\n    const keepMonth = this.data ? this.data.currentMonth : server.currentMonth;\n    this.data = server;\n    if (!this.data.months) this.data.months = {};\n    if (!this.data.config) this.data.config = this.defaultData().config;\n    if (!this.data.config.limits) this.data.config.limits = this.defaultData().config.limits;\n    this.data.currentMonth = keepMonth || server.currentMonth || this.defaultData().currentMonth;\n    this._init = true;\n    this.maybeSeed();\n    this.reconcileRent();\n    this.saveLocal();\n    this.bump();\n  }\n  // Перший запуск: тягне спільні дані з сервера. Якщо сервер новіший — приймає його,\n  // інакше (сервер порожній/старіший) — піднімає локальні дані вгору.\n  async cloudLoad() {\n    if (this._cloudLoaded) return;\n    this._cloudLoaded = true;\n    this.setState({ sync: 'syncing' });\n    let server = null;\n    try {\n      const r = await fetch(this.dataUrl() + '?code=' + encodeURIComponent(this.PIN), { method: 'GET' });\n      if (r.status === 401) { this.setState({ sync: 'error' }); return; }\n      if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n      const j = await r.json();\n      server = j && j.data;\n    } catch (e) { this.setState({ sync: 'offline' }); return; }\n    const localT = (this.data && this.data._updatedAt) || 0;\n    const serverT = (server && server._updatedAt) || 0;\n    if (server && server.config && serverT >= localT) {\n      this.adoptServer(server);\n      this.setState({ sync: 'synced' });\n    } else {\n      this.setState({ sync: 'synced' });\n      this.cloudSave(true);\n    }\n  }\n  // Періодична перевірка: підхоплює зміни, зроблені на іншому пристрої.\n  async cloudPull() {\n    if (typeof document !== 'undefined' && document.hidden) return;\n    if (this.state.edit || this.state.nlBusy || this._cloudTimer || !this._cloudLoaded) return;\n    try {\n      const r = await fetch(this.dataUrl() + '?code=' + encodeURIComponent(this.PIN), { method: 'GET' });\n      if (!r.ok) return;\n      const j = await r.json();\n      const server = j && j.data;\n      const serverT = (server && server._updatedAt) || 0;\n      const localT = (this.data && this.data._updatedAt) || 0;\n      if (server && server.config && serverT > localT) {\n        this.adoptServer(server);\n        this.setState({ sync: 'synced' });\n      }\n    } catch (e) {}\n  }\n  // Запис у хмару (з дебаунсом, щоб не смикати сервер на кожну літеру).\n  cloudSave(immediate) {\n    clearTimeout(this._cloudTimer);\n    const doIt = async () => {\n      this._cloudTimer = null;\n      this.setState({ sync: 'syncing' });\n      try {\n        const r = await fetch(this.dataUrl(), {\n          method: 'POST', headers: { 'Content-Type': 'application/json' },\n          body: JSON.stringify({ code: this.PIN, data: this.data }),\n        });\n        if (r.status === 401) { this.setState({ sync: 'error' }); return; }\n        if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n        this.setState({ sync: 'synced' });\n      } catch (e) { this.setState({ sync: 'offline' }); }\n    };\n    if (immediate) doIt(); else this._cloudTimer = setTimeout(doIt, 1000);\n  }\n  forceSync() { this.cloudSave(true); this.cloudPull(); }\n\n  async parseNL(text) {\n    const [y, mo] = this.cm().split('-').map(Number);\n    const dim = this.daysInMonth();\n    const today = new Date();\n    const cats = this.CATS.map(c => `${c.id} = ${c.name}${c.desc ? ' (' + c.desc + ')' : ''}`).join('\\n');\n    const prompt =\n`Ти — парсер витрат для застосунку сімейного бюджету. Перетвори текст/диктовку користувача українською на структурований JSON.\n\nКатегорії (використовуй id зліва):\n${cats}\n\nКонтекст:\n- Таблиця показує місяць: ${this.MONTHS[mo - 1]} ${y} (номер місяця ${mo}, днів у місяці: ${dim}).\n- Сьогодні: ${today.getDate()} число, місяць ${today.getMonth() + 1}, ${today.getFullYear()} рік.\n\nПравила:\n- Кожна сума = окремий запис. Напр. \"продукти 120, 500, 800\" → три записи category=products з amount 120, 500, 800.\n- \"day\" = номер дня в показаному місяці (1..${dim}). Розпізнавай українські дати: \"сьоме червня\"=7, \"за 7 червня\"=7, \"7.06\"=7. \"сьогодні\" = ${today.getDate()}, \"вчора\" = ${today.getDate() - 1}. Якщо дату не вказано — використай число дня \"сьогодні\", якщо воно в межах місяця, інакше 1.\n- amount = додатне число у гривнях. Ігноруй \"грн\", \"₴\", \"гривень\".\n- ВАЖЛИВО (диктовка чисел): мобільне розпізнавання часто розбиває числівники на токени. Склади їх назад у одне число:\n  • \"5 1000\" = 5000, \"2 1000\" = 2000, \"12 1000\" = 12000 (множник на 1000). Так само зі \"100\": \"3 100\" = 300.\n  • Слова-множники: \"пʼять тисяч\"/\"5 тисяч\"/\"5 тис\" = 5000; \"півтори тисячі\" = 1500; \"пів тисячі\" = 500; \"дві з половиною тисячі\" = 2500.\n  • \"сто пʼятдесят\" = 150, \"тисяча двісті\" = 1200, \"три з половиною\" у контексті тисяч = 3500.\n  Тобто послідовність \"маленьке_число + (1000|100|тисяч|тис|сотні)\" — це множення, а не два окремі записи.\n- comment = короткий опис, якщо користувач назвав конкретну річ (напр. \"таксі\"), інакше \"\".\n- Бери лише витрати. Сторонній текст ігноруй.\n\nТекст користувача:\n\"\"\"${text}\"\"\"\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у такій формі:\n{\"entries\":[{\"day\":7,\"categoryId\":\"products\",\"amount\":120,\"comment\":\"\"}]}`;\n    const raw = await this.complete(prompt);\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('parse'); }\n    const ids = this.CATS.map(c => c.id);\n    return (data.entries || []).map(en => ({\n      day: Math.max(1, Math.min(dim, parseInt(en.day, 10) || 0)),\n      categoryId: ids.includes(en.categoryId) ? en.categoryId : null,\n      amount: Math.round(parseFloat(en.amount) || 0),\n      comment: (en.comment || '').toString().slice(0, 60),\n    })).filter(e => e.categoryId && e.amount > 0 && e.day >= 1);\n  }\n\n  applyEntries(entries) {\n    const mo = this.month();\n    this._undoSnap = JSON.stringify(this.data.months[this.cm()]);\n    const flash = {};\n    entries.forEach(en => {\n      if (!mo.days[en.day]) mo.days[en.day] = {};\n      if (!mo.days[en.day][en.categoryId]) mo.days[en.day][en.categoryId] = [];\n      mo.days[en.day][en.categoryId].push({ id: this.uid(), amount: String(en.amount), comment: en.comment || '' });\n      flash[en.day + '|' + en.categoryId] = true;\n    });\n    this.save();\n    this._flash = flash;\n    const total = entries.reduce((a, e) => a + e.amount, 0);\n    this.setState({ nlBusy: false, nlText: '', nlListening: false, nlResult: { count: entries.length, total, entries } });\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._resultTimer);\n    this._resultTimer = setTimeout(() => { if (this.state.nlResult) this.setState({ nlResult: null }); }, 5000);\n  }\n  undoNL() {\n    clearTimeout(this._resultTimer);\n    if (this._undoSnap) { this.data.months[this.cm()] = JSON.parse(this._undoSnap); this._undoSnap = null; this.save(); }\n    this._flash = null;\n    this.setState({ nlResult: null });\n  }\n\n  // ---- AI аналіз місяця (та сама модель, що й для текстового вводу) ----\n  catTotalsFor(key) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  openAI() {\n    this.setState({ aiOpen: true });\n    const r = this.state.aiResult;\n    if (!this.state.aiBusy && (!r || r.month !== this.cm())) this.runAI();\n  }\n  async runAI() {\n    if (this.state.aiBusy) return;\n    this.setState({ aiBusy: true, aiError: null });\n    try {\n      const prompt = this.buildAnalysisPrompt();\n      const raw = await this.complete(prompt);\n      const result = this.parseAnalysis(raw);\n      if (!result.insights.length && !result.summary) throw new Error('Порожня відповідь. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiResult: result });\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Аналіз наразі недоступний.'\n        : (m || 'Не вдалося виконати аналіз. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiError: msg });\n    }\n  }\n  buildAnalysisPrompt() {\n    const cm = this.cm();\n    const [y, mo] = cm.split('-').map(Number);\n    const now = new Date();\n    const isThisMonth = (y === now.getFullYear() && mo === now.getMonth() + 1);\n    const dim = this.daysInMonth();\n    const dayNow = isThisMonth ? now.getDate() : dim;\n    const cur = this.catTotalsFor(cm);\n    const pd = new Date(y, mo - 2, 1);\n    const pkey = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');\n    const pm = this.data.months[pkey];\n    const prevExists = !!(pm && pm.days && Object.keys(pm.days).length);\n    const prev = this.catTotalsFor(pkey);\n    const L = this.data.config.limits;\n    const budget = this.pnum(this.data.config.monthlyBudget);\n    const rent = this.pnum(this.monthRent());\n    const m = this.month();\n    let spent = rent; this.CATS.forEach(c => { spent += cur[c.id]; });\n    let incomeTotal = 0; m.income.forEach(r => { incomeTotal += this.pnum(r.amount); });\n    const incLines = m.income.filter(r => this.pnum(r.amount) > 0).map(r => `${(r.label && r.label.trim()) || 'Без назви'}: ${Math.round(this.pnum(r.amount))}`);\n\n    const catLines = this.CATS.map(c => {\n      const lim = c.limitKey ? this.pnum(L[c.limitKey]) : 0;\n      const limTxt = lim ? `, ліміт ${lim}` : '';\n      const prevTxt = prevExists ? `, минулого місяця ${Math.round(prev[c.id])}` : '';\n      return `- ${c.name}: ${Math.round(cur[c.id])} грн${limTxt}${prevTxt}`;\n    }).join('\\n');\n\n    const recs = [];\n    for (const day in m.days) for (const c of this.CATS) {\n      const arr = m.days[day][c.id];\n      if (arr) for (const r of arr) { const a = this.pnum(r.amount); if (a > 0) recs.push({ day: +day, cat: c.name, a, com: r.comment || '' }); }\n    }\n    recs.sort((a, b) => b.a - a.a);\n    const topLines = recs.slice(0, 7).map(r => `- ${r.day} число, ${r.cat}: ${Math.round(r.a)} грн${r.com ? ` (${r.com})` : ''}`).join('\\n');\n\n    return `Ти — фінансовий помічник для подружньої пари, що веде спільний сімейний бюджет. Проаналізуй місяць і дай 3–5 коротких, конкретних і дійсно корисних спостережень українською. Звертайся до пари на «ви».\n\nМісяць: ${this.MONTHS[mo - 1]} ${y}. ${isThisMonth ? `Місяць ще триває, сьогодні ${dayNow} число з ${dim}.` : `Місяць завершений (${dim} днів).`}\n\nЗагальне:\n- Місячний бюджет (ліміт): ${budget} грн\n- Витрачено разом, з орендою: ${Math.round(spent)} грн\n- Оренда житла: ${rent} грн\n- Залишок бюджету: ${Math.round(budget - spent)} грн\n- Додатковий дохід за місяць: ${Math.round(incomeTotal)} грн${incLines.length ? ` (${incLines.join('; ')})` : ''}\n\nВитрати за категоріями:\n${catLines}\n\nНайбільші окремі витрати:\n${topLines || '- немає'}\n\nДай спостереження, що справді корисні парі: де перевитрата над лімітом; помітні зміни проти минулого місяця (зростання/зниження); чи встигають вкластися в бюджет (врахуй, скільки днів минуло, якщо місяць триває); найбільші витрати; де реально можна зекономити; що йде добре. Не вигадуй даних, яких немає. Будь конкретним із сумами в гривнях. Уникай банальних і очевидних порад.\n\nКожне спостереження має поле type: \"positive\" (щось добре), \"warning\" (звернути увагу), \"alert\" (перевитрата або ризик), \"tip\" (конкретна порада), \"info\" (нейтральний факт).\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у формі:\n{\"summary\":\"одне-два речення загального підсумку місяця\",\"insights\":[{\"type\":\"warning\",\"title\":\"короткий заголовок\",\"detail\":\"1-2 речення з конкретикою та сумами\"}]}`;\n  }\n  parseAnalysis(raw) {\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('Не вдалося прочитати відповідь моделі. Спробуйте ще раз.'); }\n    const types = ['positive', 'warning', 'alert', 'tip', 'info'];\n    const insights = (data.insights || []).slice(0, 6).map(i => ({\n      type: types.includes(i.type) ? i.type : 'info',\n      title: (i.title || '').toString().slice(0, 90),\n      detail: (i.detail || '').toString().slice(0, 400),\n    })).filter(i => i.title || i.detail);\n    return { month: this.cm(), summary: (data.summary || '').toString().slice(0, 400), insights };\n  }\n\n  // ---- Статистика за весь період ----\n  STAT_COLORS() {\n    return { products:'#0a84ff', eatingOut:'#ff9f0a', home:'#34c759', subs:'#5ac8fa',\n             family:'#af52de', health:'#ff375f', work:'#64d2ff', transport:'#ffcc00',\n             leisure:'#30d158', charity:'#bf5af2', personal:'#ff6482' };\n  }\n  // Збирає по-місячну агрегацію по всій історії (категорії, оренда, дохід, найбільші витрати, по днях).\n  allStatMonths() {\n    const all = [];\n    const cfgRent = this.pnum(this.data.config.rent);\n    for (const key in this.data.months) {\n      const parts = key.split('-'); const yy = +parts[0], mm = +parts[1];\n      if (!yy || !mm) continue;\n      const M = this.data.months[key];\n      const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n      let catSum = 0, recCount = 0, biggest = null;\n      const dayTotals = {};\n      if (M && M.days) {\n        for (const d in M.days) {\n          for (const c of this.CATS) {\n            const arr = M.days[d][c.id];\n            if (!arr) continue;\n            for (const r of arr) {\n              const v = this.pnum(r.amount);\n              if (v <= 0) continue;\n              byCat[c.id] += v; catSum += v; recCount++;\n              dayTotals[d] = (dayTotals[d] || 0) + v;\n              if (!biggest || v > biggest.a) biggest = { a: v, cat: c.id, day: +d, com: r.comment || '' };\n            }\n          }\n        }\n      }\n      let income = 0; if (M && M.income) M.income.forEach(r => income += this.pnum(r.amount));\n      if (catSum <= 0 && income <= 0) continue;\n      const rent = (M && M.rent != null && M.rent !== '') ? this.pnum(M.rent) : (catSum > 0 ? cfgRent : 0);\n      all.push({ key, y: yy, mo: mm, byCat, catSum, rent, income, spent: catSum + rent, recCount, biggest, dayTotals });\n    }\n    all.sort((a, b) => a.key < b.key ? -1 : (a.key > b.key ? 1 : 0));\n    return all;\n  }\n  filterStatMonths(all, period) {\n    if (period === 'last12') return all.slice(-12);\n    const yr = parseInt(period, 10);\n    if (period !== 'all' && yr) return all.filter(m => m.y === yr);\n    return all;\n  }\n  buildStats(accent) {\n    const COL = this.STAT_COLORS();\n    const RENT_COL = '#8e8e93';\n    const all = this.allStatMonths();\n    const period = this.state.statsPeriod || 'all';\n    const months = this.filterStatMonths(all, period);\n\n    const years = Array.from(new Set(all.map(m => m.y))).sort((a, b) => b - a);\n    const chipDef = [{ key: 'all', label: 'Увесь час' }];\n    if (all.length > 12) chipDef.push({ key: 'last12', label: 'Останні 12 міс' });\n    years.forEach(yy => chipDef.push({ key: String(yy), label: String(yy) }));\n    const chipStyle = act => 'flex:none;height:32px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:560;font-family:inherit;cursor:pointer;transition:background .12s;' +\n      (act ? 'background:var(--accent,#0a84ff);color:#fff;border:1px solid var(--accent,#0a84ff);' : 'background:#fff;color:#1d1d1f;border:1px solid rgba(0,0,0,.1);');\n    const statsChips = chipDef.map(c => ({ key: c.key, label: c.label, style: chipStyle(period === c.key),\n      onClick: () => this.setState({ statsPeriod: c.key, statHover: null }) }));\n\n    if (!months.length) {\n      return { empty: true, statsChips, periodLabel: 'Немає даних', kpis: [], monthBars: [], catBars: [], shareSegs: [], catTrends: [], weekdayBars: [], seasonBars: [], facts: [], avgDisp: '', avgPct: '0%', barGap: '4px' };\n    }\n\n    const first = months[0], last = months[months.length - 1];\n    let total = 0, totalRent = 0, totalIncome = 0, totalRec = 0;\n    const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n    let maxM = months[0], minM = months[0];\n    months.forEach(mm => {\n      total += mm.spent; totalRent += mm.rent; totalIncome += mm.income; totalRec += mm.recCount;\n      this.CATS.forEach(c => byCat[c.id] += mm.byCat[c.id]);\n      if (mm.spent > maxM.spent) maxM = mm;\n      if (mm.spent < minM.spent) minM = mm;\n    });\n    const totalCat = total - totalRent;\n    const n = months.length;\n    const avg = total / n;\n    const monthsWord = this.plural(n, 'місяць', 'місяці', 'місяців');\n    const rangeLabel = this.MONTHS_SHORT[first.mo - 1].toLowerCase() + ' ' + first.y + ' – ' + this.MONTHS_SHORT[last.mo - 1].toLowerCase() + ' ' + last.y;\n    const periodLabel = (n > 1 ? rangeLabel + ' · ' : '') + n + ' ' + monthsWord;\n\n    // KPI\n    const kpis = [\n      { label: 'Всього витрачено', value: this.money(total), sub: 'за ' + n + ' ' + monthsWord, color: '#1d1d1f' },\n      { label: 'В середньому / місяць', value: this.money(avg), sub: 'включно з орендою', color: '#1d1d1f' },\n      { label: 'Найдорожчий місяць', value: this.money(maxM.spent), sub: this.MONTHS[maxM.mo - 1] + ' ' + maxM.y, color: '#ff453a' },\n      { label: 'Найекономніший місяць', value: this.money(minM.spent), sub: this.MONTHS[minM.mo - 1] + ' ' + minM.y, color: '#34c759' },\n    ];\n\n    // Динаміка по місяцях\n    const maxSpent = Math.max.apply(null, months.map(m => m.spent).concat([1]));\n    const multiYear = new Set(months.map(m => m.y)).size > 1;\n    const monthBars = months.map((mm, i) => {\n      let color = accent;\n      if (mm.key === maxM.key) color = '#ff453a';\n      else if (mm.key === minM.key) color = '#34c759';\n      const label = multiYear ? ((i === 0 || mm.mo === 1) ? String(mm.y) : '') : this.MONTHS_SHORT[mm.mo - 1];\n      const lines = ['Витрати: ' + this.money(mm.spent)];\n      if (mm.income > 0) lines.push('Дохід: +' + this.money(mm.income));\n      return {\n        hPct: (mm.spent / maxSpent * 100) + '%', color, label,\n        onEnter: e => { const r = e.currentTarget.getBoundingClientRect(); this.setState({ statHover: { title: this.MONTHS[mm.mo - 1] + ' ' + mm.y, lines, top: r.top - 6, left: r.left + r.width / 2 } }); },\n        onLeave: () => { if (this.state.statHover) this.setState({ statHover: null }); },\n      };\n    });\n    const barGap = n > 36 ? '2px' : (n > 18 ? '3px' : '6px');\n    const avgPct = (avg / maxSpent * 100) + '%';\n\n    // Структура витрат\n    const catItems = this.CATS.map(c => ({ id: c.id, name: c.name, total: byCat[c.id], color: COL[c.id] }));\n    if (totalRent > 0) catItems.push({ id: 'rent', name: 'Оренда житла', total: totalRent, color: RENT_COL });\n    catItems.sort((a, b) => b.total - a.total);\n    const visible = catItems.filter(c => c.total > 0);\n    const maxCat = Math.max.apply(null, visible.map(c => c.total).concat([1]));\n    const catBars = visible.map(c => ({ name: c.name, color: c.color, wPct: (c.total / maxCat * 100) + '%', amountDisp: this.money(c.total), pctDisp: (total > 0 ? Math.round(c.total / total * 100) : 0) + '%' }));\n    const shareSegs = visible.map(c => ({ color: c.color, wPct: (c.total / (total || 1) * 100) + '%' }));\n\n    // Тренди по категоріях (sparkline + напрям)\n    const catTrends = this.CATS.map(c => {\n      const series = months.map(m => m.byCat[c.id]);\n      const tot = series.reduce((a, b) => a + b, 0);\n      const mx = Math.max.apply(null, series.concat([1]));\n      const spark = series.map(v => ({ hPct: (tot > 0 ? Math.max(2, v / mx * 100) : 0) + '%', color: COL[c.id] }));\n      let arrow = '≈', tcolor = '#86868b', tpct = 'стабільно';\n      if (series.length >= 4 && tot > 0) {\n        const half = Math.floor(series.length / 2);\n        const f = series.slice(0, half), s = series.slice(half);\n        const fa = f.reduce((a, b) => a + b, 0) / f.length, sa = s.reduce((a, b) => a + b, 0) / s.length;\n        if (fa > 0) {\n          const ch = (sa - fa) / fa * 100;\n          if (ch > 8) { arrow = '↑'; tcolor = '#ff3b30'; tpct = '+' + Math.round(ch) + '%'; }\n          else if (ch < -8) { arrow = '↓'; tcolor = '#34c759'; tpct = Math.round(ch) + '%'; }\n        } else if (sa > 0) { arrow = '↑'; tcolor = '#ff3b30'; tpct = 'новий'; }\n      }\n      return { id: c.id, name: c.name, color: COL[c.id], tot, totalDisp: this.money(tot), avgDisp: this.money(tot / n), spark, arrow, tcolor, tpct };\n    }).filter(c => c.tot > 0).sort((a, b) => b.tot - a.tot);\n\n    // Витрати за днями тижня (без оренди)\n    const wdTot = [0, 0, 0, 0, 0, 0, 0];\n    months.forEach(mm => { for (const d in mm.dayTotals) { const wd = new Date(mm.y, mm.mo - 1, +d).getDay(); wdTot[wd] += mm.dayTotals[d]; } });\n    const wdOrder = [1, 2, 3, 4, 5, 6, 0], wdNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];\n    const wdMax = Math.max.apply(null, wdTot.concat([1]));\n    const weekdayBars = wdOrder.map((idx, i) => {\n      const we = (idx === 0 || idx === 6);\n      return { name: wdNames[i], hPct: (wdTot[idx] / wdMax * 100) + '%', amountDisp: this.abbr(wdTot[idx]),\n               color: we ? '#ff9f0a' : accent, nameColor: we ? '#ff9f0a' : '#6e6e73' };\n    });\n\n    // Сезонність — середні витрати (без оренди) по календарних місяцях\n    const sea = Array.from({ length: 12 }, () => ({ sum: 0, cnt: 0 }));\n    months.forEach(mm => { sea[mm.mo - 1].sum += mm.catSum; sea[mm.mo - 1].cnt++; });\n    const seaAvg = sea.map(s => s.cnt ? s.sum / s.cnt : 0);\n    const seaMax = Math.max.apply(null, seaAvg.concat([1]));\n    let peakMo = 0; seaAvg.forEach((v, i) => { if (v > seaAvg[peakMo]) peakMo = i; });\n    const seasonBars = this.MONTHS_SHORT.map((nm, i) => ({\n      name: nm, hPct: (seaAvg[i] / seaMax * 100) + '%', amountDisp: sea[i].cnt ? this.abbr(seaAvg[i]) : '',\n      color: i === peakMo ? '#ff9f0a' : accent, nameColor: i === peak
