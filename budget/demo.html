  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

omment: 'Комуналка' });\n      }\n      this.data.months[key] = md;\n    }\n    this.data._seedV = this.SEED_VERSION;\n    this.saveLocal();\n  }\n  monthRent() {\n    const m = this.month();\n    return (m && m.rent != null && m.rent !== '') ? m.rent : this.data.config.rent;\n  }\n  // Зберігання користувацької зміни: оновити мітку часу, записати локально та підняти в хмару.\n  save() { this.data._updatedAt = Date.now(); this.saveLocal(); this.cloudSave(); }\n  // Лише локальний запис (для сіду, реконсиляції, зміни перегляду місяця) — без хмари й без мітки часу.\n  saveLocal() { try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) {} }\n  bump() { this.setState(s => ({ tick: s.tick + 1 })); }\n  pnum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n  uid() { return Math.random().toString(36).slice(2, 9); }\n  fmt(n) { return new Intl.NumberFormat('uk-UA', { maximumFractionDigits: 0 }).format(Math.round(n)); }\n  money(v) { return this.fmt(this.pnum(v)) + ' ₴'; }\n  num(v) { const n = this.pnum(v); return n ? this.fmt(n) : ''; }\n  abbr(v) {\n    const n = Math.round(this.pnum(v));\n    if (!n) return '';\n    if (Math.abs(n) < 1000) return String(n);\n    const k = n / 1000;\n    const s = (Math.abs(k) < 100) ? (Math.round(k * 10) / 10) : Math.round(k);\n    return String(s).replace('.', ',') + 'к';\n  }\n\n  cm() { return this.data.currentMonth; }\n  month() {\n    const k = this.cm();\n    if (!this.data.months[k]) this.data.months[k] = { days: {}, income: [] };\n    const m = this.data.months[k];\n    if (!m.days) m.days = {};\n    if (!m.income) m.income = [];\n    return m;\n  }\n  daysInMonth() { const [y, mo] = this.cm().split('-').map(Number); return new Date(y, mo, 0).getDate(); }\n  setMobDay(d) { const dim = this.daysInMonth(); if (d < 1) d = 1; if (d > dim) d = dim; this.setState({ mobDay: d }); }\n  recsOf(day, cat) { const m = this.month(); const dd = m.days[day]; return (dd && dd[cat]) ? dd[cat] : []; }\n\n  beforeStart(y, mo) { return y < this.START_Y || (y === this.START_Y && mo < this.START_MO); }\n  shift(delta) {\n    const [y, mo] = this.cm().split('-').map(Number);\n    const d = new Date(y, mo - 1 + delta, 1);\n    let ny = d.getFullYear(), nm = d.getMonth() + 1;\n    if (this.beforeStart(ny, nm)) { ny = this.START_Y; nm = this.START_MO; }\n    const nk = ny + '-' + String(nm).padStart(2, '0');\n    if (nk === this.cm()) { this.setState({ monthPicker: false }); return; }\n    this.data.currentMonth = nk;\n    this.month();\n    this.setState({ sel: null, edit: null, monthPicker: false, mobDay: null });\n    this.saveLocal();\n  }\n  openMonthPicker() {\n    const [y] = this.cm().split('-').map(Number);\n    this.setState({ monthPicker: !this.state.monthPicker, pickerYear: y, sel: null, edit: null });\n  }\n  pickerShiftYear(delta) {\n    const ny = (this.state.pickerYear || this.START_Y) + delta;\n    const maxY = new Date().getFullYear() + 1;\n    if (ny < this.START_Y || ny > maxY) return;\n    this.setState({ pickerYear: ny });\n  }\n  pickMonth(mo) {\n    const y = this.state.pickerYear || this.START_Y;\n    if (this.beforeStart(y, mo)) return;\n    this.data.currentMonth = y + '-' + String(mo).padStart(2, '0');\n    this.month();\n    this.setState({ sel: null, edit: null, monthPicker: false, mobDay: null });\n    this.saveLocal();\n  }\n  goToday() {\n    const d = new Date();\n    this.data.currentMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');\n    this.setState({ sel: null, edit: null, mobDay: null });\n    this.saveLocal();\n    this.requestCenterToday();\n  }\n\n  clearSelection() {\n    if (!this.state.sel && !this.state.edit) return;\n    if (this.state.edit) this.commitEdit();\n    this._focusNext = false;\n    this.setState({ sel: null, edit: null });\n  }\n  // Позначка останнього заповненого дня (одна на місяць). Клік по даті — увімкнути/вимкнути,\n  // клік по іншій даті — переноситься. Зберігається й синкається разом із даними місяця.\n  toggleMark(day) {\n    const m = this.month();\n    m.mark = (m.mark === day) ? null : day;\n    this.save();\n    this.bump();\n  }\n  selectCell(day, cat) {\n    const ed = this.state.edit;\n    if (ed && ed.day === day && ed.cat === cat) return;\n    if (ed) this.commitEdit();\n    const recs = this.recsOf(day, cat);\n    if (recs.length > 1) {\n      this._focusNext = false;\n      this.setState({ sel: { day, cat }, edit: null });\n    } else {\n      this.startEdit(day, cat);\n    }\n  }\n  startEdit(day, cat) {\n    const recs = this.recsOf(day, cat);\n    const draft = recs.length === 1 ? (recs[0].amount == null ? '' : String(recs[0].amount)) : '';\n    this._focusNext = true;\n    this.setState({ sel: { day, cat }, edit: { day, cat }, draft });\n  }\n  commitEdit() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const { day, cat } = ed;\n    const v = this.state.draft;\n    const amt = this.pnum(v);\n    const mo = this.month();\n    const recs = (mo.days[day] && mo.days[day][cat]) || null;\n    if (amt > 0) {\n      if (recs && recs.length >= 1) {\n        recs[0].amount = String(v);\n      } else {\n        if (!mo.days[day]) mo.days[day] = {};\n        mo.days[day][cat] = [{ id: this.uid(), amount: String(v), comment: '' }];\n      }\n    } else {\n      if (mo.days[day] && mo.days[day][cat]) {\n        delete mo.days[day][cat];\n        if (!Object.keys(mo.days[day]).length) delete mo.days[day];\n      }\n    }\n    this.save();\n  }\n  moveDown() {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const ci = this.CATS.findIndex(c => c.id === ed.cat);\n    let ni = ci + 1, nd = ed.day;\n    if (ni >= this.CATS.length) {\n      ni = 0; nd = ed.day + 1;\n      if (nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    }\n    this.startEdit(nd, this.CATS[ni].id);\n  }\n  moveSide(dir) {\n    const ed = this.state.edit;\n    if (!ed) return;\n    const nd = ed.day + dir;\n    if (nd < 1 || nd > this.daysInMonth()) { this.setState({ edit: null }); return; }\n    this.startEdit(nd, ed.cat);\n  }\n  cellKey(e) {\n    if (e.key === 'Enter') { e.preventDefault(); this.commitEdit(); this.moveDown(); }\n    else if (e.key === 'Tab') { e.preventDefault(); this.commitEdit(); this.moveSide(e.shiftKey ? -1 : 1); }\n    else if (e.key === 'Escape') { e.preventDefault(); this._focusNext = false; this.setState({ edit: null }); }\n  }\n\n  addBarRec() {\n    const s = this.state.sel; if (!s) return;\n    if (this.state.edit) { this.commitEdit(); }\n    const mo = this.month();\n    if (!mo.days[s.day]) mo.days[s.day] = {};\n    if (!mo.days[s.day][s.cat]) mo.days[s.day][s.cat] = [];\n    mo.days[s.day][s.cat].push({ id: this.uid(), amount: '', comment: '' });\n    this.save();\n    this.setState({ edit: null });\n  }\n  delBarRec(idx) {\n    const s = this.state.sel; if (!s) return;\n    const mo = this.month();\n    const arr = mo.days[s.day] && mo.days[s.day][s.cat];\n    if (!arr) return;\n    arr.splice(idx, 1);\n    if (!arr.length) { delete mo.days[s.day][s.cat]; if (!Object.keys(mo.days[s.day]).length) delete mo.days[s.day]; }\n    this.save();\n    this.setState({ edit: null });\n  }\n\n  addIncome(ev) { const id = this.uid(); this.month().income.push({ id, label: '', amount: '' }); this.save(); this.openPop(id, ev, true); }\n  openPop(id, ev, isNew) { this._focusPop = true; this.setState({ incPop: { id, isNew: !!isNew } }); }\n  commitIncome(id) {\n    const m = this.month();\n    const idx = m.income.findIndex(x => x.id === id);\n    if (idx >= 0) {\n      const r = m.income[idx];\n      const emptyL = !(r.label && r.label.trim());\n      const emptyA = !(r.amount && String(r.amount).trim());\n      if (emptyL && emptyA) m.income.splice(idx, 1);\n    }\n    this.save();\n  }\n  closeIncPop() { const p = this.state.incPop; if (p) this.commitIncome(p.id); this.setState({ incPop: null }); }\n  delIncomeById(id) {\n    const m = this.month();\n    const idx = m.income.findI  = this.cm();\n    const m = this.month();\n    if (!m.days[day]) m.days[day] = {};\n    if (!m.days[day][cat]) m.days[day][cat] = [];\n    const recId = this.uid();\n    m.days[day][cat].push({ id: recId, amount: String(amt), comment: (it.name || '').trim() });\n    const idx = arr.findIndex(x => x.id === id);\n    const snapItem = Object.assign({}, it);\n    if (idx >= 0) arr.splice(idx, 1);\n    if (usedFund > 0) this.data.config.bigPurchaseFund = String(Math.max(0, Math.round(fund - usedFund)));\n    this.save();\n    this._flash = { [day + '|' + cat]: true };\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._wlToastTimer);\n    this._wlToastTimer = setTimeout(() => { if (this.state.wlToast) this.setState({ wlToast: null }); }, 6000);\n    this.setState({ wlExpand: null, wlPop: null, nlResult: null,\n      wlToast: { item: snapItem, idx: (idx >= 0 ? idx : 0), monthKey, day, cat, recId, usedFund,\n        title: 'Куплено: ' + ((it.name || '').trim() || 'покупка') + ' · ' + this.money(amt) } });\n  }\n  undoWlBuy() {\n    const t = this.state.wlToast;\n    if (!t) return;\n    const mm = this.data.months[t.monthKey];\n    if (mm && mm.days[t.day] && mm.days[t.day][t.cat]) {\n      const i = mm.days[t.day][t.cat].findIndex(r => r.id === t.recId);\n      if (i >= 0) mm.days[t.day][t.cat].splice(i, 1);\n      if (mm.days[t.day][t.cat].length === 0) delete mm.days[t.day][t.cat];\n      if (mm.days[t.day] && Object.keys(mm.days[t.day]).length === 0) delete mm.days[t.day];\n    }\n    if (!this.data.config.wishlist) this.data.config.wishlist = [];\n    const arr = this.data.config.wishlist;\n    const at = Math.min(Math.max(0, t.idx), arr.length);\n    arr.splice(at, 0, t.item);\n    if (t.usedFund > 0) this.data.config.bigPurchaseFund = String(Math.round(this.pnum(this.data.config.bigPurchaseFund) + t.usedFund));\n    this.save();\n    this._flash = null;\n    clearTimeout(this._wlToastTimer);\n    this.setState({ wlToast: null });\n  }\n  applyMonthLimits(limits) { const m = this.month(); m.limits = Object.assign({}, limits); this.save(); this.bump(); }\n  revertMonthLimits() { const m = this.month(); delete m.limits; this.save(); this.bump(); }\n  // Середні щоденні витрати по категоріях (без оренди) за всю історію — «звичний» темп\n  avgDailySpend() {\n    const stamp = (this.data && this.data._updatedAt) || 0;\n    if (this._avgDailyStamp === stamp && this._avgDailyVal != null) return this._avgDailyVal;\n    let totalSpend = 0, totalDays = 0;\n    for (const key in this.data.months) {\n      const parts = key.split('-').map(Number);\n      const ky = parts[0], kmo = parts[1];\n      if (!ky || !kmo) continue;\n      const tot = this.catTotalsFor(key);\n      let s = 0; this.CATS.forEach(c => s += tot[c.id]);\n      if (s > 0) { totalSpend += s; totalDays += new Date(ky, kmo, 0).getDate(); }\n    }\n    this._avgDailyVal = totalDays > 0 ? totalSpend / totalDays : 0;\n    this._avgDailyStamp = stamp;\n    return this._avgDailyVal;\n  }\n\n  plural(n, one, few, many) {\n    n = Math.abs(n) % 100; const n1 = n % 10;\n    if (n > 10 && n < 20) return many;\n    if (n1 > 1 && n1 < 5) return few;\n    if (n1 === 1) return one;\n    return many;\n  }\n\n  // ---- Natural-language / voice entry ----\n  toggleVoice() { if (this.state.nlListening) this.stopVoice(); else this.startVoice(); }\n  startVoice() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ nlError: 'Голосовий ввід не підтримується у цьому браузері. Введіть витрату текстом.' }); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ nlError: 'Не вдалося увімкнути мікрофон.' }); return; }\n    rec.lang = 'uk-UA'; rec.continuous = true; rec.interimResults = true;\n    this._voiceBase = this.state.nlText ? (this.state.nlText.trim() + ' ') : '';\n    rec.onresult = (e) => {\n      let t = '';\n      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;\n      this.setState({ nlText: this.normalizeNumbers(this._voiceBase + t) });\n    };\n    rec.onerror = (e) => {\n      const err = e && e.error;\n      let msg = 'Помилка мікрофона.';\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = 'Доступ до мікрофона заборонено. Дозвольте його у браузері.';\n      else if (err === 'no-speech') msg = null;\n      this._recog = null;\n      this.setState({ nlListening: false, nlError: msg });\n    };\n    rec.onend = () => { this._recog = null; this.setState({ nlListening: false }); };\n    this._recog = rec;\n    try { rec.start(); this.setState({ nlListening: true, nlError: null, nlResult: null }); }\n    catch (e) { this._recog = null; this.setState({ nlListening: false }); }\n  }\n  stopVoice() { if (this._recog) { try { this._recog.stop(); } catch (e) {} } this.setState({ nlListening: false }); }\n\n  async submitNL() {\n    const text = (this.state.nlText || '').trim();\n    if (!text || this.state.nlBusy) return;\n    if (this.state.nlListening) this.stopVoice();\n    this.setState({ nlBusy: true, nlError: null, nlResult: null });\n    try {\n      const ops = await this.parseNL(text);\n      this.applyOps(ops);\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Розпізнавання тексту наразі недоступне.'\n        : (m || 'Не вдалося обробити запит. Спробуйте ще раз.');\n      this.setState({ nlBusy: false, nlError: msg });\n    }\n  }\n\n  // Адреса серверної функції. За замовчуванням — відносний шлях \"api/parse\"\n  // (працює і в корені, і в підпапці типу /budget/).\n  // Якщо функція живе на іншому домені (напр. окремий проєкт Vercel),\n  // задайте window.BUDGET_API_URL у самому HTML повною адресою, напр.:\n  //   window.BUDGET_API_URL = \"https://мій-проєкт.vercel.app/api/parse\";\n  apiUrl() {\n    return (typeof window !== 'undefined' && window.BUDGET_API_URL) || 'api/parse';\n  }\n\n  // Універсальний виклик моделі.\n  // У прототипі використовується вбудований місток window.claude.complete.\n  // На реальному сайті його немає — тоді запит іде на ваш сервер,\n  // який додає секретний ключ OpenAI і звертається до моделі.\n  async complete(prompt) {\n    if (window.claude && window.claude.complete) {\n      return await window.claude.complete(prompt);\n    }\n    const url = this.apiUrl();\n    let r;\n    try {\n      r = await fetch(url, {\n        method: 'POST',\n        headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n        body: JSON.stringify({ prompt }),\n      });\n    } catch (e) { throw new Error('Сервер недоступний (' + url + '). Перевірте адресу функції та що вона задеплоєна.'); }\n    if (r.status === 401 || r.status === 403) { this._on401(); throw new Error('Сесія застаріла. Увійдіть знову.'); }\n    let data;\n    try { data = await r.json(); } catch (e) { data = null; }\n    if (!r.ok) {\n      const srv = (data && data.error) ? data.error : ('HTTP ' + r.status);\n      throw new Error('OpenAI: ' + srv);\n    }\n    return (data && data.text) || '';\n  }\n\n  // ---- Хмарна синхронізація (спільні дані на всіх пристроях) ----\n  // Адреса серверної функції зберігання. На реальному сайті задайте\n  //   window.BUDGET_DATA_URL = \"/api/data\";\n  // (у прототипі сервера немає → працює лише локальний localStorage).\n  dataUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_DATA_URL) return window.BUDGET_DATA_URL;\n    return this.apiUrl().replace(/parse(\\/?)$/, 'data$1');\n  }\n  adoptServer(server) {\n    const keepMonth = this.data ? this.data.currentMonth : server.currentMonth;\n    this.data = server;\n    if (!this.data.months) this.data.months = {};\n    if (!this.data.config) this.data.config = this.defaultData().config;\n    if (!this.data.config.limits) this.data.config.limits = this.defaultData().config.limits;\n    this.normalizeLimits(this.data.config.limits);\n    if (!this.data.config.wishlist) this.data.config.wishlist = [];\n    if (this.data.config.bigPurchaseFund == null) this.data.config.bigPurchaseFund = '0';\n    this.data.currentMonth = keepMonth || server.currentMonth || this.defaultData().currentMonth;\n    this._init = true;\n    this.maybeSeed();\n    this.reconcileRent();\n    this.saveLocal();\n    this.bump();\n  }\n  // Перший запуск: тягне спільні дані з сервера. Якщо сервер новіший — приймає його,\n  // інакше (сервер порожній/старіший) — піднімає локальні дані вгору.\n  async cloudLoad() {\n    if (this.isDemo()) { this._cloudLoaded = true; this.setState({ sync: 'idle' }); return; }\n    if (this._cloudLoaded) return;\n    this._cloudLoaded = true;\n    this.setState({ sync: 'syncing' });\n    let server = null;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n      const j = await r.json();\n      server = j && j.data;\n    } catch (e) { this.setState({ sync: 'offline' }); return; }\n    const localT = (this.data && this.data._updatedAt) || 0;\n    const serverT = (server && server._updatedAt) || 0;\n    if (server && server.config && serverT >= localT) {\n      this.adoptServer(server);\n      this.setState({ sync: 'synced' });\n    } else {\n      this.setState({ sync: 'synced' });\n      this.cloudSave(true);\n    }\n  }\n  // Періодична перевірка: підхоплює зміни, зроблені на іншому пристрої.\n  async cloudPull() {\n    if (typeof document !== 'undefined' && document.hidden) return;\n    if (!this.state.unlocked) return;\n    if (this.state.edit || this.state.nlBusy || this._cloudTimer || !this._cloudLoaded) return;\n    try {\n      const r = await fetch(this.dataUrl(), { method: 'GET', headers: this.authHeaders() });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json();\n      const server = j && j.data;\n      const serverT = (server && server._updatedAt) || 0;\n      const localT = (this.data && this.data._updatedAt) || 0;\n      if (server && server.config && serverT > localT) {\n        this.adoptServer(server);\n        this.setState({ sync: 'synced' });\n      }\n    } catch (e) {}\n  }\n  // Запис у хмару (з дебаунсом, щоб не смикати сервер на кожну літеру).\n  cloudSave(immediate) {\n    clearTimeout(this._cloudTimer);\n    const doIt = async () => {\n      this._cloudTimer = null;\n      this.setState({ sync: 'syncing' });\n      try {\n        const r = await fetch(this.dataUrl(), {\n          method: 'POST', headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n          body: JSON.stringify({ data: this.data }),\n        });\n        if (r.status === 401 || r.status === 403) { this._on401(); return; }\n        if (!r.ok) { this.setState({ sync: 'offline' }); return; }\n        this.setState({ sync: 'synced' });\n      } catch (e) { this.setState({ sync: 'offline' }); }\n    };\n    if (immediate) doIt(); else this._cloudTimer = setTimeout(doIt, 1000);\n  }\n  forceSync() { this.cloudSave(true); this.cloudPull(); }\n\n  // ---- Присутність: «хто зараз на сайті» (аватарки родини в шапці) ----\n  // Адреса виводиться з dataUrl (.../data → .../presence) або window.BUDGET_PRESENCE_URL.\n  presenceUrl() {\n    if (typeof window !== 'undefined' && window.BUDGET_PRESENCE_URL) return window.BUDGET_PRESENCE_URL;\n    return this.dataUrl().replace(/data(\\/?)$/, 'presence$1');\n  }\n  myAuth() {\n    try { return JSON.parse(localStorage.getItem('familyBudget_auth') || 'null') || {}; } catch (e) { return {}; }\n  }\n  // Один пульс: повідомляємо серверу, що ми тут, і отримуємо список активних.\n  async presenceBeat() {\n    if (!this.usesServer() || !this.state.unlocked || !this.sessionToken()) return;\n    if (typeof document !== 'undefined' && document.hidden) return;\n    const me = this.myAuth();\n    try {\n      const r = await fetch(this.presenceUrl(), {\n        method: 'POST',\n        headers: this.authHeaders({ 'Content-Type': 'application/json' }),\n        body: JSON.stringify({ name: me.name || '', picture: me.picture || '' }),\n      });\n      if (r.status === 401 || r.status === 403) { this._on401(); return; }\n      if (!r.ok) return;\n      const j = await r.json().catch(() => null);\n      const users = (j && Array.isArray(j.users) ? j.users : []);\n      this.setState({ presence: users });\n    } catch (e) { /* офлайн — мовчки */ }\n  }\n  startPresence() {\n    if (this._presenceTimer || !this.usesServer()) return;\n    this.presenceBeat();\n    this._presenceTimer = setInterval(() => this.presenceBeat(), 20000);\n  }\n  stopPresence() {\n    clearInterval(this._presenceTimer); this._presenceTimer = null;\n    this.setState({ presence: [] });\n  }\n\n  // Чистка артефактів голосового вводу: STT пише \"девʼять тисяч\" як \"9 1000\",\n  // \"шість тисяч сто\" як \"6 1000 100\", \"пʼять мільйонів\" як \"5 1.000.000\".\n  // Склеюємо детерміновано, ще ДО моделі, щоб не залежати від її примх.\n  normalizeNumbers(text) {\n    let s = String(text || '');\n    // 1.000.000 / 1.000 (крапки як розділювач тисяч) -> чисті цифри\n    s = s.replace(/\\b\\d{1,3}(?:\\.\\d{3})+\\b/g, m => m.replace(/\\./g, ''));\n    // множник цифрою (потрібен пробіл, інакше \"6100\" зламалося б): \"9 1000\" -> 9000\n    s = s.replace(/\\b(\\d{1,4})\\s+(1000000|1000|100)(?!\\d)/g, (m, a, b) => {\n      const A = parseInt(a, 10), B = parseInt(b, 10);\n      return A < B ? String(A * B) : m;\n    });\n    // множник словом (пробіл необовʼязковий): \"5 тисяч\"/\"5тис\"/\"2 млн\" -> 5000/5000/2000000\n    s = s.replace(/\\b(\\d{1,4})\\s*(тисяч[іья]?|тис\\.?|млн\\.?|мільйон(?:а|и|ів|ом)?|сотн[іяь]|сотень|сот\\.?)(?![а-яіїєґ'ʼА-ЯІЇЄҐ\\d])/gi, (m, a, b) => {\n      const A = parseInt(a, 10);\n      const lb = b.toLowerCase();\n      let B;\n      if (lb.startsWith('тис')) B = 1000;\n      else if (lb.startsWith('млн') || lb.startsWith('міль')) B = 1000000;\n      else if (lb.startsWith('сот')) B = 100;\n      else return m;\n      return A < B ? String(A * B) : m;\n    });\n    // хвіст складеного числівника: \"6000 100\" -> 6100, \"500 50\" -> 550 (ітеративно)\n    let prev;\n    do {\n      prev = s;\n      s = s.replace(/\\b(\\d{2,})\\s+(\\d{1,3})\\b/g, (m, a, b) => {\n        const A = parseInt(a, 10), B = parseInt(b, 10);\n        if (B > 0 && A % 1000 === 0 && B < 1000) return String(A + B);\n        if (B > 0 && A % 100 === 0 && B < 100) return String(A + B);\n        return m;\n      });\n    } while (s !== prev);\n    return s;\n  }\n\n  async parseNL(text) {\n    text = this.normalizeNumbers(text);\n    const [y, mo] = this.cm().split('-').map(Number);\n    const dim = this.daysInMonth();\n    const today = new Date();\n    const cats = this.CATS.map(c => `${c.id} = ${c.name}${c.desc ? ' (' + c.desc + ')' : ''}`).join('\\n');\n    // Знімок наявних записів місяця — щоб модель точно знаходила суму/день/категорію\n    // для видалення, заміни чи перенесення.\n    const m = this.month();\n    const snapLines = [];\n    Object.keys(m.days).map(Number).sort((a, b) => a - b).forEach(d => {\n      const parts = [];\n      this.CATS.forEach(c => {\n        const arr = m.days[d] && m.days[d][c.id];\n        if (arr && arr.length) {\n          const amts = arr.map(r => this.pnum(r.amount) + (r.comment ? ' «' + r.comment + '»' : '')).join(', ');\n          parts.push(c.id + ': ' + amts);\n        }\n      });\n      if (parts.length) snapLines.push(`день ${d} → ` + parts.join('; '));\n    });\n    const snapshot = snapLines.length ? snapLines.join('\\n') : '(місяць поки порожній)';\n    const prompt =\n`Ти — асистент-редактор таблиці сімейного бюджету. Перетвори текст/диктовку користувача українською на список ОПЕРАЦІЙ над таблицею у форматі JSON. Користувач може ДОДАВАТИ, ВИДАЛЯТИ, ЗМІНЮВАТИ та ПЕРЕНОСИТИ суми.\n\nКатегорії (використовуй id зліва):\n${cats}\n\nКонтекст:\n- Таблиця показує місяць: ${this.MONTHS[mo - 1]} ${y} (номер місяця ${mo}, днів у місяці: ${dim}).\n- Сьогодні: ${today.getDate()} число, місяць ${today.getMonth() + 1}, ${today.getFullYear()} рік.\n\nНаявні записи цього місяця (для пошуку сум при видаленні/заміні/перенесенні):\n${snapshot}\n\nТипи операцій (поле \"action\"):\n- \"add\" — додати суму. Поля: day, category, amount, comment.\n- \"delete\" — видалити наявну суму. Поля: day, category, amount (та сума, яку треба прибрати), comment (якщо названо). Напр. \"видали з 7 числа 500 у продуктах\" → {\"action\":\"delete\",\"day\":7,\"category\":\"products\",\"amount\":500}.\n- \"edit\" — замінити наявну суму на іншу в тій самій клітинці. Поля: day, category, amount (стара сума), newAmount (нова сума). Напр. \"замість 500 впиши 650 у продуктах за 7\" → {\"action\":\"edit\",\"day\":7,\"category\":\"products\",\"amount\":500,\"newAmount\":650}.\n- \"move\" — перенести суму з однієї категорії в іншу (той самий день). Поля: day, from (категорія-джерело), to (категорія-призначення), amount. Напр. \"перенеси 300 з продуктів у ресторани за 7\" → {\"action\":\"move\",\"day\":7,\"from\":\"products\",\"to\":\"eatingOut\",\"amount\":300}.\n\nПравила:\n- Кожна сума при додаванні = окрема операція \"add\". Напр. \"продукти 120, 500, 800\" → три \"add\" з amount 120, 500, 800.\n- Якщо тип дії не названо явно (просто \"продукти 120\") — це \"add\".\n- \"day\" = номер дня в показаному місяці (1..${dim}). Розпізнавай дати: \"сьоме червня\"=7, \"за 7 червня\"=7, \"7.06\"=7. \"сьогодні\" = ${today.getDate()}, \"вчора\" = ${today.getDate() - 1}. Якщо для add дату не вказано — використай число \"сьогодні\", якщо воно в межах місяця, інакше 1. Якщо для delete/edit/move день не названо, але суму однозначно видно у знімку вище — постав той день, де ця сума є.\n- Для delete/edit/move бери amount/категорію САМЕ так, як у знімку наявних записів (та сама сума, що реально існує). Не вигадуй суми, яких немає.\n- amount = додатне число у гривнях. Ігноруй \"грн\", \"₴\", \"гривень\".\n- Числа вже здебільшого нормалізовані. Якщо бачиш розбитий числівник (\"9 1000\" = 9000, \"5 тисяч\" = 5000, \"5 100\" = 500, \"півтори тисячі\" = 1500) — склади в одне число. Кома/«і»/окремі суми (\"120, 500\") — це РІЗНІ операції.\n- comment = короткий опис, якщо названо конкретну річ (напр. \"таксі\"), інакше \"\".\n- Сторонній текст ігноруй.\n\nТекст користувача:\n\"\"\"${text}\"\"\"\n\nПоверни ЛИШЕ валідний JSON без markdown, рівно у такій формі:\n{\"ops\":[{\"action\":\"add\",\"day\":7,\"category\":\"products\",\"amount\":120,\"comment\":\"\"}]}`;\n    const raw = await this.complete(prompt);\n    let js = raw;\n    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');\n    if (a >= 0 && b > a) js = raw.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('parse'); }\n    const ids = this.CATS.map(c => c.id);\n    const valid = id => ids.includes(id) ? id : null;\n    // Зворотна сумісність зі старим форматом {\"entries\":[...]}\n    const list = data.ops || (data.entries ? data.entries.map(e => ({ action: 'add', day: e.day, category: e.categoryId, amount: e.amount, comment: e.comment })) : []);\n    return list.map(o => {\n      const action = ['add', 'delete', 'edit', 'move'].includes(o.action) ? o.action : 'add';\n      const day = Math.max(1, Math.min(dim, parseInt(o.day, 10) || 0));\n      const amount = Math.round(parseFloat(o.amount) || 0);\n      const comment = (o.comment || '').toString().slice(0, 60);\n      if (action === 'move') return { action, day, fromCatId: valid(o.from), toCatId: valid(o.to), amount, comment };\n      if (action === 'edit') return { action, day, categoryId: valid(o.category), amount, newAmount: Math.round(parseFloat(o.newAmount) || 0), comment };\n      return { action, day, categoryId: valid(o.category), amount, comment };\n    }).filter(o => {\n      if (o.day < 1 || !o.amount) return false;\n      if (o.action === 'move') return o.fromCatId && o.toCatId && o.fromCatId !== o.toCatId;\n      if (o.action === 'edit') return o.categoryId && o.newAmount > 0;\n      return o.categoryId;\n    });\n  }\n\n  // Знайти наявний запис за днем/категорією/сумою (для delete/edit/move).\n  // Спочатку шукає на вказаному дні+категорії; якщо ні — однозначний збіг по всьому місяцю;\n  // якщо категорію не вказано — однозначний збіг у межах дня.\n  locateRec(day, catId, amount, comment) {\n    const m = this.month();\n    const cmt = (comment || '').toLowerCase();\n    const matchIn = (arr) => {\n      if (!arr || !arr.length) return -1;\n      if (cmt) {\n        const i = arr.findIndex(r => this.pnum(r.amount) === amount && (r.comment || '').toLowerCase().indexOf(cmt) >= 0);\n        if (i >= 0) return i;\n      }\n      return arr.findIndex(r => this.pnum(r.amount) === amount);\n    };\n    if (day && catId && m.days[day]) {\n      const i = matchIn(m.days[day][catId]);\n      if (i >= 0) return { day, catId, idx: i };\n    }\n    if (catId) {\n      const hits = [];\n      for (const d in m.days) { const i = matchIn(m.days[d][catId]); if (i >= 0) hits.push({ day: +d, catId, idx: i }); }\n      if (hits.length === 1) return hits[0];\n      if (hits.length > 1 && day) { const od = hits.find(h => h.day === day); if (od) return od; }\n    }\n    if (day && !catId && m.days[day]) {\n      const hits = [];\n      this.CATS.forEach(c => { const i = matchIn(m.days[day][c.id]); if (i >= 0) hits.push({ day, catId: c.id, idx: i }); });\n      if (hits.length === 1) return hits[0];\n    }\n    return null;\n  }\n\n  applyOps(ops) {\n    const mo = this.month();\n    this._undoSnap = JSON.stringify(this.data.months[this.cm()]);\n    const flash = {};\n    const applied = [], skipped = [];\n    const cleanup = (d, cat) => {\n      if (mo.days[d] && mo.days[d][cat] && !mo.days[d][cat].length) {\n        delete mo.days[d][cat];\n        if (!Object.keys(mo.days[d]).length) delete mo.days[d];\n      }\n    };\n    ops.forEach(op => {\n      if (op.action === 'add') {\n        if (!mo.days[op.day]) mo.days[op.day] = {};\n        if (!mo.days[op.day][op.categoryId]) mo.days[op.day][op.categoryId] = [];\n        mo.days[op.day][op.categoryId].push({ id: this.uid(), amount: String(op.amount), comment: op.comment || '' });\n        flash[op.day + '|' + op.categoryId] = true;\n        applied.push(op);\n        return;\n      }\n      if (op.action === 'delete') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'edit') {\n        const loc = this.locateRec(op.day, op.categoryId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        mo.days[loc.day][loc.catId][loc.idx].amount = String(op.newAmount);\n        flash[loc.day + '|' + loc.catId] = true;\n        applied.push({ ...op, day: loc.day, categoryId: loc.catId });\n        return;\n      }\n      if (op.action === 'move') {\n        const loc = this.locateRec(op.day, op.fromCatId, op.amount, op.comment);\n        if (!loc) { skipped.push(op); return; }\n        const rec = mo.days[loc.day][loc.catId][loc.idx];\n        const keptComment = rec.comment || op.comment || '';\n        mo.days[loc.day][loc.catId].splice(loc.idx, 1);\n        cleanup(loc.day, loc.catId);\n        if (!mo.days[loc.day]) mo.days[loc.day] = {};\n        if (!mo.days[loc.day][op.toCatId]) mo.days[loc.day][op.toCatId] = [];\n        mo.days[loc.day][op.toCatId].push({ id: this.uid(), amount: String(op.amount), comment: keptComment });\n        flash[loc.day + '|' + loc.catId] = true;\n        flash[loc.day + '|' + op.toCatId] = true;\n        applied.push({ ...op, day: loc.day, fromCatId: loc.catId });\n        return;\n      }\n    });\n    if (!applied.length) {\n      this._undoSnap = null;\n      const msg = skipped.length\n        ? 'Не знайшов відповідних записів для зміни. Уточніть день, категорію або суму.'\n        : 'Не вдалося розпізнати запит. Спробуйте: «видали з 7 числа 500 у продуктах».';\n      this.setState({ nlBusy: false, nlError: msg });\n      return;\n    }\n    this.save();\n    this._flash = flash;\n    this.setState({ nlBusy: false, nlText: '', nlListening: false, nlResult: { applied, skipped } });\n    clearTimeout(this._flashTimer);\n    this._flashTimer = setTimeout(() => { this._flash = null; this.bump(); }, 1800);\n    clearTimeout(this._resultTimer);\n    this._resultTimer = setTimeout(() => { if (this.state.nlResult) this.setState({ nlResult: null }); }, 5000);\n  }\n  undoNL() {\n    clearTimeout(this._resultTimer);\n    if (this._undoSnap) { this.data.months[this.cm()] = JSON.parse(this._undoSnap); this._undoSnap = null; this.save(); }\n    this._flash = null;\n    this.setState({ nlResult: null });\n  }\n\n  // ---- AI аналіз місяця (та сама модель, що й для текстового вводу) ----\n  catTotalsFor(key) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  // Сума по категоріях лише за дні 1..dayMax (для зіставного порівняння неповного місяця).\n  catTotalsUpTo(key, dayMax) {\n    const totals = {};\n    this.CATS.forEach(c => { totals[c.id] = 0; });\n    const m = this.data.months[key];\n    if (m && m.days) {\n      for (const day in m.days) {\n        if (+day > dayMax) continue;\n        for (const c of this.CATS) {\n          const arr = m.days[day][c.id];\n          if (arr) for (const r of arr) totals[c.id] += this.pnum(r.amount);\n        }\n      }\n    }\n    return totals;\n  }\n  openAI() {\n    this.setState({ aiOpen: true });\n    const r = this.state.aiResult;\n    if (!this.state.aiBusy && (!r || r.month !== this.cm())) this.runAI();\n  }\n  async runAI() {\n    if (this.state.aiBusy) return;\n    this.setState({ aiBusy: true, aiError: null });\n    try {\n      const prompt = this.buildAnalysisPrompt();\n      const raw = await this.complete(prompt);\n      const result = this.parseAnalysis(raw);\n      if (!result.cards.length && !result.headline) throw new Error('Порожня відповідь. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiResult: result });\n    } catch (e) {\n      const m = (e && e.message) || '';\n      const msg = m === 'no-claude'\n        ? 'Аналіз наразі недоступний.'\n        : (m || 'Не вдалося виконати аналіз. Спробуйте ще раз.');\n      this.setState({ aiBusy: false, aiError: msg });\n    }\n  }\n  // ---- AI-аналіз витрат: ШАР 1 — детерміновані обчислення (computed_facts) ----\n  // Уся математика тут, у коді; AI (ШАР 2) лише формулює і нічого не рахує сам.\n  // Фокус — тільки витрати. Усе рахується через темп, тож неповний місяць не ламає логіку.\n  buildAnalysisData() {\n    const cm = this.cm();\n    const [y, mo] = cm.split('-').map(Number);\n    const now = new Date();\n    const monKey = y * 12 + (mo - 1);\n    const nowKey = now.getFullYear() * 12 + now.getMonth();\n    const isThisMonth = monKey === nowKey;\n    const future = monKey > nowKey;\n    const finished = monKey < nowKey;\n    const mode = finished ? 'completed' : 'in_progress';\n    const dim = this.daysInMonth();\n    const daysElapsed = isThisMonth ? Math.min(now.getDate(), dim) : dim;\n    const remainingDays = Math.max(0, dim - daysElapsed);\n    const m = this.month();\n    const L = this.data.config.limits;\n    const median = a => {\n      if (!a.length) return 0;\n      const z = [...a].sort((p, q) => p - q), k = z.length >> 1;\n      return z.length % 2 ? z[k] : (z[k - 1] + z[k]) / 2;\n    };\n\n    // Транзакції по категоріях + денні підсумки (для структурного факту)\n    const txnsByCat = {}; this.CATS.forEach(c => txnsByCat[c.id] = []);\n    const dayTotals = {}, dayCat = {};\n    for (const day in m.days) for (const c of this.CATS) {\n      const arr = m.days[day][c.id];\n      if (!arr) continue;\n      for (const r of arr) {\n        const a = this.pnum(r.amount);\n        if (a <= 0) continue;\n        txnsByCat[c.id].push(a);\n        dayTotals[+day] = (dayTotals[+day] || 0) + a;\n        dayCat[+day] = dayCat[+day] || {};\n        dayCat[+day][c.name] = (dayCat[+day][c.name] || 0) + a;\n      }\n    }\n\n    // Класифікація STEADY/LUMPY + проєкція + стан конверта по кожній категорії\n    const categories = this.CATS.map(c => {\n      const amounts = txnsByCat[c.id];\n      const total = Math.round(amounts.reduce((s, a) => s + a, 0));\n      const lim = c.limitKey ? this.pnum(L[c.limitKey]) : 0;\n      const limit = lim > 0 ? lim : null;\n      if (!amounts.length) return { name: c.name, total: 0, limit, state: 'on_pace' };\n      const n = amounts.length;\n      const sorted = [...amounts].sort((a, b) => b - a);\n      const top2share = total > 0 ? (sorted[0] + (sorted[1] || 0)) / total : 1;\n      // LUMPY: мало витрат або дві найбільші — більшість суми. Лінійна проєкція таким бреше.\n      const lumpy = n <= 4 || top2share >= 0.55;\n      const dailyRate = total / daysElapsed;\n      let projected, confidence, conservative;\n      if (!lumpy) {\n        projected = Math.round(dailyRate * dim);\n        confidence = 'high';\n        conservative = projected;\n      } else {\n        // Частотна проєкція: скільки ще «забігів» буде, а не скільки на день\n        const runSize = median(amounts);\n        const interval = n > 0 ? daysElapsed / n : daysElapsed;\n        const runsRemaining = interval > 0 ? remainingDays / interval : 0;\n        projected = Math.round(total + Math.round(runsRemaining) * runSize);\n        conservative = total + Math.floor(runsRemaining) * runSize;\n        confidence = 'low';\n      }\n      let state = 'on_pace', envelope = null, ratio = null, nature = null;\n      if (limit != null) {\n        envelope = Math.round(limit - total);\n        if (mode === 'completed') {\n          // Завершений місяць (3.7): без проєкцій. Перевищення = звичка (STEADY) чи разова подія (LUMPY).\n          if (total >= limit) {\n            state = 'over_terminal';\n            ratio = Math.round((total / limit) * 10) / 10;\n            nature = lumpy ? 'event' : 'habit';\n          }\n        } else {\n          if (total >= limit) state = 'over_terminal';\n          else if (!lumpy && projected > limit * 1.05) state = 'over_pace';\n          else if (lumpy && conservative > limit) state = 'over_pace_est';\n        }\n      }\n      return { name: c.name, total, n, lumpy, dailyRate: Math.round(dailyRate),\n        projected, confidence, limit, envelope, state, ratio, nature };\n    }).filter(c => c.total > 0);\n\n    const flagged = categories.filter(c => c.state !== 'on_pace');\n    // На завершеному місяці структурні факти рахуються ЗАВЖДИ (3.7) — на поточному лише коли чисто.\n    const structural_fact = (mode === 'completed' || !flagged.length)\n      ? this.findStructuralFact({ dayTotals, dayCat, daysElapsed, mo, y, finished })\n      : null;\n\n    const data = {\n      month: this.MONTHS[mo - 1] + ' ' + y,\n      mode,\n      month_finished: finished,\n      month_future: future,\n      daysElapsed, daysInMonth: dim, remainingDays,\n      month_progress: (isThisMonth\n        ? ('минуло ' + daysElapsed + ' з ' + dim + ' днів, попереду ще ' + remainingDays)\n        : (finished ? 'місяць завершено' : 'місяць ще не почався')),\n      categories,\n      flagged_count: flagged.length,\n      structural_fact,\n    };\n    const note = (m.note || '').trim();\n    if (note) data.special_note = note;\n    return data;\n  }\n  // Один структурний факт для місяців без off-pace (3.6). Лише порівняння/поріг, без тавтологій.\n  findStructuralFact(ctx) {\n    const { dayTotals, dayCat, daysElapsed, mo, y, finished } = ctx;\n    // 1) День-викид: денний підсумок > середнє + 2σ\n    const days = Object.keys(dayTotals).map(Number).filter(d => d <= daysElapsed);\n    if (days.length >= 5) {\n      const vals = days.map(d => dayTotals[d]);\n      const mean = vals.reduce((s, v) => s + v, 0) / vals.length;\n      const sd = Math.sqrt(vals.reduce((s, v) => s + (v - mean) * (v - mean), 0) / vals.length);\n      if (sd > 0) {\n        let outDay = null, outVal = -1;\n        days.forEach(d => { if (dayTotals[d] > mean + 2 * sd && dayTotals[d] > outVal) { outVal = dayTotals[d]; outDay = d; } });\n        if (outDay) {\n          const top = Object.keys(dayCat[outDay])\n            .map(k => ({ cat: k, amount: Math.round(dayCat[outDay][k]) }))\n            .sort((a, b) => b.amount - a.amount)[0];\n          return { type: 'day_outlier', date: outDay + ' ' + this.GEN[mo - 1],\n            total: Math.round(outVal), mean_day: Math.round(mean),\n            driver: top ? top.cat : null, driver_amount: top ? top.amount : null };\n        }\n      }\n    }\n    // 2) Зсув проти минулого місяця — лише для ЗАВЕРШЕНОГО місяця (повний проти повного)\n    if (finished) {\n      const pd = new Date(y, mo - 2, 1);\n      const pkey = pd.getFullYear() + '-' + String(pd.getMonth() + 1).padStart(2, '0');\n      const pm = this.data.months[pkey];\n      if (pm && pm.days && Object.keys(pm.days).length) {\n        const prev = this.catTotalsFor(pkey);\n        const cur = this.catTotalsFor(this.cm());\n        let best = null;\n        this.CATS.forEach(c => {\n          const t = Math.round(cur[c.id] || 0), p = Math.round(prev[c.id] || 0);\n          if (t < 1500 && p < 1500) return;\n          if (p > 0 && t >= p * 1.5) { const r = t / p; if (!best || r > best.ratio) best = { type: 'shift', name: c.name, dir: 'up', ratio: Math.round(r * 10) / 10, this_total: t, prev_total: p }; }\n          else if (t > 0 && p >= t * 2) { const r = p / t; if (!best || r > best.ratio) best = { type: 'shift', name: c.name, dir: 'down', ratio: Math.round(r * 10) / 10, this_total: t, prev_total: p }; }\n        });\n        if (best) return best;\n      }\n    }\n    return null;\n  }\n  buildAnalysisPrompt() {\n    const data = this.buildAnalysisData();\n    const dataJson = JSON.stringify(data, null, 2);\n    return `Ти — фінансовий помічник у застосунку сімейного бюджету. Тобі передають JSON computed_facts із УЖЕ ПОРАХОВАНИМИ цифрами: категорії, їхній стан (on_pace / over_terminal / over_pace / over_pace_est), темп (dailyRate), проєкцію на кінець місяця (projected), стан конверта (envelope) і опційно структурний факт (structural_fact). Твоя задача — написати короткий вердикт (headline) і картки. Ти НЕ рахуєш нічого сам і не вигадуєш чисел — береш ТІЛЬКИ те, що передано.\n\nФОКУС: тільки витрати. Дохід, фріланс, «чисті витрати», заощадження — поза фокусом, не згадуй їх.\n\nРЕЖИМ (поле mode):\n- \"in_progress\" — місяць триває: працюють проєкції, forward-стан, конверт на решту місяця.\n- \"completed\" — місяць завершено: проєкцій і «решти місяця» НЕМАЄ. Кожне over_terminal має поле nature: \"habit\" (STEADY — рівномірно весь місяць, системний патерн) або \"event\" (LUMPY — майже все з 1-2 платежів, разова подія), і ratio (у скільки разів понад ліміт). На completed structural_fact приходить ЗАВЖДИ, якщо є — він головна цінність підсумку.\n\nЩО ПОКАЗУВАТИ (in_progress):\n- Для КОЖНОЇ категорії зі станом ≠ on_pace — одна картка-порада: type \"envelope\" для over_terminal, type \"pace\" для over_pace / over_pace_est. Таких зазвичай 0–2.\n- Якщо жодної off-pace немає, але structural_fact не null — одна картка type \"fact\".\n- Якщо немає нічого — headline + одна картка type \"all_clear\". Це нормальний, частий результат — НЕ вигадуй проблем.\n\nЩО ПОКАЗУВАТИ (completed):\n- Кожне over_terminal із nature \"habit\" — картка type \"signal\" (на це варто придивитись: реальний патерн).\n- Кожне over_terminal із nature \"event\" — картка type \"noise\" (свідомо проігнорувати: разовий платіж, наступного місяця скине сам). Спокійно, без тривоги.\n- structural_fact (якщо є) — картка type \"fact\", нарівні з рештою.\n- Якщо signal, noise і fact порожні — headline + картка all_clear «місяць закрився в межах».\n\nЯК ФОРМУЛЮВАТИ:\n- over_terminal (envelope): конверт уже порожній — кожна наступна витрата тут понад бюджет, не з нього. Forward-стан, а НЕ «перевитрата N грн» (це й так на екрані).\n- over_pace / over_pace_est (pace): по темпу закриє місяць близько projected при ліміті limit, попереду ще remainingDays днів, щоб збити темп. Для over_pace_est додай, що це оцінка (категорія лумпі — кілька великих витрат).\n- fact: подай структурний факт як спостереження (день-викид або зсув проти минулого місяця), без поради.\n- signal (completed): «ratio× понад ліміт, і це не пара закупок, а рівномірно весь місяць — патерн. Якщо й придивлятись, то сюди». Без forward-стану.\n- noise (completed): «ratio× понад ліміт, але майже все — один платіж. Разова подія, наступного місяця скине сама — реагувати не варто». Спокійно, без тривоги.\n- all_clear: один спокійний рядок-висновок із перевірки, не відмовка.\n- advice = «ось стан і важіль, рішення твоє», НІКОЛИ не наказ. Для fact / all_clear advice = null.\n\nТРИ ТЕСТИ — кожна порада мусить пройти всі три, інакше не давай:\n1. Не припускай побут, якого нема в даних (ЗАБОРОНЕНО «готуйте/їжте менше» — застосунок знає суми, не причини).\n2. Не пропонуй дій, яких застосунок не вміє (перекидання грошей, накопичувальні банки, автонакопичення).\n3. Не радь міняти ліміт — він виставлений свідомо.\n\nЗАБОРОНЕНО: повторювати числа, що й так на дашборді, без нового зрізу; тавтології («кілька великих витрат — більшість категорії», «X — найбільша категорія»); менторський тон і непрохані поради по життю.\n\nТОН: на «ти», коротко, по-людськи, без осуду й канцеляризмів. «Нічого робити не треба» кажи спокійно й упевнено.\n\nОБМЕЖЕННЯ:\n- in_progress: 1 headline (висновок-вердикт, не сума витрат) + 0–2 картки off-pace + опційно 1 картка fact; якщо чисто — headline + all_clear. Не більше 3 карток.\n- completed: 1 headline + усі картки signal + усі картки noise + опційно 1 fact; якщо все чисто — headline + all_clear «місяць закрився в межах». Не більше 4 карток.\n\nФОРМАТ: поверни ТІЛЬКИ валідний JSON без тексту до/після й без markdown:\n{\"headline\":\"string\",\"cards\":[{\"type\":\"envelope|pace|fact|all_clear|signal|noise\",\"title\":\"string (3-6 слів)\",\"body\":\"string (стан/факт, 1-2 речення)\",\"advice\":\"string|null\",\"action\":null}]}\nПоле action — null, або {\"label\":\"string\",\"type\":\"note\"} лише для картки-факту про день-викид (запросити «що це було»). Усі тексти українською.\n\n---\nПРИКЛАД (off-pace лише ресторани). Вивід:\n{\n  \"headline\": \"Одна категорія цього місяця потребує рішення — ресторани. Усі інші вкладаються в ліміти навіть по темпу.\",\n  \"cards\": [\n    { \"type\": \"envelope\", \"title\": \"Конверт на ресторани вже порожній\", \"body\": \"За 18 днів — 14 423 при ліміті 10к. Ти зʼїв увесь місячний конверт + 4.4к зверху, а попереду ще 12 днів. По темпу (801/день) категорія закриє місяць близько 24к.\", \"advice\": \"До кінця місяця рахуй ресторани як «у мінусі»: кожна наступна вечеря поза домом — це понад бюджет, а не з нього. Не наказ — просто чесний стан конверта, щоб витрата була свідомою.\", \"action\": null },\n    { \"type\": \"all_clear\", \"title\": \"Решту чіпати нема сенсу\", \"body\": \"Продукти, дім, особисті, дозвілля — усі по темпу лишаються в межах. Бюджет тримає сам себе скрізь, окрім однієї лінії.\", \"advice\": null, \"action\": null }\n  ]\n}\n---\nПРИКЛАД (completed — два перевищення різної природи). Вивід:\n{\n  \"headline\": \"Два ліміти злетіли, але з різних причин. Один варто переглянути, інший — забути: він уже не повториться.\",\n  \"cards\": [\n    { \"type\": \"signal\", \"title\": \"Продукти — це звичка, а не випадковість\", \"body\": \"55 443 при ліміті 30к — майже вдвічі. І це не пара великих закупок, а рівномірно високі витрати весь місяць.\", \"advice\": \"Якщо й варто кудись придивитись — то сюди. Єдина категорія, де перевищення йде від патерну, а не від події.\", \"action\": null },\n    { \"type\": \"noise\", \"title\": \"Благодійність злетіла, але це разова подія\", \"body\": \"13 400 при ліміті 5к — у 2.7 раза. Але майже вся сума — один платіж.\", \"advice\": \"Нічого. Наступного місяця категорія впаде до норми сама — реагувати не варто.\", \"action\": null }\n  ]\n}\n---\n\nТЕПЕР СФОРМУЛЮЙ ДЛЯ ЦИХ ДАНИХ. computed_facts:\n${dataJson}`;\n  }\n  parseAnalysis(raw) {\n    let js = (raw || '').replace(/```json/gi, '').replace(/```/g, '');\n    const a = js.indexOf('{'), b = js.lastIndexOf('}');\n    if (a >= 0 && b > a) js = js.slice(a, b + 1);\n    let data;\n    try { data = JSON.parse(js); } catch (e) { throw new Error('Не вдалося прочитати відповідь моделі. Спробуйте ще раз.'); }\n    const types = ['envelope', 'pace', 'fact', 'all_clear', 'signal', 'noise'];\n    const cards = (data.cards || []).slice(0, 4).map(c => {\n      let action = null;\n      if (c.action && typeof c.action === 'object' && c.action.label) {\n        action = { label: ('' + c.action.label).slice(0, 60), type: 'note' };\n      }\n      const advice = (c.advice == null ? '' : ('' + c.advice)).trim();\n      return {\n        type: types.includes(c.type) ? c.type : 'fact',\n        title: (c.title || '').toString().slice(0, 80),\n        body: (c.body || '').toString().slice(0, 400),\n        advice: advice.slice(0, 400),\n        action,\n      };\n    }).filter(c => c.title || c.body);\n    return { month: this.cm(), headline: (data.headline || '').toString().slice(0, 240), cards };\n  }\n  aiNoteAction() {\n    this.setState({ aiOpen: false });\n    setTimeout(() => {\n      const el = document.getElementById('month-note-field');\n      if (el) { try { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } catch (e) {} }\n    }, 260);\n  }\n\n  // ---- Статистика за весь період ----\n  STAT_COLORS() {\n    return { products:'#0a84ff', eatingOut:'#ff9f0a', home:'#34c759', subs:'#5ac8fa',\n             family:'#af52de', health:'#ff375f', work:'#64d2ff', transport:'#ffcc00',\n             leisure:'#30d158', charity:'#bf5af2', personal:'#ff6482' };\n  }\n  // Збирає по-місячну агрегацію по всій історії (категорії, оренда, дохід, найбільші витрати, по днях).\n  allStatMonths() {\n    const all = [];\n    const cfgRent = this.pnum(this.data.config.rent);\n    for (const key in this.data.months) {\n      const parts = key.split('-'); const yy = +parts[0], mm = +parts[1];\n      if (!yy || !mm) continue;\n      const M = this.data.months[key];\n      const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n      let catSum = 0, recCount = 0, biggest = null;\n      const dayTotals = {};\n      if (M && M.days) {\n        for (const d in M.days) {\n          for (const c of this.CATS) {\n            const arr = M.days[d][c.id];\n            if (!arr) continue;\n            for (const r of arr) {\n              const v = this.pnum(r.amount);\n              if (v <= 0) continue;\n              byCat[c.id] += v; catSum += v; recCount++;\n              dayTotals[d] = (dayTotals[d] || 0) + v;\n              if (!biggest || v > biggest.a) biggest = { a: v, cat: c.id, day: +d, com: r.comment || '' };\n            }\n          }\n        }\n      }\n      let income = 0; if (M && M.income) M.income.forEach(r => income += this.pnum(r.amount));\n      if (catSum <= 0 && income <= 0) continue;\n      const rent = (M && M.rent != null && M.rent !== '') ? this.pnum(M.rent) : (catSum > 0 ? cfgRent : 0);\n      all.push({ key, y: yy, mo: mm, byCat, catSum, rent, income, spent: catSum + rent, recCount, biggest, dayTotals });\n    }\n    all.sort((a, b) => a.key < b.key ? -1 : (a.key > b.key ? 1 : 0));\n    return all;\n  }\n  filterStatMonths(all, period) {\n    if (period === 'last12') return all.slice(-12);\n    const yr = parseInt(period, 10);\n    if (period !== 'all' && yr) return all.filter(m => m.y === yr);\n    return all;\n  }\n  buildStats(accent) {\n    const COL = this.STAT_COLORS();\n    const RENT_COL = '#8e8e93';\n    const all = this.allStatMonths();\n    const period = this.state.statsPeriod || 'all';\n    const months = this.filterStatMonths(all, period);\n\n    const years = Array.from(new Set(all.map(m => m.y))).sort((a, b) => b - a);\n    const chipDef = [{ key: 'all', label: 'Увесь час' }];\n    if (all.length > 12) chipDef.push({ key: 'last12', label: 'Останні 12 міс' });\n    years.forEach(yy => chipDef.push({ key: String(yy), label: String(yy) }));\n    const chipStyle = act => 'flex:none;height:32px;padding:0 15px;border-radius:999px;font-size:13px;font-weight:560;font-family:inherit;cursor:pointer;transition:background .12s;' +\n      (act ? 'background:var(--accent,#0a84ff);color:#fff;border:1px solid var(--accent,#0a84ff);' : 'background:var(--dk0);color:var(--dk22);border:1px solid var(--dk40);');\n    const statsChips = chipDef.map(c => ({ key: c.key, label: c.label, style: chipStyle(period === c.key),\n      onClick: () => this.setState({ statsPeriod: c.key, statHover: null }) }));\n\n    if (!months.length) {\n      return { empty: true, statsChips, periodLabel: 'Немає даних', kpis: [], monthBars: [], catBars: [], shareSegs: [], catTrends: [], weekdayBars: [], seasonBars: [], facts: [], avgDisp: '', avgPct: '0%', barGap: '4px' };\n    }\n\n    const first = months[0], last = months[months.length - 1];\n    let total = 0, totalRent = 0, totalIncome = 0, totalRec = 0;\n    const byCat = {}; this.CATS.forEach(c => byCat[c.id] = 0);\n    let maxM = months[0], minM = months[0];\n    months.forEach(mm => {\n      total += mm.spent; totalRent += mm.rent; totalIncome += mm.income; totalRec += mm.recCount;\n      this.CATS.forEach(c => byCat[c.id] += mm.byCat[c.id]);\n      if (mm.spent > maxM.spent) maxM = mm;\n      if (mm.spent < minM.spent) minM = mm;\n    });\n    const totalCat = total - totalRent;\n    const n = months.length;\n    const avg = total / n;\n    const monthsWord = this.plural(n, 'місяць', 'місяці', 'місяців');\n    const rangeLabel = this.MONTHS_SHORT[first.mo - 1].toLowerCase() + ' ' + first.y + ' – ' + this.MONTHS_SHORT[last.mo - 1].toLowerCase() + ' ' + last.y;\n    const periodLabel = (n > 1 ? rangeLabel + ' · ' : '') + n + ' ' + monthsWord;\n\n    // KPI\n    const kpis = [\n      { label: 'Всього витрачено', value: this.money(total), sub: 'за ' + n + ' ' + monthsWord, color: 'var(--dk22)' },\n      { label: 'В середньому / місяць', value: this.money(avg), sub: 'включно з орендою', color: 'var(--dk22)' },\n      { label: 'Найдорожчий місяць', value: this.money(maxM.spent), sub: this.MONTHS[maxM.mo - 1] + ' ' + maxM.y, color: '#ff453a' },\n      { label: 'Найекономніший місяць', value: this.money(minM.spent), sub: this.MONTHS[minM.mo - 1] + ' ' + minM.y, color: '#34c759' },\n    ];\n\n    // Динаміка по місяцях\n    const maxSpent = Math.max.apply(null, months.map(m => m.spent).concat([1]));\n    const multiYear = new Set(months.map(m => m.y)).size > 1;\n    const monthBars = months.map((mm, i) => {\n      let color = accent;\n      if (mm.key === maxM.key) color = '#ff453a';\n      else if (mm.key === minM.key) color = '#34c759';\n      const label = multiYear ? ((i === 0 || mm.mo === 1) ? String(mm.y) : '') : this.MONTHS_SHORT[mm.mo - 1];\n      const lines = ['Витрати: ' + this.money(mm.spent)];\n      if (mm.income > 0) lines.push('Дохід: +' + this.money(mm.income));\n      return {\n        hPct: (mm.spent / maxSpent * 100) + '%', color, label,\n        onEnter: e => { const r = e.currentTarget.getBoundingClientRect(); this.setState({ statHover: { title: this.MONTHS[mm.mo - 1] + ' ' + mm.y, lines, top: r.top - 6, left:
