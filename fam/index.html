  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

argin:0 2px;display:inline-flex;align-items:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n                  <span style=\"width:24px;height:24px;border-radius:50%;background:{{ x.byColor }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700\">{{ x.byInitial }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"flex:1;min-width:0;font-size:13px;color:var(--c-5c5446);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ x.title }}<\u002Fspan>\n                <span style=\"font-size:11.5px;color:var(--c-a59a85);flex:none\">{{ x.when }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DOD EDIT OVERLAY ============ -->\n  <sc-if value=\"{{ dodEditing }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:var(--k8);z-index:55;display:flex;align-items:center;justify-content:center;padding:24px\" onclick=\"{{ cancelEditDod }}\">\n    <div onclick=\"{{ stop }}\" style=\"width:min(520px,100%);background:var(--c-fffdf8);border-radius:24px;padding:30px;box-shadow:0 24px 70px var(--k1);animation:ladPop .35s ease both;max-height:90vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\">\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0\">Що означає «зроблено»<\u002Fh2>\n        <button onclick=\"{{ cancelEditDod }}\" style=\"width:34px;height:34px;border-radius:11px;border:1px solid var(--c-e0d6c2);background:var(--c-fffdf8);cursor:pointer;color:var(--c- );\n  }\n  applyDone(id, doerId, nowDone) {\n    const t = this.state.tasks.find(x => x.id === id);\n    if (!t) return;\n    const st = this.taskStatus(t);\n    let events = this.state.completionEvents || [];\n    let patch;\n    if (nowDone) {\n      const h = this.tickClock();\n      const uid = (doerId === 'a' || doerId === 'b') ? doerId : t.executor_id;\n      events = [...events, { id: 'ce-' + id + '-' + Date.now(), taskId: id, userId: uid, managerId: t.manager_id, date: this.TODAY, h }];\n      patch = st.recurring\n        ? { last_done: this.TODAY, _prevDone: t.last_done || null, completed_at: Date.now(), in_progress: false }\n        : { done: true, completed_at: Date.now(), last_done: this.TODAY, in_progress: false };\n    } else {\n      // зняти лише сьогоднішню відмітку виконання\n      events = events.filter(e => !(e.taskId === id && e.date === this.TODAY));\n      patch = st.recurring\n        ? { last_done: t._prevDone || null, _prevDone: null, completed_at: null }\n        : { done: false, completed_at: null, last_done: null };\n    }\n    this.set({\n      tasks: this.state.tasks.map(x => x.id === id ? { ...x, ...patch } : x),\n      completionEvents: events,\n    });\n  }\n  // Залогувати вже виконану задачу ще раз (напр. ще раз поміняли памперс / помили дитину).\n  // Створюємо ОКРЕМИЙ виконаний запис поруч (як швидкий лог) — окремий рядок зі своєю\n  // кнопкою видалення, щоб кожне повторення можна було скасувати незалежно.\n  logAgain(id) {\n    const t = this.state.tasks.find(x => x.id === id);\n    if (!t) return;\n    const shared = t.manager_id !== t.executor_id;\n    const me = this.meId();\n    const who = (shared || t.executor_id === me) ? t.executor_id : me;\n    const nid = 'ql' + Date.now();\n    const newTask = { id: nid, domain_id: t.domain_id, title: t.title, dimension: t.dimension || 'visible', manager_id: t.manager_id, executor_id: who, recurrence: 'once', mental_load: t.mental_load || 1, done: true, completed_at: Date.now(), du nu: null });\n  }\n  pauseTask(id) {\n    this.set({ tasks: this.state.tasks.map(x => x.id === id ? { ...x, in_progress: false } : x), taskMenu: null });\n  }\n  completeTask(id) {\n    this.markDone(id);\n    this.set({ taskMenu: null });\n  }\n  toggleTaskMenu(id) {\n    this.set({ taskMenu: this.state.taskMenu === id ? null : id });\n  }\n\n  setQuickLog(patch) { this.set({ quickLog: { ...this.state.quickLog, ...patch } }); }\n\n  openQuickLog() {\n    const hidden = this.visibleDomainSet();\n    const base = { ...this.state.quickLog, aiBusy: false, analyzed: false, aiMatchId: null, aiDomainName: '' };\n    const patch = hidden.has(this.state.quickLog.domain_id)\n      ? { quickOpen: true, quickLog: { ...base, domain_id: this.firstVisibleDomainId() } }\n      : { quickOpen: true, quickLog: base };\n    this.set(patch);\n    requestAnimationFrame(() => { if (this._quickInput) this._quickInput.focus(); });\n  }\n  closeQuickLog() {\n    if (this._rec && this.state.quickLog.listening) { try { this._rec.stop(); } catch (e) {} }\n    this.set({ quickOpen: false, quickLog: { ...this.state.quickLog, listening: false, voiceError: false, aiBusy: false, analyzed: false, aiMatchId: null, aiDomainName: '' } });\n  }\n  // закрити наявну активну задачу прямо з вікна логування (замість створення нової)\n  closeMatchedTask(id) {\n    if (this._rec && this.state.quickLog.listening) { try { this._rec.stop(); } catch (e) {} }\n    this.set({ quickOpen: false, quickLog: { ...this.state.quickLog, text: '', listening: false, voiceError: false, aiBusy: false, analyzed: false, aiMatchId: null, aiDomainName: '' }, completedOpen: true });\n    this.markDone(id);\n  }\n\n  toggleVoice() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setQuickLog({ voiceError: true }); return; }\n    if (this._rec && this.state.quickLog.listening) { this._rec.stop(); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setQuickLog({ voiceError: true }); return; }\n    rec.lang = 'uk-UA';\n    rec.interimResults = true;\n    rec.continuous = false;\n    this._voiceBase = this.state.quickLog.text || '';\n    rec.onresult = (e) => {\n      let txt = '';\n      for (let i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;\n      const base = this._voiceBase;\n      const sep = base && !/\\s$/.test(base) ? ' ' : '';\n      this.setQuickLog({ text: this.dedupeWords((base + sep + txt).replace(/\\s+/g, ' ').trimStart()) });\n    };\n    rec.onend = () => { this.setQuickLog({ listening: false }); if ((this.state.quickLog.text || '').trim()) this.analyzeQuick(); };\n    rec.onerror = (e) => this.setQuickLog({ listening: false, voiceError: e && e.error === 'not-allowed' });\n    this._rec = rec;\n    this.setQuickLog({ listening: true, voiceError: false });\n    try { rec.start(); } catch (e) { this.setQuickLog({ listening: false }); }\n  }\n\n  // прибрати випадкові повтори слів/фраз із сирого розпізнавання\n  dedupeWords(s) {\n    const w = (s || '').split(' ').filter(Boolean);\n    const out = [];\n    for (const x of w) {\n      if (out.length && out[out.length - 1].toLowerCase() === x.toLowerCase()) continue;\n      out.push(x);\n    }\n    // прибрати повтор однакового хвоста (\"...посуду помив посуд\" → перша половина)\n    const n = out.length;\n    if (n >= 4 && n % 2 === 0) {\n      const half = n / 2;\n      const a = out.slice(0, half).join(' ').toLowerCase();\n      const b = out.slice(half).join(' ').toLowerCase();\n      if (a === b) return out.slice(0, half).join(' ');\n    }\n    return out.join(' ');\n  }\n\n  // локальне причісування, коли AI недоступний: прибрати займенники, причесати регістр\n  localTidy(s) {\n    let t = this.dedupeWords((s || '').replace(/\\s+/g, ' ').trim());\n    t = t.replace(/^(я щойно|щойно|тільки що|я тільки що|оце|я|ми)\\s+/i, '');\n    if (t) t = t.charAt(0).toUpperCase() + t.slice(1);\n    return t;\n  }\n\n  // дістати JSON із відповіді моделі (зрізає markdown-огорожу й зайвий текст)\n  parseAiJson(s) {\n    if (!s) return null;\n    let t = String(s).trim().replace(/^```(?:json)?/i, '').replace(/```$/, '').trim();\n    const a = t.indexOf('{'), b = t.lastIndexOf('}');\n    if (a >= 0 && b > a) t = t.slice(a, b + 1);\n    try { return JSON.parse(t); } catch (e) { return null; }\n  }\n\n  // Розумний розбір репліки: чистить назву, добирає домен за логікою,\n  // знаходить наявну активну задачу, яку ця репліка закриває.\n  async analyzeQuick() {\n    const startText = (this.state.quickLog.text || '').trim();\n    if (!startText || this.state.quickLog.aiBusy) return;\n    const vis = this.state.domains.filter(d => !this.visibleDomainSet().has(d.id));\n    const domLines = vis.map(d => '- ' + d.id + ' = ' + d.name + ' — ' + d.description).join('\\n');\n    const active = (this.state.tasks || []).filter(t => !t.done && !this.visibleDomainSet().has(t.domain_id)).slice(0, 80);\n    const taskLines = active.map(t => { const d = this.state.domains.find(x => x.id === t.domain_id); return '- ' + t.id + ' | ' + t.title + ' | ' + (d ? d.name : ''); }).join('\\n');\n    const prompt = [\n      'Ти — асистент сімейного застосунку для розподілу побутових обовʼязків.',\n      'Користувач щойно сказав або написав природною мовою, що він зробив (минулий час, від першої особи).',\n      'Перетвори репліку на чистий запис справи.',\n      '',\n      'Доступні домени (id = назва — опис):',\n      domLines,\n      '',\n      'Активні незавершені задачі на сьогодні (id | назва | домен):',\n      (taskLines || '(немає)'),\n      '',\n      'Логіка добору домену: готування, їжа, посуд, закупи продуктів → d-kitchen; прибирання, прання, сміття, підлога, пилосос, дрібний ремонт → d-cleaning; оплата, рахунки, бюджет, гроші → d-finance; лікар, ліки, запис на прийом, страховка → d-health; усе про собаку → d-dog; усе про дитину → d-child-emo; авто, паливо, ТО → d-car; подарунки, гості, дні народження → d-social; час удвох, близ esult = (e) => {\n      let txt = '';\n      for (let i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;\n      const base = this._auditVoiceBase;\n      const sep = base && !/\\s$/.test(base) ? ' ' : '';\n      this.setDraft({ title: this.dedupeWords((base + sep + txt).replace(/\\s+/g, ' ').trimStart()) });\n      this.setAuditVoice({ analyzed: false, aiDomainName: '' });\n    };\n    rec.onend = () => { this.setAuditVoice({ listening: false }); if ((this.state.draft.title || '').trim()) this.analyzeAudit(); };\n    rec.onerror = (e) => this.setAuditVoice({ listening: false, voiceError: e && e.error === 'not-allowed' });\n    this._recAudit = rec;\n    this.setAuditVoice({ listening: true, voiceError: false });\n    try { rec.start(); } catch (e) { this.setAuditVoice({ listening: false }); }\n  }\n  // Розумний розбір репліки про МАЙБУТНЮ справу: назва, домен, частота, час доби,\n  // пріоритет і дата — усе, що згадано в репліці. Власника НЕ чіпає (передвибір).\n  async analyzeAudit() {\n    const startText = (this.state.draft.title || '').trim();\n    if (!startText || this.state.auditVoice.aiBusy) return;\n    const vis = this.state.domains.filter(d => !this.visibleDomainSet().has(d.id));\n    const domLines = vis.map(d => '- ' + d.id + ' = ' + d.name + ' — ' + d.description).join('\\n');\n    const wd = ['неділя', 'понеділок', 'вівторок', 'середа', 'четвер', 'пʼятниця', 'субота'];\n    const todayWd = wd[new Date(this.TODAY + 'T00:00:00').getDay()];\n    const prompt = [\n      'Ти — асистент сімейного застосунку для розподілу побутових обовʼязків.',\n      'Користувач природною мовою сказав або написав, що треба запланувати чи зробити (майбутня справа).',\n      'Перетвори репліку на чистий запис задачі: назва, домен, частота, час доби, пріоритет і дата.',\n      '',\n      'Сьогодні: ' + this.TODAY + ' (' + todayWd + '). Усі дати повертай у форматі РРРР-ММ-ДД, обчислюючи відносні («завтра», «28 червня», «наступного понеділка») від сьогодні.',\n      '',\n      'Доступні домени (id = назва — опис):',\n      domLines,\n      '',\n      'Логіка добору домену: готування, їжа, посуд, закупи продуктів → d-kitchen; прибирання, прання, сміття, підлога, пилосос, дрібний ремонт → d-cleaning; оплата, рахунки, бюджет, гроші → d-finance; лікар, ліки, вакцинація, запис на прийом, страховка → d-health; усе про собаку → d-dog; усе про дитину → d-child-emo; авто, паливо, ТО → d-car; подарунки, гості, дні народження → d-social; час удвох, близькість → d-couple; відпустка, плани на вихідні → d-leisure.',\n      '',\n      'Частота (recurrence): \"once\" разово (за замовчуванням, якщо повтор не згадано); \"daily\" щодня; \"weekly\" щотижня; \"monthly\" щомісяця; \"ad_hoc\" за потреби. Якщо сказано «кожні N днів» — постав recurrence=\"once\" і interval_days=N (число). Інакше interval_days=null.',\n      'Час доби (time_of_day): \"morning\" ранок; \"lunch\" обід/день; \"evening\" вечір; \"allday\" весь день (за замовчуванням, якщо не згадано).',\n      'Пріоритет (priority): 1 низький; 2 середній; 3 високий. Якщо не згадано — null.',\n      '',\n      'Репліка користувача: \"' + startText + '\"',\n      '',\n      'Поверни СТРОГО валідний JSON без пояснень і markdown:',\n      '{\"task\": \"коротка назва задачі (іменникова фраза, з великої літери, напр. \\\\\"Вакцинація собаки\\\\\")\", \"domain_id\": \"id домену з переліку\", \"recurrence\": \"once|daily|weekly|monthly|ad_hoc\", \"interval_days\": число або null, \"time_of_day\": \"morning|lunch|evening|allday\", \"priority\": 1|2|3|null, \"date\": \"РРРР-ММ-ДД або null\"}',\n    ].join('\\n');\n    this.setAuditVoice({ aiBusy: true });\n    let obj = null;\n    try { obj = this.parseAiJson(await this.callModel(prompt)); } catch (e) {}\n    if (!this.state.auditOpen || !this.state.auditVoice.aiBusy) return; // вікно встигли закрити\n    if (!obj) { this.setDraft({ title: this.localTidy(this.state.draft.title) }); this.setAuditVoice({ aiBusy: false, analyzed: true }); return; }\n    const dom = vis.find(d => d.id === obj.domain_id);\n    const patch = {\n      title: (obj.task && String(obj.task).trim()) || this.state.draft.title,\n      domain_id: dom ? dom.id : this.state.draft.domain_id,\n    };\n    // частота: «кожні N днів» → every:N, інакше ключове слово\n    const iv = Number(obj.interval_days);\n    if (iv >= 2 && iv <= 365) patch.recurrence = 'every:' + Math.round(iv);\n    else if (iv === 1) patch.recurrence = 'daily';\n    else if (['once', 'daily', 'weekly', 'monthly', 'ad_hoc'].indexOf(obj.recurrence) >= 0) patch.recurrence = obj.recurrence;\n    // час доби\n    if (['morning', 'lunch', 'evening', 'allday'].indexOf(obj.time_of_day) >= 0) patch.time_of_day = obj.time_of_day;\n    // пріоритет\n    const pr = Number(obj.priority);\n    if (pr === 1 || pr === 2 || pr === 3) patch.mental_load = pr;\n    // дата (підставляємо і в due, і в anchor — рендер бере потрібне за частотою)\n    if (typeof obj.date === 'string' && /^\\d{4}-\\d{2}-\\d{2}$/.test(obj.date)) { patch.due = obj.date; patch.anchor = obj.date; }\n    this.setDraft(patch);\n    this.setState({ intervalText: null });\n    this.setAuditVoice({ aiBusy: false, analyzed: true, aiDomainName: dom ? (dom.icon + ' ' + dom.name) : '' });\n  }\n\n  submitQuickLog() {\n    const q = this.state.quickLog;\n    const text = (q.text || '').trim();\n    if (!text) return;\n    if (this._rec && q.listening) { try { this._rec.stop(); } catch (e) {} }\n    const who = this.meId();\n    const id = 'ql' + Date.now();\n    const newTask = { id, domain_id: q.domain_id, title: text, dimension: 'visible', manager_id: who, executor_id: who, recurrence: 'once', mental_load: 1, done: true, completed_at: Date.now(), due: null, last_done: this.TODAY, anchor: null, _prevDone: null, subtasks: [], quickLogged: true };\n    const ev = { id: 'ce-' + id, taskId: id, userId: who, date: this.TODAY, h: this.tickClock() };\n    this.set({\n      tasks: [...this.state.tasks, newTask],\n      completionEvents: [...(this.state.completionEvents || []), ev],\n      quickLog: { ...q, text: '', listening: false, aiBusy: false, analyzed: false, aiMatchId: null, aiDomainName: '' },\n      quickOpen: false,\n      completedOpen: true,\n    });\n  }\n\n  setDraft(patch) { this.set({ draft: { ...this.state.draft, ...patch } }); }\n  onDraftRecur(e) {\n    let rec = e.target.value;\n    if (rec === 'custom') {\n      const cur = this.parseInterval(this.state.draft.recurrence);\n      rec = 'every:' + (cur || 2);\n    }\n    const p = { recurrence: rec };\n    // зберігаємо вже обрану дату при зміні частоти (due ↔ anchor).\n    // Беремо саме ту дату, яку користувач зараз бачить (за поточною частотою),\n    // і переносимо її без змін — ігноруючи застаріле значення в іншому полі.\n    const prev = this.state.draft;\n    const chosen = (prev.recurrence === 'once' ? prev.due : prev.anchor) || this.TODAY;\n    if (rec === 'once') p.due = chosen;\n    if (this.isRecurring(rec)) p.anchor = chosen;\n    this.setDraft(p);\n    this.setState({ intervalText: null });\n  }\n  onDraftInterval(e) {\n    const raw = e.target.value;\n    this.setState({ intervalText: raw });            // дозволяємо порожнє поле під час вводу\n    let n = parseInt(raw, 10);\n    if (Number.isFinite(n) && n >= 1) {\n      if (n > 365) n = 365;\n      const p = { recurrence: 'every:' + n };\n      if (!this.state.draft.anchor) p.anchor = this.TODAY;\n      this.setDraft(p);\n    }\n  }\n  onDraftIntervalBlur() {\n    // порожнє/некоректне — повертаємо поле до останнього чинного значення\n    this.setState({ intervalText: null });\n  }\n  onDraftDate(e) {\n    const v = e.target.value;\n    this.setDraft(this.state.draft.recurrence === 'once' ? { due: v } : { anchor: v });\n  }\n  currentDraftDate() {\n    const d = this.state.draft;\n    return d.recurrence === 'once' ? (d.due || this.TODAY) : (d.anchor || this.TODAY);\n  }\n  togglePicker() {\n    if (this.state.pickerOpen) { this.setState({ pic \n    // ===== вибраний день: кільце + горизонтальний баланс + тренд vs попередній =====\n    const userA = this.U('a'), userB = this.U('b');\n    const selIdx = Math.min(6, Math.max(0, S.selectedDay == null ? 6 : S.selectedDay));\n    const sel = compRaw[selIdx];\n    const prev = selIdx > 0 ? compRaw[selIdx - 1] : null;\n    const selA = sel.a, selB = sel.b, selTotal = sel.n;\n    // загальна кількість задач дня: сьогодні — закрито + ще активні;\n    // заморожений минулий день — рівно знімок (жодних перерахунків); старий день без\n    // знімка — best-effort реконструкція, щоб не показувати фальшиві 100%.\n    const selSavedDen = savedDenFor(fmtDay(sel.dt));\n    const dayTotal = selIdx === 6\n      ? selTotal + activeTodayAll\n      : sel.frozen\n        ? Math.max(selTotal, selSavedDen != null ? selSavedDen : 0)\n        : Math.max(selTotal, selTotal + carryHangByDay[selIdx], selSavedDen != null ? selSavedDen : 0);\n\n    // кільце «заповнення дня» — закрито / стала місткість типового дня\n    const dayPct = Math.round(Math.min(1, selTotal / this.dailyCapacity()) * 100);\n    const RING_C = 2 * Math.PI * 40;                  // r=40\n    const ringDash = RING_C.toFixed(1);\n    const ringOffset = (RING_C * (1 - dayPct / 100)).toFixed(1);\n    // компактне кільце «виконано» для заголовка (частка закритих із денних)\n    const ringR = 19, ringCirc = 2 * Math.PI * ringR;\n    const ringFrac = dayTotal > 0 ? selTotal / dayTotal : 0;\n    const ringDashArr = ringCirc.toFixed(1);\n    const ringDashOff = (ringCirc * (1 - ringFrac)).toFixed(1);\n    const ringPctLabel = Math.round(ringFrac * 100) + '%';\n\n    // горизонтальний спліт Юля / Антон\n    const splitEmpty = selTotal === 0;\n    const splitPctA = this.pct(selA, selB);\n    const splitAW = (splitEmpty ? 50 : splitPctA) + '%';\n    const splitBW = (splitEmpty ? 50 : (100 - splitPctA)) + '%';\n\n    // перемикач днів\n    const relLabel = (dt, idx) => idx === 6 ? 'Сьогодні' : idx === 5 ? 'Учора' : (this.WEEKDAYS[dt.getDay()] + ', ' + dt.getDate() + ' ' + this.MONTHS[dt.getMonth()]);\n    const lower1 = (s) => s.charAt(0).toLowerCase() + s.slice(1);\n    const daySwitchLabel = relLabel(sel.dt, selIdx);\n    const closedHeading = daySwitchLabel;\n\n    // тренд vs попередній день\n    const hasTrend = !!prev;\n    const prevTotal = prev ? prev.n : 0;\n    const trendDiff = selTotal - prevTotal;\n    const trendArrow = trendDiff > 0 ? '▲' : trendDiff < 0 ? '▼' : '—';\n    const trendColor = trendDiff > 0 ? 'var(--k19)' : trendDiff < 0 ? 'var(--k60)' : 'var(--c-a59a85)';\n    const prevLbl = prev ? lower1(relLabel(prev.dt, selIdx - 1)) : '';\n    const trendText = !hasTrend\n      ? 'немає даних за попередній день'\n      : trendDiff === 0\n        ? ('стільки ж, скільки ' + prevLbl)\n        : (Math.abs(trendDiff) + ' ' + (trendDiff > 0 ? 'більше' : 'менше') + ', ніж ' + prevLbl);\n\n    // ціль балансу (налаштовується; за замовч. 50/50)\n    const goalTargetA = S.goalA == null ? 50 : S.goalA;\n    const goalLabel = goalTargetA + '/' + (100 - goalTargetA);\n    const goalDev = Math.abs(splitPctA - goalTargetA);\n    const isDefaultGoal = goalTargetA === 50;\n    // короткий статичний меседж балансу (без AI):\n    // сьогодні — як баланс іде; за минулі дні — яким він був за день.\n    // не суперництво: меседж про те, наскільки баланс тримається цілі чи відходить від неї.\n    const isTodaySel = selIdx === 6;\n    const todayGoalLoading = false;\n    const distLabel = splitPctA + '/' + (100 - splitPctA);      // фактичний розподіл\n    const overU = splitPctA >= goalTargetA ? userA : userB;     // на кому зараз більше «голови»\n    let todayGoalNote;\n    if (isTodaySel) {\n      if (splitEmpty) {\n        todayGoalNote = 'Сьогодні ще нічого не закрито — день лише починається.';\n      } else if (goalDev <= 7) {\n        todayGoalNote = 'Баланс іде по цілі.';\n      } else if (goalDev <= 15) {\n        todayGoalNote = 'Баланс трохи відходить від цілі — більше тримає ' + overU.name + '.';\n      } else {\n        todayGoalNote = 'Баланс помітно відходить від цілі — основне на ' + overU.dative + '.';\n      }\n    } else {\n      if (splitEmpty) {\n        todayGoalNote = 'Того дня не закрито жодної задачі.';\n      } else if (goalDev <= 7) {\n        todayGoalNote = 'Того дня баланс тримався цілі.';\n      } else if (goalDev <= 15) {\n        todayGoalNote = 'Того дня баланс трохи відходив від цілі.';\n      } else {\n        todayGoalNote = 'Того дня баланс помітно відходив від цілі — більше тримав(-ла) ' + overU.name + '.';\n      }\n    }\n    const todayGoalBg = 'var(--c-f7f2e8)', todayGoalBorder = 'var(--c-ece2d0)';\n\n    // ===== як досягається ціль (баланс менеджменту відносно цілі) =====\n    const goalGap = mentalAPct - goalTargetA;            // + => Юля несе більше за ціль\n    const goalAbsGap = Math.abs(goalGap);\n    const goalOnTrack = goalAbsGap <= 7;\n    const goalClose = goalAbsGap > 7 && goalAbsGap <= 15;\n    const goalStatusLabel = goalOnTrack ? 'Майже досягнуто' : goalClose ? 'Наближаємось' : 'Далеко від цілі';\n    const goalStatusColor = goalOnTrack ? 'var(--k61)' : goalClose ? 'var(--k62)' : 'var(--k28)';\n    const goalStatusBg = goalOnTrack ? 'var(--k63)' : goalClose ? 'var(--k64)' : 'var(--k65)';\n    const goalOverU = goalGap >= 0 ? userA : userB;\n    const goalUnderU = goalGap >= 0 ? userB : userA;\n    const goalLabelText = isDefaultGoal ? 'порівну, 50/50' : (userA.name + ' ' + goalTargetA + '% / ' + userB.name + ' ' + (100 - goalTargetA) + '%');\n    const goalAchIcon = goalOnTrack ? '✅' : '⚖️';\n    const goalAchBg = goalOnTrack ? 'var(--k36)' : 'var(--c-f7f2e8)';\n    const goalAchBorder = goalOnTrack ? 'var(--k66)' : 'var(--c-ece2d0)';\n    const goalAchNote = goalOnTrack\n      ? ('Розподіл ' + mentalAPct + '/' + mentalBPct + ' тримається біля орієнтиру ' + goalLabel + '. Гарний баланс — звіряйтесь раз на тиждень, щоб не з\\'їхати.')\n      : ('Зараз більше менеджменту на собі тримає ' + goalOverU.name + '. Щоб наблизитись до ' + goalLabel + ', можна без поспіху передати ' + goalUnderU.dative + ' цілий домен — це знімає не задачі, а саме «тримати в голові».');\n    const goalMarkerLeft = goalTargetA + '%';\n\n    // ===== AI-поради (call-to-action) для цілі та виконання =====\n    const goalOverId = goalGap >= 0 ? 'a' : 'b';\n    const handoverCand = S.domains.find(d => d.owner_id === goalOverId && !hiddenSet.has(d.id));\n    const candName = handoverCand ? handoverCand.name : null;\n    const goalFallback = goalOnTrack\n      ? ('Баланс «голови» тримається біля орієнтиру ' + goalLabel + ' — таке легко загубити непомітно. Закріпіть це: домовтесь про коротке 10-хвилинне звіряння щонеділі ввечері, щоб ловити зсув ще до того, як він стане звичкою.')\n      : ('Більше менеджменту зараз тримає ' + goalOverU.name + '. Цього тижня візьміть один домен' + (candName ? (' — напр. «' + candName + '»') : '') + ' і передайте ' + goalUnderU.dative + ' повністю: не задачі, а право вирішувати. Почніть так: «Давай ти ведеш це сам, а я не втручаюсь» — і витримайте паузу.');\n    const compFallback = compAvgDiff < 0.6\n      ? ('За тиждень ви закрили ' + (cTotA + cTotB) + ' задач, доволі рівно між собою — це вже команда. Найкорисніший крок зараз — не ділити більше, а раз на тиждень разом глянути, що з рутини можна взагалі прибрати чи спростити.')\n      : ('Цей тиждень переважно тягнув(ла) ' + compLeader.name + ' — на ' + compAvgDiff + ' задач/день більше, пік був у ' + compBusyLabel + '. Не вирівнюйте все одразу: оберіть 1–2 повторювані щоденні задачі й закріпіть їх за ' + compOther.dative + ', щоб різниця спадала сама собою.');\n    const cardAiState = S.cardAi || {};\n    const mkInsight = (key, fallback) => {\n      const st = cardAiState[key] || {};\n      return {\n        bg: 'var(--k67)', border: 'var(--k68)',\n        loading: !!st.loading,\n        showText: !st.loading,\n        text: st.text || fallback,\n        btnLabel: st.text ? 'Оновити' : 'Запитати AI',\n        onAsk: () => this.runCardAi(key),\n      };\n    };\n    const goalInsight = mkInsight('goal', goalFallback);\n    const compInsight = mkInsight('comp', compFallback);\n    const mapFallback = otherU.name + ' робить чимало руками, але майже не несе менеджмент, і цей перекіс «мапи в голові» виснажує непомітно. Варто передати 1–2 домени повністю — не задачі, а право вирішувати: домовтесь, хто веде їх від сьогодні, і відпустіть контроль.';\n    const mapInsight = mkInsight('map', mapFallback);\n    let insightTitle;\n    if (holderPct <= 55) {\n      insightTitle = 'Мапа в голові зараз розподілена доволі рівно';\n      mapInsight.icon = '⚖️';\n    } else if (holderPct < 68) {\n      insightTitle = holder.name + ' тримає більшу частину мапи в голові';\n      mapInsight.icon = '🧭';\n    } else {\n      insightTitle = holder.name + ' зараз тримає ' + holderPct + '% мапи в голові';\n      mapInsight.icon = '🪫';\n    }\n    const mapHolderDomains = visDomains.filter(d => d.owner_id === holderId)\n      .map(d => ({ d, n: S.tasks.filter(t => t.domain_id === d.id).length }))\n      .sort((x, y) => y.n - x.n).slice(0, 2).map(x => x.d);\n    const mapSuggestions = [\n      ...mapHolderDomains.map(d => ({ label: '↪ Передати «' + d.name + '»', onClick: () => this.startHandover(d.id) })),\n      { label: '📊 Переглянути баланс', onClick: () => this.openStats() },\n    ];\n\n    // ===== розподіл за вагою навантаження (mental_load, обране в задачах) =====\n    const loadDefs = [\n      { n: 3, label: 'Високий' },\n      { n: 2, label: 'Середній' },\n      { n: 1, label: 'Низький' },\n    ];\n    const loadAgg = { 1: { a: 0, b: 0, n: 0 }, 2: { a: 0, b: 0, n: 0 }, 3: { a: 0, b: 0, n: 0 } };\n    const loadById = {};\n    S.tasks.forEach(t => { loadById[t.id] = t; });\n    (S.completionEvents || []).forEach(ev => {\n      const t = loadById[ev.taskId];\n      if (!t || hiddenSet.has(t.domain_id)) return;\n      const mgr = t.manager_id; if (mgr !== 'a' && mgr !== 'b') return;\n      const lv = loadAgg[t.mental_load] ? t.mental_load : 1;\n      loadAgg[lv][mgr] += 1;\n      loadAgg[lv].n += 1;\n    });\n    const loadRows = loadDefs.map(d => {\n      const g = loadAgg[d.n];\n      const p = this.pct(g.a, g.b);\n      const lead = g.a >= g.b ? userA : userB;\n      return {\n        label: d.label, count: g.n,\n        dots: Array.from({ length: d.n }, (_, i) => ({ i })),\n        aw: (g.n === 0 ? 50 : p) + '%', bw: (g.n === 0 ? 50 : 100 - p) + '%',\n        note: g.n === 0 ? 'немає задач' : (Math.max(p, 100 - p) + '% ' + lead.name),\n      };\n    });\n\n    // ===== розподіл наявних задач між Юлею і Антоном =====\n    const distAgg = { a: 0, both: 0, b: 0 };\n    S.tasks.forEach(t => {\n      if (hiddenSet.has(t.domain_id)) return;\n      if (t.manager_id === t.executor_id && (t.manager_id === 'a' || t.manager_id === 'b')) distAgg[t.manager_id] += 1;\n      else distAgg.both += 1;\n    });\n    const distTotal = distAgg.a + distAgg.both + distAgg.b;\n    const distW = (n) => (distTotal ? n / distTotal * 100 : 0) + '%';\n    const distYulaW = distW(distAgg.a), distBothW = distW(distAgg.both), distAntonW = distW(distAgg.b);\n    const distYulaInBar = distAgg.a > 0 ? String(distAgg.a) : '';\n    const distBothInBar = distAgg.both > 0 ? String(distAgg.both) : '';\n    const distAntonInBar = distAgg.b > 0 ? String(distAgg.b) : '';\n\n    // ===== виконання по доменах (куди йде імпакт) =====\n    const domAgg2 = {};\n    (S.completionEvents || []).forEach(e => {\n      const t = taskByIdAll[e.taskId];\n      if (!t || hiddenSet.has(t.domain_id)) return;\n      const g = domAgg2[t.domain_id] || (domAgg2[t.domain_id] = { a: 0, b: 0, n: 0 });\n      this.evUsers(e).forEach(u => { g[u] += 1; });\n      g.n += 1;\n    });\n    const domCompTotal = Object.values(domAgg2).reduce((s, g) => s + g.n, 0);\n    const domCompMax = Math.max(1, ...visDomains.map(d => (domAgg2[d.id] || { n: 0 }).n));\n    const domainComp = visDomains.filter(d => (domAgg2[d.id] || { n: 0 }).n > 0).map(d => {\n      const g = domAgg2[d.id] || { a: 0, b: 0, n: 0 };\n      const pA = this.pct(g.a, g.b);\n      return {\n        id: d.id, emoji: d.icon, name: d.name, count: g.n,\n        barW: Math.round(g.n / domCompMax * 100) + '%',\n        aw: (g.n ? pA : 50) + '%', bw: (g.n ? 100 - pA : 50) + '%',\n        countLabel: g.n + ' ' + pl(g.n, 'виконання', 'виконання', 'виконань'),\n        shareLabel: domCompTotal > 0 ? Math.round(g.n / domCompTotal * 100) + '% імпакту' : '—',\n        dim: g.n === 0 ? 0.5 : 1,\n      };\n    }).sort((x, y) => y.count - x.count);\n    const domainCompEmpty = domCompTotal === 0;\n\n    const trendVals = [...this.trendSeed, mentalAPct];\n    const trendLabels = ['5 тиж', '4 тиж', '3 тиж', '2 тиж', 'мин.', 'зараз'];\n    const trend = trendVals.map((a, i) => ({ aw: a + '%', bw: (100 - a) + '%', label: trendLabels[i] }));\n\n    // confirm dialog viewmodel\n    const cf = S.confirm;\n    let confirmTitle = '', confirmBody = '', confirmOk = '', confirmCancel = '';\n    const confirmBtnBg = 'var(--k28)';\n    if (cf) {\n      if (cf.kind === 'discard') {\n        confirmTitle = 'Вийти без збереження?';\n        confirmBody = 'Ви внесли зміни, які ще не збережено. Якщо закрити зараз, їх буде втрачено.';\n        confirmOk = 'Вийти без збереження';\n        confirmCancel = 'Далі редагувати';\n      } else if (cf.kind === 'deleteTask' || cf.kind === 'deletePersonal') {\n        confirmTitle = 'Видалити задачу?';\n        confirmBody = cf.title ? ('«' + cf.title + '» буде видалено назавжди. Цю дію не можна скасувати.') : 'Задачу буде видалено назавжди. Цю дію не можна скасувати.';\n        confirmOk = 'Видалити';\n        confirmCancel = 'Скасувати';\n      } else if (cf.kind === 'deleteLog' || cf.kind === 'deletePersonalLog') {\n        confirmTitle = 'Видалити запис?';\n        confirmBody = cf.title ? ('«' + cf.title + '» прибереться з журналу і перестане враховуватись у балансі.') : 'Запис прибереться з журналу і перест
