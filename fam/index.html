document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ign-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;transition:width .5s\">{{ execALabel }}<\u002Fdiv>\n              <div style=\"width:{{ execBW }};background:oklch(0.73 0.115 50);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;transition:width .5s\">{{ execBLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fffdf8;border:1px solid #e8dfce;border-radius:18px;padding:20px\">\n            <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.02em\">Хто тримає в голові<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#948a78;margin:3px 0 14px\">Менеджмент — помічати, планувати, передбачати<\u002Fdiv>\n            <div style=\"display:flex;height:42px;border-radius:11px;overflow:hidden;background:#f0eadf\">\n              <div style=\"width:{{ mentalAW }};background:oklch(0.63 0.105 292);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;transition:width .5s\">{{ mentalALabel }}<\u002Fdiv>\n              <div style=\"width:{{ mentalBW }};background:oklch(0.73 0.115 50);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;transition:width .5s\">{{ mentalBLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- load distribution -->\n        <div style=\"background:#fffdf8;border:1px solid #e8dfce;border-radius:18px;padding:20px\">\n          <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.02em\">Розподіл за пріоритетом<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#948a78;margin:3px 0 4px\">Як задачі кожного пріоритету розподілені між вами<\u002Fdiv>\n          <sc-for list=\"{{ loadRows }}\" as=\"l\" hint-placeholder-count=\"3\">\n            <div style=\"padding:14px 0 0;border-top:1px solid #f0eadf;margin-top:12px\">\n              <div style=\"display:fl u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DOD EDIT OVERLAY ============ -->\n  <sc-if value=\"{{ dodEditing }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(45,38,28,.42);z-index:55;display:flex;align-items:center;justify-content:center;padding:24px\" onclick=\"{{ cancelEditDod }}\">\n    <div onclick=\"{{ stop }}\" style=\"width:min(520px,100%);background:#fffdf8;border-radius:24px;padding:30px;box-shadow:0 24px 70px rgba(60,45,25,.28);animation:ladPop .35s ease both;max-height:90vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\">\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0\">Що означає «зроблено»<\u002Fh2>\n        <button onclick=\"{{ cancelEditDod }}\" style=\"width:34px;height:34px;border-radius:11px;border:1px solid #e0d6c2;background:#fffdf8;cursor:pointer;color:#8a7d68;display:flex;align-items:center;justify-content:center;padding:0\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:14px;color:#948a78;margin:0 0 18px;line-height:1.5\">Спільний стандарт для домену «{{ dodDomainName }}» — антидот проти мікроменеджменту.<\u002Fp>\n      <textarea value=\"{{ dodDraft }}\" onchange=\"{{ onDodInput }}\" placeholder=\"Опишіть, який результат вважаєте «зроблено»…\" style=\"width:100%;box-sizing:border-box;min-height:140px;padding:14px;border-radius:14px;border:1px solid #e0d6c2;background:#fff;font-size:15px;color:#3b362c;line-height:1.55;resize:vertical\"><\u002Ftextarea>\n      <div style=\"display:flex;gap:10px;justify-content:flex-end;margin-top:20px\">\n        <button onclick=\"{{ cancelEditDod }}\" style=\"padding:11px 18px;border-radius:12px;border:1px solid #e0d6c2;background:#fff;color:#5c5446;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:#faf6ee\">Скасувати<\u002Fbutton>\n        <button onclick=\"{{ saveDod }}\" style=\"padding:11px 22px;border-radius:12px;border:none;background:oklch(0.6 0.12 150);color:#fff;font-size:14px;font-weight:600;cursor:pointer\">Зберегти<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ HANDOVER OVERLAY ============ -->\n  <sc-if value=\"{{ handoverOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(45,38,28,.42);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px\" onclick=\"{{ closeOverlay }}\">\n    <div onclick=\"{{ stop }}\" style=\"width:min(560px,100%);background:#fffdf8;border-radius:24px;padding:34px;box-shadow:0 24px 70px rgba(60,45,25,.28);animation:ladPop .35s ease both;max-height:90vh;overflow-y:auto\">\n      <div style=\"display:flex;gap:6px;margin-bottom:22px\">\n        <sc-for list=\"{{ ho.progress }}\" as=\"p\" hint-placeholder-count=\"5\"><span style=\"flex:1;height:4px;border-radius:2px;background:{{ p.c }}\"><\u002Fspan><\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ ho.s0 }}\" hint-placeholder-val=\"{{ true }}\">\n        <span style=\"font-size:40px\">{{ ho.emoji }}<\u002Fspan>\n        <h2 style=\"font-size:26px;font-weight:700;letter-spacing:-0.02em;margin:14px 0 10px\">Передати домен «{{ ho.name }}»<\u002Fh2>\n        <p style=\"font-size:15.5px;color:#5c5446;line-height:1.6;margin:0 0 8px\">Ти передаєш <b>не задачі<\u002Fb>, а власність: помічати, планувати, делегувати й доводити до кінця.<\u002Fp>\n        <p style=\"font-size:14.5px;color:#948a78;line-height:1.6;margin:0 0 26px\">Від <b style=\"color:{{ ho.fromColor }}\">{{ ho.fromName }}<\u002Fb> до <b style=\"color:{{ ho.toColor }}\">{{ ho.toName }}<\u002Fb>.<\u002Fp>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ ho.s1 }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0 0 8px\">Що означає взяти власність<\u002Fh2>\n        <p style=\"font-size:14px;color:#948a78;margin:0 0 20px\">Повний цикл, а не «зроби, коли попрошу».<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:24px\">\n          <sc-for list=\"{{ ho.cycle }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:13px;background:#f7f2e8;border-radius:13px;padding:14px 16px\">\n              <span style=\"width:28px;height:28px;flex:none;border-radius:50%;background:oklch(0.63 0.105 292);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600\">{{ c.n }}<\u002Fspan>\n              <div><div style=\"font-weight:600;font-size:14.5px\">{{ c.title }}<\u002Fdiv><div style=\"font-size:13px;color:#948a78\">{{ c.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ ho.s2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0 0 8px\">Узгодьте «що означає зроблено»<\u002Fh2>\n        <p style=\"font-size:14px;color:#948a78;margin:0 0 18px;line-height:1.5\">Один раз домовтесь про стандарт — це антидот проти мікроменеджменту. Далі попередній власник відпускає контроль.<\u002Fp>\n        <textarea value=\"{{ ho.dod }}\" onchange=\"{{ onHandoverDod }}\" style=\"width:100%;min-height:120px;padding:14px;border-radius:14px;border:1px solid #e0d6c2;background:#fff;font-size:15px;line-height:1.5;resize:vertical;margin-bottom:24px\"><\u002Ftextarea>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ ho.s4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"font-size:44px\">🌿<\u002Fspan>\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:14px 0 10px\">Домен переданий<\u002Fh2>\n        <p style=\"font-size:15px;color:#5c5446;line-height:1.6;margin:0 0 10px\"><b style=\"color:{{ ho.toColor }}\">{{ ho.toName }}<\u002Fb> тепер веде «{{ ho.name }}» цілком.<\u002Fp>\n        <div style=\"background:oklch(0.96 0.025 292);border-radius:14px;padding:16px;margin-bottom:24px\">\n          <p style=\"font-size:14px;color:#5c5446;line-height:1.55;margin:0\"><b>{{ ho.fromName }}<\u002Fb>, утримайся від мікроменеджменту. Стандарт узгоджено — тепер можна довіритись системі й відпустити. 💛<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n        <sc-if value=\"{{ ho.showBack }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ handoverBack }}\" style=\"padding:11px 18px;border-radius:12px;border:1px solid #e0d6c2;background:#fff;color:#8a7d68;font-size:14px;font-weight:600;cursor:pointer\">Назад<\u002Fbutton><\u002Fsc-if>\n        <button onclick=\"{{ ho.primaryAction }}\" style=\"padding:11px 22px;border-radius:12px;border:none;background:oklch(0.63 0.105 292);color:#fff;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:oklch(0.58 0.105 292)\">{{ ho.primaryLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SETTINGS OVERLAY ============ -->\n  <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(45,38,28,.42);z-index:50;display:flex;align-items:center;justify-content:center;padding:clamp(8px,3vw,24px)\" onclick=\"{{ closeOverlay }}\">\n    <div onclick=\"{{ stop }}\" style=\"width:min(680px,100%);background:#f7f2e8;border-radius:24px;padding:clamp(16px,4.5vw,30px);box-shadow:0 24px 70px rgba(60,45,25,.28);animation:ladPop .35s ease both;max-height:90vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-c ax=\"100\" step=\"5\" value=\"{{ goalA }}\" onchange=\"{{ onGoalChange }}\" oninput=\"{{ onGoalChange }}\" class=\"lad-range\" style=\"background:{{ goalTrack }}\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:12px\">\n          <span style=\"font-size:12px;color:#a59a85\">{{ goalHint }}<\u002Fspan>\n          <button onclick=\"{{ resetGoal }}\" disabled=\"{{ goalIsDefault }}\" style=\"background:none;border:none;color:{{ goalResetColor }};font-size:13px;font-weight:600;cursor:{{ goalResetCursor }};padding:0\">Скинути на 50/50<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DOMAINS -->\n      <div style=\"background:#fffdf8;border:1px solid #e8dfce;border-radius:18px;padding:20px\">\n        <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.02em\">Домени<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#948a78;margin:3px 0 14px\">Вимкнений домен і його задачі ховаються зі списку.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column\">\n          <sc-for list=\"{{ settingsDomains }}\" as=\"d\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:12px 0;border-top:{{ d.sepStyle }}\">\n              <span style=\"width:38px;height:38px;flex:none;border-radius:11px;background:#f7f2e8;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:{{ d.opacity }}\">{{ d.emoji }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;opacity:{{ d.opacity }}\">\n                <div style=\"font-size:14.5px;font-weight:600;color:#3b362c;line-height:1.3\">{{ d.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#a59a85;margin-top:2px\">{{ d.statusLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ d.onToggle }}\" title=\"{{ d.toggleTitle }}\" style=\"width:50px;height:28px;flex:none;border-radius:15px;border:none;background:{{ d.switchBg }};cursor:pointer;position:relative;padding:0;transition:background .2s\">\n                <span style=\"position:absolute;top:3px;left:{{ d.knobLeft }};width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(60,45,25,.3);transition:left .2s\"><\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- АКАУНТ І СИНХРОНІЗАЦІЯ -->\n      <sc-if value=\"{{ hasAccount }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fffdf8;border:1px solid #e8dfce;border-radius:18px;padding:20px;margin-top:18px\">\n        <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.02em\">Акаунт і синхронізація<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#948a78;margin:3px 0 14px\">Дані зберігаються у спільній хмарі для обох акаунтів.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between\">\n          <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n            <span style=\"width:9px;height:9px;flex:none;border-radius:50%;background:{{ syncColor }}\"><\u002Fspan>\n            <div style=\"min-width:0\">\n              <div style=\"font-size:14px;font-weight:600;color:#3b362c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ accountEmail }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#a59a85\">{{ syncLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ signOut }}\" style=\"padding:9px 16px;border-radius:11px;border:1px solid #e0d6c2;background:#fff;color:#5c5446;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#faf6ee\">Вийти<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ AI ANALYSIS OVERLAY ============ -->\n  <sc-if value=\"{{ aiOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(45,38,28,.42);z-index:50;display:flex;align-items:center;justify-content:center;padding:clamp(8px,3vw,24px)\" onclick=\"{{ closeOverlay }}\">\n    <div onclick=\"{{ stop }}\" style=\"width:min(680px,100%);background:#fffdf8;border-radius:24px;padding:clamp(16px,4.5vw,30px);box-shadow:0 24px 70px rgba(60,45,25,.28);animation:ladPop .35s ease both;max-height:90vh;overflow-y:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n        <h2 style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0;display:flex;align-items:center;gap:9px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"oklch(0.55 0.10 292)\"><path d=\"M12 3l1.6 6L20 11l-6.4 1.5L12 19l-1.6-6.5L4 11l6.4-2z\"><\u002Fpath><\u002Fsvg>AI-аналіз балансу<\u002Fh2>\n        <button onclick=\"{{ closeOverlay }}\" style=\"width:34px;height:34px;border-radius:11px;border:1px solid #e0d6c2;background:#fffdf8;cursor:pointer;color:#8a7d68;display:flex;align-items:center;justify-content:center;padding:0\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:13.5px;color:#948a78;margin:0 0 20px\">Погляд збоку на ваш розподіл — тепло й без докорів.<\u002Fp>\n      <sc-if value=\"{{ aiLoading }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:12px;color:#948a78;font-size:14px;padding:18px 0\">\n          <span style=\"width:18px;height:18px;flex:none;border-radius:50%;border:2.5px solid #e8dfce;border-top-color:oklch(0.63 0.105 292);display:inline-block;animation:ladSpin .8s linear infinite\"><\u002Fspan>\n          Аналізую ваш баланс eturn { label: lab, onClick: () => this.setDraft({ mental_load: n }), border: a ? 'oklch(0.63 0.105 292)' : '#e0d6c2', bg: a ? 'oklch(0.96 0.025 292)' : '#fff', fg: a ? 'oklch(0.45 0.10 292)' : '#948a78' }; });\n    const timeSeg = [['morning', 'Ранок'], ['lunch', 'Обід'], ['evening', 'Вечір'], ['allday', 'Весь день']].map(([id, lab]) => { const a = (S.draft.time_of_day || 'allday') === id; return { label: lab, onClick: () => this.setDraft({ time_of_day: id }), border: a ? 'oklch(0.63 0.105 292)' : '#e0d6c2', bg: a ? 'oklch(0.96 0.025 292)' : '#fff', fg: a ? 'oklch(0.45 0.10 292)' : '#948a78' }; });\n    const domainOptions = visDomains.map(d => ({ id: d.id, name: d.name }));\n    const recurOptions = Object.keys(recur).map(k => ({ id: k, label: recur[k].l }));\n    recurOptions.push({ id: 'custom', label: 'свій інтервал' });\n    const draftInterval = this.parseInterval(S.draft.recurrence);\n    const presetLabels = ['Запис до лікаря', 'Відстеження запасів дому', 'Дні народження рідних', 'Домовленості зі школою', 'Емоційний стан дитини', 'Графік щеплень собаки', 'Подарунки на свята', 'Планування відпустки', 'Оплата комуналки', 'Контроль ліків в аптечці'];\n    const presets = presetLabels.map(l => ({ label: l, onClick: () => this.setDraft({ title: l }) }));\n    const draftSubs = S.draft.subtasks.map(s => ({ id: s.id, title: s.title, onRemove: () => this.removeSubtask(s.id) }));\n\n    // handover viewmodel\n    let ho = null;\n    if (S.handover) {\n      const h = S.handover, dom = S.domains.find(x => x.id === h.domainId);\n      const from = this.U(h.fromId), to = this.U(h.toId);\n      const labels = ['Далі', 'Далі', 'Передати домен', '', 'Готово'];\n      ho = {\n        step: h.step, emoji: dom.icon, name: dom.name, dod: h.dod,\n        fromName: from.name, fromColor: from.color, toName: to.name, toColor: to.color,\n        s0: h.step === 0, s1: h.step === 1, s2: h.step === 2, s3: h.step === 3, s4: h.step === 4,\n        showBack: h.step > 0 && h.step < 4,\n        primaryLabel: labels[h.step], primaryAction: () => this.handoverNext(),\n        progress: [0, 1, 2, 4].map(i => ({ c: i <= h.step ? 'oklch(0.63 0.105 292)' : '#e8dfce' })),\n        cycle: [\n          { n: '1', title: 'Помічати', desc: 'бачити, що треба зробити, без нагадувань' },\n          { n: '2', title: 'Планувати', desc: 'передбачати наперед, тримати в голові' },\n          { n: '3', title: 'Делегувати', desc: 'просити допомоги, коли потрібно' },\n          { n: '4', title: 'Доводити до кінця', desc: 'відповідати за результат цілком' },\n        ],\n      };\n    }\n\n    // ===== виконання задач за день (за фактично виконаними) =====\n    const round1 = (n) => Math.round(n * 10) / 10;\n    const fmtDay = (dt) => dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');\n    const evByDay = {};\n    (S.completionEvents || []).forEach(e => {\n      const bucket = evByDay[e.date] || (evByDay[e.date] = { a: 0, b: 0, n: 0 });\n      this.evUsers(e).forEach(u => { bucket[u] += 1; });\n      bucket.n += 1;\n    });\n    const today7 = new Date(this.TODAY + 'T00:00:00');\n    const compRaw = [];\n    for (let i = 6; i >= 0; i--) {\n      const dt = new Date(today7); dt.setDate(today7.getDate() - i);\n      const c = evByDay[fmtDay(dt)] || { a: 0, b: 0, n: 0 };\n      compRaw.push({ dt, a: c.a, b: c.b, n: c.n });\n    }\n    const cTotA = compRaw.reduce((s, d) => s + d.a, 0);\n    const cTotB = compRaw.reduce((s, d) => s + d.b, 0);\n    const cTotN = compRaw.reduce((s, d) => s + d.n, 0);\n    const cPctA = this.pct(cTotA, cTotB);\n    const cMax = Math.max(1, ...compRaw.map(d => Math.max(d.a, d.b)));\n    const dayCap = this.dailyCapacity();                           // стала місткість типового дня\n    const savedTotals = S.dayTotals || {};                         // зафіксований підсумок кожного минулого дня\n    const todayActiveN = activeTodayAll;                           // ще не закриті задачі сьогодні (по всіх доменах)\n    const RINGC = 2 * Math.PI * 13;                                // r=13 у кільці заповнення дня\n    const hoverComp = this.state.hoverComp;\n    const cFilt = S.compFilter || 'both';                          // фільтр чарту: both | a | b\n    // Реконструкція знаменника минулих днів із наразі перенесених (overdue) задач:\n    // кожна досі не зроблена періодична задача «висіла» в кожен день від свого простроченого строку.\n    const carryHangByDay = compRaw.map(() => 0);\n    for (const t of (S.tasks || [])) {\n      if (hiddenSet.has(t.domain_id)) continue;\n      if (!this.isRecurring(t.recurrence)) continue;\n      const stt = this.taskStatus(t);\n      if (!stt.overdue || !stt.nextDue) continue;\n      compRaw.forEach((d, i) => { if (i !== 6 && fmtDay(d.dt) >= stt.nextDue) carryHangByDay[i] += 1; });\n    }\n    const compDays = compRaw.map((d, i) => {\n      const diff = d.a - d.b;\n      const closedN = d.n;                                         // фактично закрито (без подвійного рахунку спільних)\n      const dispN = cFilt === 'a' ? d.a : cFilt === 'b' ? d.b : closedN; // показане число з урахуванням фільтра\n      // заповнення дня = закрито / усі задачі дня — так само, як на дашборді:\n      //   сьогодні знаменник = закрито + ще активні; за минулі дні — фактичний підсумок того дня\n      //   (знімок dayTotals АБО реконструкція «закрито + досі перенесені»), щоб не показувати хибні 100%\n      const savedDen = savedTotals[fmtDay(d.dt)];\n      const denom = i === 6\n        ? (closedN + todayActiveN)\n        : Math.max(closedN, closedN + carryHangByDay[i], savedDen != null ? savedDen : 0);\n      const fillBase = cFilt === 'both' ? closedN : dispN;\n      const fillFrac = denom > 0 ? Math.min(1, fillBase / denom) : 0;\n      return {\n        label: this.WEEKDAYS[d.dt.getDay()],\n        aCount: d.a, bCount: d.b,\n        dayTot: dispN,\n        fillLabel: 'заповнення дня · ' + Math.round(fillFrac * 100) + '%',\n        ringColor: dispN === 0 ? '#e0d6c2' : 'oklch(0.55 0.10 150)',\n        ringArr: RINGC.toFixed(1),\n        ringOff: (RINGC * (1 - fillFrac)).toFixed(1),\n        ah: cFilt === 'b' ? '0%' : (d.a / cMax * 100) + '%', bh: cFilt === 'a' ? '0%' : (d.b / cMax * 100) + '%',\n        diffLabel: diff === 0 ? '0' : (diff > 0 ? '+' : '') + diff,\n        diffColor: diff > 0 ? 'oklch(0.63 0.105 292)' : diff < 0 ? 'oklch(0.73 0.115 50)' : '#b3a890',\n        tipShow: hoverComp === i,\n        onEnter: () => this.setState({ hoverComp: i }),\n        onLeave: () => this.setState({ hoverComp: null }),\n      };\n    });\n    const compLeader = cTotA >= cTotB ? this.U('a') : this.U('b');\n    const compOther = compLeader === this.U('a') ? this.U('b') : this.U('a');\n    const compAvgDiff = round1(Math.abs(cTotA - cTotB) / compRaw.length);\n    const compBusiest = compRaw.reduce((m, d) => (d.a + d.b) > (m.a + m.b) ? d : m, compRaw[0]);\n    const compBusyLabel = this.WEEKDAYS[compBusiest.dt.getDay()];\n    const comp7AvgFill = Math.round(compRaw.reduce((s, d) => s + Math.min(1, (cFilt === 'a' ? d.a : cFilt === 'b' ? d.b : d.n) / dayCap), 0) / compRaw.length * 100) + '%';\n    const comp7TotalF = cFilt === 'a' ? cTotA : cFilt === 'b' ? cTotB : cTotN;\n\n    // ===== що найчастіше переноситься (журнал переносів) =====\n    const carryLogMap = S.carryLog || {};\n    const pl = (n, one, few, many) => { const a = n % 10, b = n % 100; if (a === 1 && b !== 11) return one; if (a >= 2 && a <= 4 && (b < 10 || b >= 20)) return few; return many; };\n    let carryRows = (S.tasks || [])\n      .filter(t => !hiddenSet.has(t.domain_id) && ((carryLogMap[t.id] && carryLogMap[t.id].count) || 0) > 0)\n      .map(t => {\n        const st = this.taskStatus(t);\n        const cnt = carryLogMap[t.id].count;\n        return {\n          id: t.id, title: t.title, count: cnt,\n          domainName: domName(t.domain_id), domainEmoji: domIcon(t.domain_id),\n          countLabel: cnt + ' ' + pl(cnt, 'перенос', 'переноси', 'переносів'),\n          statusLabel: st.overdue ? ('прострочено на ' + st.overdueDays + ' ' + pl(st.overdueDays, 'день', 'дні', 'днів')) : 'наразі в графіку',\n          statusColor: st.overdue ? 'oklch(0.55 0.13 35)' : '#a59a85',\n        };\n      })\n      .sort((x, y) => y.count - x.count)\n      .slice(0, 5);\n    const carryMax = Math.max(1, ...carryRows.map(r => r.count));\n    carryRows = carryRows.map(r => ({ ...r, barW: Math.round(r.count / carryMax * 100) + '%' }));\n    const carryEmpty = carryRows.length === 0;\n\n    // ===== перехоплені задачі: закрив не той, на кого була призначена =====\n    const taskByIdAll = {}; (S.tasks || []).forEach(t => { taskByIdAll[t.id] = t; });\n    let interA = 0, interB = 0; let interList = [];\n    (S.completionEvents || []).forEach(e => {\n      const t = taskByIdAll[e.taskId];\n      if (!t || hiddenSet.has(t.domain_id)) return;\n      const orig = t.executor_id;\n      if (orig !== 'a' && orig !== 'b') return;\n      if (e.userId !== orig && (e.userId === 'a' || e.userId === 'b')) {\n        if (e.userId === 'a') interA++; else interB++;\n        interList.push({ taskId: e.taskId + '|' + e.date + '|' + (e.h || 0), title: t.title, byU: this.U(e.userId), fromU: this.U(orig), when: this.dayLabel(e.date), sort: e.date + (e.h == null ? 0 : e.h) });\n      }\n    });\n    interList.sort((x, y) => x.sort < y.sort ? 1 : -1);\n    const interRows = [];\n    const interVerb = (uid) => uid === 'a' ? 'закрила' : 'закрив';\n    if (interA > 0) interRows.push({ key: 'a', text: this.U('a').name + ' ' + interVerb('a') + ' ' + interA + ' ' + pl(interA, 'задачу', 'задачі', 'задач') + ', призначених ' + this.U('b').dative, color: this.U('a').color });\n    if (interB > 0) interRows.push({ key: 'b', text: this.U('b').name + ' ' + interVerb('b') + ' ' + interB + ' ' + pl(interB, 'задачу', 'задачі', 'задач') + ', призначених ' + this.U('a').dative, color: this.U('b').color });\n    interList = interList.slice(0, 4).map(x => ({ key: x.taskId, title: x.title, when: x.when, byInitial: x.byU.initial, byColor: x.byU.color, fromInitial: x.fromU.initial, fromColor: x.fromU.color }));\n    const interTotal = interA + interB;\n    const interEmpty = interTotal === 0;\n\n    // ===== інтрадей: закрито сьогодні впродовж дня (кумулятивно) =====\n    const todayEvents = (S.completionEvents || []).filter(e => e.date === this.TODAY);\n    const hoursOf = (uid) => todayEvents.filter(e => this.evUsers(e).includes(uid)).map(e => (e.h == null ? 12 : e.h)).sort((p, q) => p - q);\n    const aHours = hoursOf('a'), bHours = hoursOf('b');\n    const todayCountA = aHours.length, todayCountB = bHours.length;\n    const nowH = this.state.clockH == null ? 20.5 : this.state.clockH;\n    // вікно шкали підлаштовується, щоб точка щойно закритої задачі лягла на реальний час\n    const allHours = [...aHours, ...bHours, nowH];\n    const dayStart = Math.min(6, Math.floor(Math.min(...allHours)));\n    const dayEnd = Math.max(23, Math.ceil(Math.max(...allHours)));\n    const span = Math.max(1, dayEnd - dayStart);\n    const toPct = (h) => ((h - dayStart) / span) * 100;\n    const fmtH = (h) => { const hh = Math.floor(h); const mm = Math.round((h - hh) * 60); return hh + ':' + String(mm).padStart(2, '0'); };\n    const laneJitter = [50, 34, 66];\n    const laneFor = (uid, hours) => {\n      const u = this.U(uid);\n      const dots = hours.map((h, i) => ({\n        left: toPct(h).toFixed(1) + '%', top: laneJitter[i % 3] + '%',\n        title: u.name + ' · ' + fmtH(h),\n      }));\n      return { color: u.color, initial: u.initial, name: u.name, count: hours.length, empty: hours.length === 0, dots, nowLeft: toPct(nowH).toFixed(1) + '%' };\n    };\n    const todayLanes = [laneFor('a', aHours), laneFor('b', bHours)];\n    const todayTotal = todayCountA + todayCountB;\n    const todayDiff = todayCountA - todayCountB;\n    const todayLead = todayDiff >= 0 ? this.U('a') : this.U('b');\n    const todayBalanceNote = todayTotal === 0\n      ? 'Сьогодні ще нічого не закрито'\n      : todayDiff === 0\n        ? ('Порівну — по ' + todayCountA + ' у кожного')\n        : (todayLead.name + ' попереду на ' + Math.abs(todayDiff));\n    const todayMidH = Math.round((dayStart + dayEnd) / 2);\n\n    // ===== вибраний день: кільце + горизонтальний баланс + тренд vs попередній =====\n    const userA = this.U('a'), userB = this.U('b');\n    const selIdx = Math.min(6, Math.max(0, S.selectedDay == null ? 6 : S.selectedDay));\n    const sel = compRaw[selIdx];\n    const prev = selIdx > 0 ? compRaw[selIdx - 1] : null;\n    const selA = sel.a, selB = sel.b, selTotal = sel.n;\n    // загальна кількість задач дня: сьогодні — закрито + ще активні;\n    // за минулі дні — фактичний підсумок, зафіксований перед переходом доби (напр. 30/38),\n    // а не selTotal (що давало б фальшиві 100%). Якщо знімка немає — стала місткість дня.\n    const selSavedDen = savedTotals[fmtDay(sel.dt)];\n    const dayTotal = selIdx === 6\n      ? selTotal + activeTodayAll\n      : Math.max(selTotal, selTotal + carryHangByDay[selIdx], selSavedDen != null ? selSavedDen : 0);\n\n    // кільце «заповнення дня» — закрито / стала місткість типового дня\n    const dayPct = Math.round(Math.min(1, selTotal / this.dailyCapacity()) * 100);\n    const RING_C = 2 * Math.PI * 40;                  // r=40\n    const ringDash = RING_C.toFixed(1);\n    const ringOffset = (RING_C * (1 - dayPct / 100)).toFixed(1);\n    // компактне кільце «виконано» для заголовка (частка закритих із денних)\n    const ringR = 19, ringCirc = 2 * Math.PI * ringR;\n    const ringFrac = dayTotal > 0 ? selTotal / dayTotal : 0;\n    const ringDashArr = ringCirc.toFixed(1);\n    const ringDashOff = (ringCirc * (1 - ringFrac)).toFixed(1);\n    const ringPctLabel = Math.round(ringFrac * 100) + '%';\n\n    // горизонтальний спліт Юля / Антон\n    const splitEmpty = selTotal === 0;\n    const splitPctA = this.pct(selA, selB);\n    const splitAW = (splitEmpty ? 50 : splitPctA) + '%';\n    const splitBW = (splitEmpty ? 50 : (100 - splitPctA)) + '%';\n\n    // перемикач днів\n    const relLabel = (dt, idx) => idx === 6 ? 'Сьогодні' : idx === 5 ? 'Учора' : (this.WEEKDAYS[dt.getDay()] + ', ' + dt.getDate() + ' ' + this.MONTHS[dt.getMonth()]);\n    const lower1 = (s) => s.charAt(0).toLowerCase() + s.slice(1);\n    const daySwitchLabel = relLabel(sel.dt, selIdx);\n    const closedHeading = daySwitchLabel;\n\n    // тренд vs попередній день\n    const hasTrend = !!prev;\n    const prevTotal = prev ? prev.n : 0;\n    const trendDiff = selTotal - prevTotal;\n    const trendArrow = trendDiff > 0 ? '▲' : trendDiff < 0 ? '▼' : '—';\n    const trendColor = trendDiff > 0 ? 'oklch(0.55 0.10 150)' : trendDiff < 0 ? 'oklch(0.60 0.13 30)' : '#a59a85';\n    const prevLbl = prev ? lower1(relLabel(prev.dt, selIdx - 1)) : '';\n    const trendText = !hasTrend\n      ? 'немає даних за попередній день'\n      : trendDiff === 0\n        ? ('стільки ж, скільки ' + prevLbl)\n        : (Math.abs(trendDiff) + ' ' + (trendDiff > 0 ? 'більше' : 'менше') + ', ніж ' + prevLbl);\n\n    // ціль балансу (налаштовується; за замовч. 50/50)\n    const goalTargetA = S.goalA == null ? 50 : S.goalA;\n    const goalLabel = goalTargetA + '/' + (100 - goalTargetA);\n    const goalDev = Math.abs(splitPctA - goalTargetA);\n    const isDefaultGoal = goalTargetA === 50;\n    // короткий статичний меседж балансу (без AI):\n    // сьогодні — як баланс іде; за минулі дні — яким він був за день.\n    // не суперництво: меседж про те, наскільки баланс тримається цілі чи відходить від неї.\n    const isTodaySel = selIdx === 6;\n    const todayGoalLoading = false;\n    const distLabel = splitPctA + '/' + (100 - splitPctA);      // фактичний розподіл\n    const overU = splitPctA >= goalTargetA ? userA : userB;     // на кому зараз більше «голови»\n    let todayGoalNote;\n    if (isTodaySel) {\n      if (splitEmpty) {\n        todayGoalNote = 'Сьогодні ще нічого не закрито — день лише починається.';\n      } else if (goalDev <= 7) {\n        todayGoalNote = 'Баланс іде по цілі ' + goalLabel + ' — зараз ' + distLabel + '.';\n      } else if (goalDev <= 15) {\n        todayGoalNote = 'Баланс трохи відходить від цілі ' + goalLabel + ' — зараз ' + distLabel + ', більше тримає ' + overU.name + '.';\n      } else {\n        todayGoalNote = 'Баланс помітно відходить від цілі ' + goalLabel + ' — зараз ' + distLabel + ', основне на ' + overU.dative + '.';\n      }\n    } else {\n      if (splitEmpty) {\n        todayGoalNote = 'Того дня не закрито жодної задачі.';\n      } else if (goalDev <= 7) {\n        todayGoalNote = 'Того дня баланс тримався цілі ' + goalLabel + ' — вийшло ' + distLabel + '.';\n      } else if (goalDev <= 15) {\n        todayGoalNote = 'Того дня баланс трохи відходив від цілі ' + goalLabel + ' — ' + distLabel + '.';\n      } else {\n        todayGoalNote = 'Того дня баланс помітно відходив від цілі ' + goalLabel + ' — ' + distLabel + ', більше тримав(-ла) ' + overU.name + '.';\n      }\n    }\n    const todayGoalBg = '#f7f2e8', todayGoalBorder = '#ece2d0';\n\n    // ===== як досягається ціль (баланс менеджменту відносно цілі) =====\n    const goalGap = mentalAPct - goalTargetA;            // + => Юля несе більше за ціль\n    const goalAbsGap = Math.abs(goalGap);\n    const goalOnTrack = goalAbsGap <= 7;\n    const goalClose = goalAbsGap > 7 && goalAbsGap <= 15;\n    const goalStatusLabel = goalOnTrack ? 'Майже досягнуто' : goalClose ? 'Наближаємось' : 'Далеко від цілі';\n    const goalStatusColor = goalOnTrack ? 'oklch(0.45 0.10 150)' : goalClose ? 'oklch(0.48 0.10 70)' : 'oklch(0.52 0.13 30)';\n    const goalStatusBg = goalOnTrack ? 'oklch(0.95 0.04 150)' : goalClose ? 'oklch(0.95 0.04 70)' : 'oklch(0.95 0.035 30)';\n    const goalOverU = goalGap >= 0 ? userA : userB;\n    const goalUnderU = goalGap >= 0 ? userB : userA;\n    const goalLabelText = isDefaultGoal ? 'порівну, 50/50' : (userA.name + ' ' + goalTargetA + '% / ' + userB.name + ' ' + (100 - goalTargetA) + '%');\n    const goalAchIcon = goalOnTrack ? '✅' : '⚖️';\n    const goalAchBg = goalOnTrack ? 'oklch(0.96 0.03 150)' : '#f7f2e8';\n    const goalAchBorder = goalOnTrack ? 'oklch(0.88 0.05 150)' : '#ece2d0';\n    const goalAchNote = goalOnTrack\n      ? ('Розподіл ' + mentalAPct + '/' + mentalBPct + ' тримається біля орієнтиру ' + goalLabel + '. Гарний баланс — звіряйтесь раз на тиждень, щоб не з\\'їхати.')\n      : ('Зараз більше менеджменту на собі тримає ' + goalOverU.name + '. Щоб наблизитись до ' + goalLabel + ', можна без поспіху передати ' + goalUnderU.dative + ' цілий домен — це знімає не задачі, а саме «тримати в голові».');\n    const goalMarkerLeft = goalTargetA + '%';\n\n    // ===== AI-поради (call-to-action) для цілі та виконання =====\n    const goalOverId = goalGap >= 0 ? 'a' : 'b';\n    const handoverCand = S.domains.find(d => d.owner_id === goalOverId && !hiddenSet.has(d.id));\n    const candName = handoverCand ? handoverCand.name : null;\n    const goalFallback = goalOnTrack\n      ? ('Баланс «голови» тримається біля орієнтиру ' + goalLabel + ' — таке легко загубити непомітно. Закріпіть це: домовтесь про коротке 10-хвилинне звіряння щонеділі ввечері, щоб ловити зсув ще до того, як він стане звичкою.')\n      : ('Більше менеджменту зараз тримає ' + goalOverU.name + '. Цього тижня візьміть один домен' + (candName ? (' — напр. «' + candName + '»') : '') + ' і передайте ' + goalUnderU.dative + ' повністю: не задачі, а право вирішувати. Почніть так: «Давай ти ведеш це сам, а я не втручаюсь» — і витримайте паузу.');\n    const compFallback = compAvgDiff < 0.6\n      ? ('За тиждень ви закрили ' + (cTotA + cTotB) + ' задач, доволі рівно між собою — це вже команда. Найкорисніший крок зараз — не ділити більше, а раз на тиждень разом глянути, що з рутини можна взагалі прибрати чи спростити.')\n      : ('Цей тиждень переважно тягнув(ла) ' + compLeader.name + ' — на ' + compAvgDiff + ' задач/день більше, пік був у ' + compBusyLabel + '. Не вирівнюйте все одразу: оберіть 1–2 повторювані щоденні задачі й закріпіть їх за ' + compOther.dative + ', щоб різниця спадала сама собою.');\n    const cardAiState = S.cardAi || {};\n    const mkInsight = (key, fallback) => {\n      const st = cardAiState[key] || {};\n      return {\n        bg: 'oklch(0.975 0.018 292)', border: 'oklch(0.9 0.045 292)',\n        loading: !!st.loading,\n        showText: !st.loading,\n        text: st.text || fallback,\n        btnLabel: st.text ? 'Оновити' : 'Запитати AI',\n        onAsk: () => this.runCardAi(key),\n      };\n    };\n    const goalInsight = mkInsight('goal', goalFallback);\n    const compInsight = mkInsight('comp', compFallback);\n    const mapFallback = otherU.name + ' робить чимало руками, але майже не несе менеджмент, і цей перекіс «мапи в голові» виснажує непомітно. Варто передати 1–2 домени повністю — не задачі, а право вирішувати: домовтесь, хто веде їх від сьогодні, і відпустіть контроль.';\n    const mapInsight = mkInsight('map', mapFallback);\n    let insightTitle;\n    if (holderPct <= 55) {\n      insightTitle = 'Мапа в голові зараз розподілена доволі рівно';\n      mapInsight.icon = '⚖️';\n    } else if (holderPct < 68) {\n      insightTitle = holder.name + ' тримає більшу частину мапи в голові';\n      mapInsight.icon = '🧭';\n    } else {\n      insightTitle = holder.name + ' зараз тримає ' + holderPct + '% мапи в голові';\n      mapInsight.icon = '🪫';\n    }\n    const mapHolderDomains = visDomains.filter(d => d.owner_id === holderId)\n      .map(d => ({ d, n: S.tasks.filter(t => t.domain_id === d.id).length }))\n      .sort((x, y) => y.n - x.n).slice(0, 2).map(x => x.d);\n    const mapSuggestions = [\n      ...mapHolderDomains.map(d => ({ label: '↪ Передати «' + d.name + '»', onClick: () => this.startHandover(d.id) })),\n      { label: '📊 Переглянути баланс', onClick: () => this.openStats() },\n    ];\n\n    // ===== розподіл за вагою навантаження (mental_load, обране в задачах) =====\n    const loadDefs = [\n      { n: 3, label: 'Високий' },\n      { n: 2, label: 'Середній' },\n      { n: 1, label: 'Низький' },\n    ];\n    const loadAgg = { 1: { a: 0, b: 0, n: 0 }, 2: { a: 0, b: 0, n: 0 }, 3: { a: 0, b: 0, n: 0 } };\n    const loadById = {};\n    S.tasks.forEach(t => { loadById[t.id] = t; });\n    (S.completionEvents || []).forEach(ev => {\n      const t = loadById[ev.taskId];\n      if (!t || hiddenSet.has(t.domain_id)) return;\n      const mgr = t.manager_id; if (mgr !== 'a' && mgr !== 'b') return;\n      const lv = loadAgg[t.mental_load] ? t.mental_load : 1;\n      loadAgg[lv][mgr] += 1;\n      loadAgg[lv].n += 1;\n    });\n    const loadRows = loadDefs.map(d => {\n      const g = loadAgg[d.n];\n      const p = this.pct(g.a, g.b);\n      const lead = g.a >= g.b ? userA : userB;\n      return {\n        label: d.label, count: g.n,\n        dots: Array.from({ length: d.n }, (_, i) => ({ i })),\n        aw: (g.n === 0 ? 50 : p) + '%', bw: (g.n === 0 ? 50 : 100 - p) + '%',\n        note: g.n === 0 ? 'немає задач' : (Math.max(p, 100 - p) + '% ' + lead.name),\n      };\n    });\n\n    // ===== виконання по доменах (куди йде імпакт) =====\n    const domAgg2 = {};\n    (S.completionEvents || []).forEach(e => {\n      const t = taskByIdAll[e.taskId];\n      if (!t || hiddenSet.has(t.domain_id)) return;\n      const g = domAgg2[t.domain_id] || (domAgg2[t.domain_id] = { a: 0, b: 0, n: 0 });\n      this.evUsers(e).forEach(u => { g[u] += 1; });\n      g.n += 1;\n    });\n    const domCompTotal = Object.values(domAgg2).reduce((s, g) => s + g.n, 0);\n    const domCompMax = Math.max(1, ...visDomains.map(d => (domAgg2[d.id] || { n: 0 }).n));\n    const domainComp = visDomains.filter(d => (domAgg2[d.id] || { n: 0 }).n > 0).map(d => {\n      const g = domAgg2[d.id] || { a: 0, b: 0, n: 0 };\n      const pA = this.pct(g.a, g.b);\n      return {\n        id: d.id, emoji: d.icon, name: d.name, count: g.n,\n        barW: Math.round(g.n / domCompMax * 100) + '%',\n        aw: (g.n ? pA : 50) + '%', bw: (g.n ? 100 - pA : 50) + '%',\n        countLabel: g.n + ' ' + pl(g.n, 'виконання', 'виконання', 'виконань'),\n        shareLabel: domCompTotal > 0 ? Math.round(g.n / domCompTotal * 100) + '% імпакту' : '—',\n        dim: g.n === 0 ? 0.5 : 1,\n      };\n    }).sort((x, y) => y.count - x.count);\n    const domainCompEmpty = domCompTotal === 0;\n\n    const trendVals = [...this.trendSeed, mentalAPct];\n    const trendLabels = ['5 тиж', '4 тиж', '3 тиж', '2 тиж', 'мин.', 'зараз'];\n    const trend = trendVals.map((a, i) => ({ aw: a + '%', bw: (100 - a) + '%', label: trendLabels[i] }));\n\n    // confirm dialog viewmodel\n    const cf = S.confirm;\n    let confirmTitle = '', confirmBody = '', confirmOk = '', confirmCancel = '';\n    const confirmBtnBg = 'oklch(0.52 0.13 30)';\n    if (cf) {\n      if (cf.kind === 'discard') {\n        confirmTitle = 'Вийти без збереження?';\n        confirmBody = 'Ви внесли зміни, які ще не збережено. Якщо закрити зараз, їх буде втрачено.';\n        confirmOk = 'Вийти без збереження';\n        confirmCancel = 'Далі редагувати';\n      } else if (cf.kind === 'deleteTask') {\n        confirmTitle = 'Видалити задачу?';\n        confirmBody = cf.title ? ('«' + cf.title + '» буде видалено назавжди. Цю дію не можна скасувати.') : 'Задачу буде видалено назавжди. Цю дію не можна скасувати.';\n        confirmOk = 'Видалити';\n        confirmCancel = 'Скасувати';\n      } else if (cf.kind === 'deleteLog') {\n        confirmTitle = 'Видалити запис?';\n        confirmBody = cf.title ? ('«' + cf.title + '» прибереться з журналу і перестане враховуватись у балансі.') : 'Запис прибереться з журналу і перестане враховуватись у балансі.';\n        confirmOk = 'Видалити';\n        confirmCancel = 'Скасувати';\n      }\n    }\n\n    // «Хто зробив?» — вікно вибору фактичного виконавця при закритті задачі\n    const da = S.doneAsk;\n    const mkDoer = (uid, verb) => {\n      const u = this.U(uid);\n      const sug = !!da && da.suggested === uid;
